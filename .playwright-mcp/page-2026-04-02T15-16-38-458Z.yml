            - generic [ref=e106]:
              - paragraph [ref=e107]: The Client Services Engineer provides technical assistance to computer system users. Responsibilities include answering questions or resolving computer problems for Clients in person, via telephone, or from remote location as well as providing assistance concerning the use of computer hardware and software, printer installations, word processing, electronic mail, and operating systems.
              - paragraph [ref=e108]
              - paragraph [ref=e109]:
                - strong [ref=e110]: "Responsibilities:"
              - list [ref=e111]:
                - listitem [ref=e112]: Provide on-site technical support to system users by troubleshooting issues and working directly with vendors to resolve major hardware and software problems.
                - listitem [ref=e113]: Maintain systems, install new equipment, and make modifications to client infrastructure as requested.
                - listitem [ref=e114]: Able to troubleshoot mobile devices (setup, email and security tokens).
                - listitem [ref=e115]: "Assist system users by confidently troubleshooting Tier 1-Tier 3 issues, including: Active Directory, MS Exchange, O365, MDM, SharePoint and DNS."
                - listitem [ref=e116]: Evaluate client’s operational efficiency of different IT systems and recommend improvements.
                - listitem [ref=e117]: Manage ticket queue by manually documenting, tracking, and monitoring problems while ensuring all tickets are responded to and closed in a timely manner.
                - listitem [ref=e118]: Interact with RFA clients using clear and concise communication in order to facilitate ticket status updates and product availabilities.
                - listitem [ref=e119]: Manage MS Exchange environments and Active Directory (e.g., add, delete, change) as needed and keep up-to-date.
                - listitem [ref=e120]: Effectively demonstrate a sense of urgency while acting in a professional, calm manner and manage appropriate and realistic expectations to ensure overall client.
                - listitem [ref=e121]: Leverage critical thinking skills to evaluate all possible solutions and use appropriate judgment to apply most effective resolution methodology.
              - paragraph [ref=e122]
              - paragraph [ref=e123]:
                - strong [ref=e124]: "Qualifications:"
              - list [ref=e125]:
                - listitem [ref=e126]: 4-7 years of related IT experience in an enterprise or server based environment.
                - listitem [ref=e127]: Must have 3+ years of recent systems maintenance and end user technical support experience.
                - listitem [ref=e128]: Financial services industry and MSP experience preferred.
                - listitem [ref=e129]: Excellent desktop and server troubleshooting skills.
                - listitem [ref=e130]: Strong hands-on experience in Windows Server, MS Exchange/365, Active Sync, Active Directory, LAN/WAN, MDM and Microsoft Office Suite.
                - listitem [ref=e131]: Knowledge of VMware, Citrix, MDM (Mobile Device Management), Disaster Recovery, Cisco, SAN (e.g., EMC, Equallogic), and Cyber Security (e.g., IPS, IDS).
                - listitem [ref=e132]: Impeccable verbal/written communication.
                - listitem [ref=e133]: Exhibit a high-level of professionalism and sound judgment.
                - listitem [ref=e134]: Experience with ConnectWise or similar ticketing system preferred.
              - paragraph [ref=e135]
