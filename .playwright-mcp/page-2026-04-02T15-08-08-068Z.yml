            - generic [ref=e114]:
              - paragraph [ref=e115]: The role of IT Support within the financial services industry involves providing technical assistance and troubleshooting to ensure smooth technology operations. This temporary position based in London is ideal for someone with a keen interest in resolving technical issues and supporting business continuity.
              - paragraph [ref=e116]:
                - strong [ref=e117]: Client Details
              - paragraph [ref=e118]: The employer is a well-established organisation within the financial services industry.
              - paragraph [ref=e119]:
                - strong [ref=e120]: Description
              - list [ref=e121]:
                - listitem [ref=e122]: Provide first-line IT support to end-users, addressing hardware, software, and network-related issues.
                - listitem [ref=e123]: Manage and resolve technical queries within agreed service levels.
                - listitem [ref=e124]: Ensure proper documentation of incidents and solutions in the ticketing system.
                - listitem [ref=e125]: Assist in the setup, configuration, and maintenance of computer systems and peripherals.
                - listitem [ref=e126]: Collaborate with other team members to escalate and resolve complex technical issues.
                - listitem [ref=e127]: Support system updates, patches, and routine maintenance tasks.
                - listitem [ref=e128]: Maintain a high level of customer service by providing clear and effective communication.
                - listitem [ref=e129]: Follow established protocols to ensure compliance with company policies and security standards.
              - paragraph [ref=e130]:
                - strong [ref=e131]: Profile
              - paragraph [ref=e132]: "A successful IT Support professional should have:"
              - list [ref=e133]:
                - listitem [ref=e134]: 5+ years' experience in an IT support environment
                - listitem [ref=e135]: Strong Microsoft Office skills (Word formatting, Excel formulas, data visualisation)
                - listitem [ref=e136]: Good understanding of data protection and information security
                - listitem [ref=e137]: Confident communicator able to support users of all technical levels
                - listitem [ref=e138]: Proactive, adaptable and self-motivated
                - listitem [ref=e139]: Strong prioritisation skills and ability to work under pressure
                - listitem [ref=e140]: Reliable team player with strong professional conduct
                - listitem [ref=e141]: Excellent problem-solving and root cause analysis capability
                - listitem [ref=e142]: Technical skills in Outlook, Apple iOS, Active Directory, PC deployment, SCCM, ServiceNow
                - listitem [ref=e143]: Basic networking, cabling, patching and wireless knowledge
              - paragraph [ref=e144]:
                - strong [ref=e145]: Job Offer
              - list [ref=e146]:
                - listitem [ref=e147]: Competitive daily rate between £200 and £250, paid in GBP.
                - listitem [ref=e148]: A temporary position offering valuable experience in the financial services industry.
                - listitem [ref=e149]: An opportunity to work in London, a major hub for finance and technology.
                - listitem [ref=e150]: Exposure to a large organisation with a focus on technology-driven solutions.
              - paragraph [ref=e151]: If you are an IT Support professional looking to gain experience in the financial services sector, we encourage you to apply for this exciting opportunity in London.
