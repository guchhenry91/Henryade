            - generic [ref=e103]:
              - paragraph [ref=e104]:
                - strong [ref=e105]: Network and Infrastructure Engineer
              - paragraph [ref=e106]:
                - strong [ref=e107]: Up to £50,000 per annum
              - paragraph [ref=e108]:
                - strong [ref=e109]: Bromley, Kent
              - paragraph [ref=e110]:
                - strong [ref=e111]: Full-Time
              - paragraph [ref=e112]:
                - strong [ref=e113]: Permanent
              - paragraph [ref=e114]
              - paragraph [ref=e115]:
                - strong [ref=e116]: About the Role
              - paragraph [ref=e117]: We’re looking for a driven and collaborative Network & Infrastructure Security Engineer to join our agile infrastructure team. In this hands-on position, you’ll take the lead on network engineering while also contributing to broader infrastructure operations—so a strong foundation in both areas is essential.
              - paragraph [ref=e118]: You’ll be instrumental in maintaining and enhancing a secure, resilient, and high-performing IT environment. This role is ideal for someone who enjoys working across disciplines, thrives in a team-oriented setting, and is passionate about delivering robust and secure technology solutions.
              - paragraph [ref=e119]:
                - strong [ref=e120]: Key Responsibilities
              - list [ref=e121]:
                - listitem [ref=e122]: Manage and optimise network infrastructure, including virtual networks, cloud platforms, and WAN technologies.
                - listitem [ref=e123]: Configure and maintain firewalls, routers, switches, and load balancers.
                - listitem [ref=e124]: Deploy security and operational updates in line with business guidelines.
                - listitem [ref=e125]: Monitor network performance and resolve bottlenecks.
                - listitem [ref=e126]: Support backup and disaster recovery solutions.
                - listitem [ref=e127]: Familiarity with Microsoft Azure cloud services and architecture
                - listitem [ref=e128]: Dell Servers, including iDrac
                - listitem [ref=e129]: Knowledge of SAN’s operations
              - paragraph [ref=e130]:
                - strong [ref=e131]: Essential Skills & Experience
              - list [ref=e132]:
                - listitem [ref=e133]: Strong knowledge of networking protocols (TCP/IP), subnetting, VLANs, VPNs, and load balancing.
                - listitem [ref=e134]: Experience with FortiNet firewalls and Cisco switches (including CLI configuration and firmware updates).
                - listitem [ref=e135]: Proficiency in Windows operating systems and active directory.
                - listitem [ref=e136]: Demonstrated ability to design / troubleshoot complex network.
                - listitem [ref=e137]: Experience working with hybrid infrastructure and virtual networks.
                - listitem [ref=e138]: Ability to work collaboratively across infrastructure and security teams.
                - listitem [ref=e139]: Willingness to work outside of core hours when required.
              - paragraph [ref=e140]:
                - strong [ref=e141]: What We’re Looking For
              - paragraph [ref=e142]:
                - strong [ref=e143]: We value team players who bring fresh ideas, enthusiasm, and a collaborative spirit. If you’re passionate about network security and infrastructure, and want to make a meaningful impact in a close-knit team, we’d love to hear from you.
              - paragraph [ref=e144]
              - paragraph [ref=e145]:
                - strong [ref=e146]: About us
              - paragraph [ref=e147]: Foresters Financial is not your typical financial services provider. Those who join our purpose-driven organisation enjoy a culture of collaboration, creativity, and mutual respect and are challenged to do their best to make a difference every day. We help everyday families achieve their financial goals and make a lasting difference in their lives and communities.
              - paragraph [ref=e148]:
                - strong [ref=e149]: What we do
              - paragraph [ref=e150]: We help everyday families achieve their financial goals and make a lasting difference in their lives and communities. We will continue to do this by employing enthusiastic and talented Financial Advisers working across the country and equally talented people to be based at our Head Office in Bromley.
