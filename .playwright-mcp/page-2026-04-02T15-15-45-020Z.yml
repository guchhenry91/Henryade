            - generic [ref=e100]:
              - paragraph [ref=e101]: Freightserve recruitment are looking for a Service Desk Engineer for a well-established IT Company. The role is based in London Docklands.
              - paragraph [ref=e102]:
                - strong [ref=e103]: "About the Department/Team:"
              - paragraph [ref=e104]: This role will report directly to the Service Desk Manager. The Service Desk Team are responsible for delivering a high level of support to our clients, covering a wide variety of packages and platforms. We aim to get it right first time, to meet the expectations of our clients, whilst meeting SLA’s.
              - paragraph [ref=e105]:
                - strong [ref=e106]: "Responsibilities:"
              - paragraph [ref=e107]: The Engineer role encompasses elements of 2nd and 3rd line support within a customers location based in Dockside E16, London. You will need to be a seasoned and reliable professional with exceptional support skills to independently support our customer.
              - paragraph [ref=e108]:
                - strong [ref=e109]: "Primary Role Responsibilities:"
              - list [ref=e110]:
                - listitem [ref=e111]: Manage and assist with IT service tickets.
                - listitem [ref=e112]: Independently resolve tickets and support other engineers ticket work.
                - listitem [ref=e113]: High level of technical knowledge in areas key to the company.
                - listitem [ref=e114]: Lead / role model -set a positive example in key technical expertise areas.
                - listitem [ref=e115]: Write high quality procedures and client communication.
                - listitem [ref=e116]: Manage project tickets - including planning, monitoring and completion.
              - paragraph [ref=e117]:
                - strong [ref=e118]: "Secondary Responsibilities and Tasks:"
              - list [ref=e119]:
                - listitem [ref=e120]: Provide 2nd and 3rd line technical support to clients and Company's staff.
                - listitem [ref=e121]: Act as an escalation point for customers and assist other colleagues in troubleshooting and resolution.
                - listitem [ref=e122]: Maintain a high degree of customer service for all support queries and adhere to all service procedures and SLA’s.
                - listitem [ref=e123]: Arrange for and work with external 3rd party technical support where problems cannot be resolved internally.
                - listitem [ref=e124]: Demonstrate and apply knowledge and experience with IT SaaS infrastructure and security systems.
                - listitem [ref=e125]: Be available for ticket escalation and resolution.
                - listitem [ref=e126]: Resolve complex hardware/software tickets.
              - paragraph [ref=e127]:
                - strong [ref=e128]: Required Skills
              - list [ref=e129]:
                - listitem [ref=e130]: IT MSP Experience Essential
                - listitem [ref=e131]: Ability to work in a corporate environment
                - listitem [ref=e132]:
                  - strong [ref=e133]: Experienced level 3 engineers
                - listitem [ref=e134]: M365 – including complex issues
                - listitem [ref=e135]: Laptop build
                - listitem [ref=e136]: Server 2016/2019 etc Group policy , AD, DNS (all the usual things you would need in business)
                - listitem [ref=e137]: Wireless and Network Management
              - paragraph [ref=e138]: As an agency we are fast becoming the number one Freight specialist in the UK. We have a fast growing reputation with most Freight related companies. Freightserve has been established since 1992 working within the Freight Forwarding and Shipping industry.
