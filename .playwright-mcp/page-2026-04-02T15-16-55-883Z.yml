            - generic [ref=e102]:
              - paragraph [ref=e103]:
                - strong [ref=e104]: First Line Support Engineer / IT Service Desk Technician
              - paragraph [ref=e105]: Join a forward-thinking managed services organisation as a 1st Line IT Support Engineer delivering IT support, troubleshooting and cloud computing solutions. This hybrid role offers exposure to Microsoft Azure, cybersecurity and digital transformation projects.
              - paragraph [ref=e106]: "If you’ve also worked in the following roles, we’d also like to hear from you: IT Helpdesk Analyst, 1st Line Support Engineer, First Line Support Technician, Technical Support Engineer, Application Support Analyst, Cloud Support Engineer, IT Support Technician, IT Technician, Service Desk Analyst, Technical Support Engineer, IT Helpdesk Analyst, IT Support Specialist."
              - paragraph [ref=e107]
              - paragraph [ref=e108]:
                - strong [ref=e109]: "SALARY:"
                - text: £28,000 - £34,000 per annum DOE + Benefits (see below)
              - paragraph [ref=e110]:
                - strong [ref=e111]: "LOCATION:"
                - text: Hybrid. Working 3 days from the City of London office (Faringdon / Chancery Lane EC1N) and 2 days from home
              - paragraph [ref=e112]:
                - strong [ref=e113]: "JOB TYPE:"
                - text: Full-Time, Permanent
              - paragraph [ref=e114]:
                - strong [ref=e115]: "WORKING HOURS:"
                - text: 35 hours per week, Monday to Friday
              - paragraph [ref=e116]
              - paragraph [ref=e117]:
                - strong [ref=e118]: "** Fantastic Career Progression Opportunities **"
              - paragraph [ref=e119]
              - paragraph [ref=e120]:
                - strong [ref=e121]: JOB OVERVIEW
              - paragraph [ref=e122]: We have a fantastic new job opportunity for a First Line Support Engineer / IT Service Desk Technician to join a dynamic managed services environment supporting a diverse client base across corporate IT and cloud computing platforms.
              - paragraph [ref=e123]: As a First Line Support Engineer / IT Service Desk Technician you will provide 1st line technical support, troubleshooting Windows and macOS systems, managing user accounts and contributing to cybersecurity best practice. You will work within ITIL-aligned service desk processes.
              - paragraph [ref=e124]: The organisation is seeking a motivated First Line Support Engineer / IT Service Desk Technician who thrives in a fast-paced IT support setting, enjoys continuous learning and is keen to develop Microsoft Azure, Modern Desktop and Intune expertise.
              - paragraph [ref=e125]
              - paragraph [ref=e126]:
                - strong [ref=e127]: APPLY TODAY
              - paragraph [ref=e128]:
                - text: Ready to make your next career move?
                - strong [ref=e129]: Apply Now
                - text: for our Recruitment Team to review.
              - paragraph [ref=e130]
              - paragraph [ref=e131]:
                - strong [ref=e132]: DUTIES
              - paragraph [ref=e133]: "Your duties as the First Line Support Engineer / IT Service Desk Technician include:"
              - list [ref=e134]:
                - listitem [ref=e135]:
                  - strong [ref=e136]: "1st Line Support:"
                  - text: Act as the initial point of contact for IT helpdesk queries, logging, categorising and prioritising incidents
                - listitem [ref=e137]:
                  - strong [ref=e138]: "Technical Troubleshooting:"
                  - text: Diagnose and resolve issues across desktops, laptops, mobile devices and operating systems including Windows and macOS
                - listitem [ref=e139]:
                  - strong [ref=e140]: "User Account Administration:"
                  - text: Manage password resets, account updates and multi-factor authentication via Active Directory and Azure AD
                - listitem [ref=e141]:
                  - strong [ref=e142]: "Hardware and Software Setup:"
                  - text: Install, configure and maintain hardware, applications and business systems
                - listitem [ref=e143]:
                  - strong [ref=e144]: "Service Desk Documentation:"
                  - text: Maintain accurate records within ticketing systems and contribute to knowledge base articles
                - listitem [ref=e145]:
                  - strong [ref=e146]: "Customer Service Delivery:"
                  - text: Provide clear, jargon-free communication and timely updates to end users
                - listitem [ref=e147]:
                  - strong [ref=e148]: "Continuous Improvement:"
                  - text: Identify recurring issues and support service improvement and process optimisation initiatives
                - listitem [ref=e149]:
                  - strong [ref=e150]: "Professional Development:"
                  - text: Engage in Microsoft certification training including Azure, Intune and Modern Desktop
              - paragraph [ref=e151]
              - paragraph [ref=e152]:
                - strong [ref=e153]: CANDIDATE REQUIREMENTS
              - list [ref=e154]:
                - listitem [ref=e155]: Previous experience in IT support, IT helpdesk or technical support within a managed services or corporate IT environment
                - listitem [ref=e156]: Experience with troubleshooting Windows and macOS operating systems
                - listitem [ref=e157]: Familiarity with ITIL processes and service desk best practice
                - listitem [ref=e158]: Experience with Active Directory and Azure AD user administration
                - listitem [ref=e159]: Microsoft certifications such as AZ-900, MS-900 or SC-900, or willingness to achieve them
                - listitem [ref=e160]: Strong communication skills with the ability to explain technical concepts clearly
                - listitem [ref=e161]: Ability to prioritise workloads and manage incidents in a fast-paced environment
                - listitem [ref=e162]: A proactive approach with a passion for cloud technologies, cybersecurity and continuous learning
              - paragraph [ref=e163]
              - paragraph [ref=e164]:
                - strong [ref=e165]: BENEFITS
              - list [ref=e166]:
                - listitem [ref=e167]: Learning and development opportunities including Microsoft certifications and internal and external training
                - listitem [ref=e168]: Career progression opportunities
                - listitem [ref=e169]: 21 days holiday increasing after 3 years of service plus public holidays and Birthday off
                - listitem [ref=e170]: Private healthcare after probation
                - listitem [ref=e171]: 40% off gym membership
                - listitem [ref=e172]: Great pension scheme from day one
                - listitem [ref=e173]: Cycle to work scheme
                - listitem [ref=e174]: Eyecare vouchers
                - listitem [ref=e175]: Central location, next to a famous food market
                - listitem [ref=e176]: A friendly, inclusive, sustainable work environment
                - listitem [ref=e177]: Regular social events (tech-infused minigolf and darts, pool, and more!)
                - listitem [ref=e178]: Electric car scheme after 2 years of service
                - listitem [ref=e179]: Recruitment referral scheme
              - paragraph [ref=e180]
              - paragraph [ref=e181]:
                - strong [ref=e182]: APPLY TODAY…
              - paragraph [ref=e183]: By submitting your job application to us you are hereby giving us your express consent to submit your details to our Client for this purpose.
              - paragraph [ref=e184]: "JOB REF: AWDO-P14439"
              - paragraph [ref=e185]: Full-Time, Permanent IT Jobs, Careers and Vacancies. Find a new job and work in London. Multi-Job Board Advertising and CV Sourcing Recruitment Services provided by AWD online.
              - paragraph [ref=e186]:
                - emphasis [ref=e187]: AWD online specialise in sourcing candidates and advertising vacancies on multiple job boards for companies on a non-commission basis. AWD online operates as an employment agency.
