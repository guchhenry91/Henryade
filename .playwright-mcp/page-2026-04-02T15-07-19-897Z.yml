              - paragraph [ref=e118]: Reporting directly to the IT Manager, you will be responsible for providing hands-on technical support across three London-based offices, ensuring the smooth day-to-day running of all IT systems and infrastructure.
              - paragraph [ref=e119]: This is a broad, all-encompassing role where no two days are the same, ideal for someone who enjoys being both reactive and proactive in a business-critical environment.
