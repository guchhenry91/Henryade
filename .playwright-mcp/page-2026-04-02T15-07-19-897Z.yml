                - listitem [ref=e140]: Understanding of cybersecurity fundamentals and best practices
                - listitem [ref=e141]: Highly organised, proactive, and able to manage multiple priorities
                - listitem [ref=e142]: Strong communication skills, comfortable dealing with users at all levels
                - listitem [ref=e143]: A genuine interest in technology and continuous improvement
