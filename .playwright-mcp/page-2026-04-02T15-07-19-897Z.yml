                - listitem [ref=e128]: Assist with cybersecurity protocols, updates, and best practice implementation
                - listitem [ref=e129]: Manage IT ticketing system, ensuring timely resolution and excellent user communication
                - listitem [ref=e130]: Support onboarding and offboarding processes for employees
                - listitem [ref=e131]: Maintain IT documentation and asset registers
                - listitem [ref=e132]: Liaise with third-party providers where required
              - strong [ref=e133]: About You
              - list [ref=e134]:
