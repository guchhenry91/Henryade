              - paragraph [ref=e115]:
                - strong [ref=e116]: "About the Role:"
              - paragraph [ref=e117]
              - paragraph [ref=e118]: Based in Borehamwood, Hertfordshire, my client, a dynamic multisite organisation, requires a Fluent French IT Support Analyst to be a key member of our IT business support team, the Support Analyst is responsible for providing technical assistance to end-users, addressing hardware and software issues, and ensuring the overall functionality of our IT systems, involving responding to user enquiries, diagnosing and resolving technical problems, and offering guidance on the effective use of technology. Additionally, the Support Analyst will contribute to network support, assist in security monitoring, and play a crucial role in maintaining a secure and efficient computing environment. With a focus on user satisfaction and continuous improvement, the Support Analyst will be an integral part of fostering a technology-enabled workplace.
              - paragraph [ref=e119]: The role supports the IT team in delivering excellent 1st line support to over 500 users across over 200 sites in the UK and Europe.
              - paragraph [ref=e120]
              - paragraph [ref=e121]:
                - strong [ref=e122]: "Main responsibilities of the Infrastructure Analyst:"
              - list [ref=e123]:
                - listitem [ref=e124]: Monitoring and maintaining networks and servers.
                - listitem [ref=e125]: Upgrading, installing, and configuring new hardware and software to meet user needs.
                - listitem [ref=e126]: Responding to technical issues and enquiries from store colleagues.
                - listitem [ref=e127]: Creating user accounts and performing access control, as well as administering licenses.
                - listitem [ref=e128]: Diagnosing and troubleshooting hardware and software problems to optimise computer systems.
                - listitem [ref=e129]: Documenting processes, as well as backing up and archiving data.
                - listitem [ref=e130]: Supervising and mentoring IT department colleagues, as well as providing IT support.
                - listitem [ref=e131]: Keeping up to date with advancements and best practices in IT administration.
                - listitem [ref=e132]: Troubleshooting network connectivity issues.
                - listitem [ref=e133]: Assisting with the setup and maintenance of local area networks (LANs) and wide area networks (WANs).
                - listitem [ref=e134]: Collaborating with other IT professionals and departments to address complex issues.
                - listitem [ref=e135]: Providing remote assistance to users working in different locations.
              - paragraph [ref=e136]
              - paragraph [ref=e137]:
                - strong [ref=e138]: "The Ideal candidate for the IT Support Analyst:"
              - list [ref=e139]:
                - listitem [ref=e140]: Excellent customer service skills.
                - listitem [ref=e141]: Proven work experience in IT support or IT technician roles.
                - listitem [ref=e142]: Have a natural aptitude for solving problems and finding solutions.
                - listitem [ref=e143]: Excellent communication skills, both spoken and written.
                - listitem [ref=e144]: Fluent in French.
                - listitem [ref=e145]: Be a self-starter and possess personal drive and pride.
                - listitem [ref=e146]: Experience in technical support in a Microsoft-based environment.
                - listitem [ref=e147]: Worked in and understood a retail, wholesale, or distributed company.
                - listitem [ref=e148]: Practical experience with the Internet and network security protocols.
                - listitem [ref=e149]: Full and clean driving licence.
