            - generic [ref=e106]:
              - paragraph [ref=e107]: Field Service Technician (Hardware Break/Fix) – London SE
              - paragraph [ref=e108]:
                - text: "Location: London SE"
                - text: "Skill Level: Level 2 Technician"
                - text: "Start Date: asap"
                - text: "Travel Requirement: Up to 50%+ daily travel Pay : £"
              - paragraph [ref=e109]: Role Overview
              - paragraph [ref=e110]: We are seeking an experienced Field Service Technician to provide hardware break/fix support for HP and Lenovo laptops and desktops across the LE, CV, and B postal regions. This role is not deskside support and requires hands-on hardware diagnostic and repair experience.
              - paragraph [ref=e111]: The successful candidate will work independently in the field, traveling to customer sites to troubleshoot, diagnose, repair, and maintain IT hardware equipment.
              - paragraph [ref=e112]
              - paragraph [ref=e113]: Key Responsibilities
              - list [ref=e114]:
                - listitem [ref=e115]: Perform diagnostics, troubleshooting, and repair of HP and Lenovo desktop and laptop hardware.
                - listitem [ref=e116]: Conduct installation, maintenance, and replacement of hardware components.
                - listitem [ref=e117]: Respond to customer service requests and technical issues promptly.
                - listitem [ref=e118]: Maintain daily communication through phone, email, voicemail, and internal communication tools.
                - listitem [ref=e119]: Ensure all administrative tasks and service updates are completed accurately.
                - listitem [ref=e120]: Follow best practice standards and operational procedures.
                - listitem [ref=e121]: Maintain and manage tools, spare parts, and test equipment.
                - listitem [ref=e122]: Utilize escalation and support processes to resolve complex service issues.
                - listitem [ref=e123]: Travel extensively to customer locations across assigned regions.
                - listitem [ref=e124]: Lift and transport equipment or parts up to 25 kg.
              - paragraph [ref=e125]
              - paragraph [ref=e126]: Requirements
              - list [ref=e127]:
                - listitem [ref=e128]: Minimum 3 years of experience diagnosing and repairing desktop and laptop hardware.
                - listitem [ref=e129]: Strong experience with HP and Lenovo hardware break/fix.
                - listitem [ref=e130]: Proven ability to troubleshoot hardware issues and resolve customer concerns.
                - listitem [ref=e131]: Comfortable working independently in a field-based role.
                - listitem [ref=e132]: Ability to travel extensively with extended periods of driving.
                - listitem [ref=e133]: Valid driver’s license and good driving record required.
                - listitem [ref=e134]: Ability to lift and carry equipment up to 25 kg.
              - paragraph [ref=e135]
              - paragraph [ref=e136]: Important Note
              - paragraph [ref=e137]: This role is strictly hardware break/fix field support. Candidates with only deskside support experience (e.g., battery or keyboard replacements only) will not be considered.
              - paragraph [ref=e138]
