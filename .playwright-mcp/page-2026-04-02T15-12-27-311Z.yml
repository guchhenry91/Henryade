            - generic [ref=e104]:
              - text: Senior IT Support Engineer London (Office-Based)
              - text: Monday–Friday, 9:30am–6:00pm
              - text: A globally established media agency with 1,000+ employees across international offices is seeking a macOS focused Senior IT Support Engineer with Jamf, Okta and Google Workspace experience to join its London team. The company is recognised for award-winning campaigns delivered to major global brands.
              - text: This is an excellent opportunity for an experienced macOS and Jamf IT support professional who thrives in a creative, fast-paced environment and wants to further develop their expertise within an Apple-centric infrastructure using Jamf.
              - text: The Role Working within a small IT team, you will provide high-quality end-user support across the London office and remote global users. The environment is predominantly Mac-based, and the role requires strong macOS expertise along with exposure to modern identity, security, and networking platforms such as Google Workspace and Okta.
              - text: This is a fully office-based position to ensure consistent on-site support coverage.
              - text: Key Responsibilities
              - list [ref=e105]:
                - listitem [ref=e106]: Provide 1st/2nd line technical support to internal users
                - listitem [ref=e107]: Configure and deploy hardware for employees and freelancers
                - listitem [ref=e108]: Administer user accounts and access permissions
                - listitem [ref=e109]: Support Apple devices (macOS, iOS, tvOS)
                - listitem [ref=e110]: Manage and maintain Google Workspace environment
                - listitem [ref=e111]: Deliver remote support to UK and international teams
                - listitem [ref=e112]: Maintain accurate documentation and improve support processes
                - listitem [ref=e113]: Assist a sister company based within the same London office
              - text: Technical Environment
              - list [ref=e114]:
                - listitem [ref=e115]: Apple macOS & hardware
                - listitem [ref=e116]: JAMF (100 certified minimum; exposure to 200 level desirable)
                - listitem [ref=e117]: Google Workspace (Gmail, Drive, Groups, Calendar)
                - listitem [ref=e118]: Okta (or similar identity management tools)
                - listitem [ref=e119]: CrowdStrike Falcon
                - listitem [ref=e120]: Juniper switching & SonicWall firewalls
                - listitem [ref=e121]: Cisco Meraki access points
                - listitem [ref=e122]: Adobe Creative Cloud
                - listitem [ref=e123]: Video conferencing platforms (Google Meet, Zoom, Microsoft Teams)
                - listitem [ref=e124]: Basic Windows support
              - text: Required Experience
              - list [ref=e125]:
                - listitem [ref=e126]: Minimum 2+ years in an IT Support role
                - listitem [ref=e127]: Strong macOS troubleshooting (GUI & terminal)
                - listitem [ref=e128]: Experience in fast-paced environments (agency/creative sector advantageous)
                - listitem [ref=e129]: Helpdesk/ticketing system experience
                - listitem [ref=e130]: Excellent communication and customer service skills
                - listitem [ref=e131]: Strong organisational and time management abilities
              - text: Desirable Skills
              - list [ref=e132]:
                - listitem [ref=e133]: Advanced JAMF or macOS MDM knowledge
                - listitem [ref=e134]: Shell scripting or automation experience
                - listitem [ref=e135]: Understanding of ISO 27001, SOC II, or similar security frameworks
                - listitem [ref=e136]: Familiarity with ITIL v4 practices
              - text: Personal Attributes
              - list [ref=e137]:
                - listitem [ref=e138]: Proactive and solutions-focused
                - listitem [ref=e139]: Strong sense of ownership and accountability
                - listitem [ref=e140]: Confident communicator with internal stakeholders
                - listitem [ref=e141]: Eager to learn and develop technical skills
              - text: Benefits
              - list [ref=e142]:
                - listitem [ref=e143]: 25 days annual leave
                - listitem [ref=e144]: Pension scheme
                - listitem [ref=e145]: Life assurance
                - listitem [ref=e146]: Supportive leadership and collaborative culture
                - listitem [ref=e147]: Friendly, social working environment
                - listitem [ref=e148]: Trusted to work autonomously without micromanagement
              - emphasis [ref=e149]: Eligo Recruitment is acting as an Employment Business in relation to this vacancy. Eligo is proud to be an equal opportunity employer dedicated to fostering diversity and creating an inclusive and equitable environment for employees and applicants. We actively celebrate and embrace differences, including but not limited to race, colour, religion, sex, sexual orientation, gender identity, national origin, veteran status, and disability. We encourage applications from individuals of all backgrounds and experiences and all will be considered for employment without discrimination. At Eligo Recruitment diversity, equity and inclusion is integral to achieving our mission to ensure every workplace reflects the richness of human diversity.
