            - generic [ref=e100]:
              - paragraph [ref=e101]:
                - strong [ref=e102]: "Job Title: IT Support Engineer (In-House)"
              - paragraph [ref=e103]:
                - strong [ref=e104]: "Location:"
                - text: Central London (Office-based, Monday–Friday, 9:00–18:00)
              - paragraph [ref=e105]:
                - strong [ref=e106]: About Us
              - paragraph [ref=e107]: We are a dynamic and rapidly growing financial brokerage based in the heart of London. Our mission is to provide exceptional financial services and solutions to our clients, ensuring their financial goals are met and exceeded. As part of our commitment to excellence, we are seeking a motivated and skilled IT Support Engineer to join our team.
              - paragraph [ref=e108]:
                - strong [ref=e109]: The Role
              - paragraph [ref=e110]: You will be responsible for managing and supporting our internal IT environment, acting as the primary point of contact for approximately 20 users. This is a hands-on, in-house role offering a high level of ownership across desktop support, networking, and cloud-based systems.
              - paragraph [ref=e111]:
                - strong [ref=e112]: Environment
              - list [ref=e113]:
                - listitem [ref=e114]: Cloud-first setup (Microsoft 365, AWS)
                - listitem [ref=e115]: Hybrid environment (Microsoft 365, AWS, plus some on-premises servers)
                - listitem [ref=e116]: Office network and firewall infrastructure
              - paragraph [ref=e117]:
                - strong [ref=e118]: Key Responsibilities
              - list [ref=e119]:
                - listitem [ref=e120]: Provide day-to-day desktop support (Windows / macOS)
                - listitem [ref=e121]: Set up and configure new starters (devices, accounts, access)
                - listitem [ref=e122]: Manage onboarding and offboarding processes
                - listitem [ref=e123]: Provide remote support for users working from home (VPN, connectivity, device issues)
                - listitem [ref=e124]: Troubleshoot hardware, software, and connectivity issues
                - listitem [ref=e125]: Build, upgrade, and replace PCs and laptops
                - listitem [ref=e126]: Manage and support office network and firewall
                - listitem [ref=e127]: Administer Microsoft 365 (Outlook, Teams, user accounts)
                - listitem [ref=e128]: Assist with AWS cloud environment (basic administration)
                - listitem [ref=e129]: Manage user accounts (Azure AD / Entra ID)
                - listitem [ref=e130]: Maintain IT security processes (MFA, access control, device compliance)
                - listitem [ref=e131]: Maintain asset inventory and device tracking
                - listitem [ref=e132]: Install, update, and patch software and systems
                - listitem [ref=e133]: Support printers, meeting rooms, and office technology
                - listitem [ref=e134]: Document systems and internal processes
                - listitem [ref=e135]: Work with third-party suppliers (telephony, internet, hardware vendors)
              - paragraph [ref=e136]:
                - strong [ref=e137]: Requirements
              - list [ref=e138]:
                - listitem [ref=e139]: 2–5 years’ experience in IT support or similar role
                - listitem [ref=e140]: Strong troubleshooting skills across hardware and software
                - listitem [ref=e141]: Experience with Microsoft 365 and Outlook
                - listitem [ref=e142]: Good understanding of networking and firewalls
                - listitem [ref=e143]: Exposure to cloud platforms (AWS or similar)
                - listitem [ref=e144]: Understanding of IT security fundamentals
                - listitem [ref=e145]: Strong communication skills and user-focused approach
                - listitem [ref=e146]: Comfortable working independently in a small environment
              - paragraph [ref=e147]: If you are looking for a hands-on role where you can take ownership of IT and make a real impact within a growing business, we would love to hear from you.
