              - paragraph [ref=e106]:
                - strong [ref=e107]: Desktop Support Analyst - London
              - paragraph [ref=e108]: (Desktop Support Analyst, IT Support, 2nd Line Support, Systems Administration, Office 365, Windows 10, Windows Server, Infrastructure Engineer, Support, Networking, Windows 10, Windows Server, Azure AD, Microsoft Intune, Desktop Support Analyst, IT Support, 2nd Line Support, Urgent)
              - paragraph [ref=e109]
              - paragraph [ref=e110]: Our client is a highly reputable specialist within the insurance market. They have been a market leader for many years and are currently on the lookout for an exceptional Desktop Support Analyst with previous support experience and excellent communications skills to support all IT infrastructure within this growing business.
              - paragraph [ref=e111]
              - paragraph [ref=e112]: The successful candidate will be expected to provide physical hands-on support, telephone support, systems administration including Office 365 and Windows and resolve day-to-day IT incidents to help keep the business running smoothly. You will be expected to support users with desktop, laptop, software and peripheral issues and escalate more complex problems to the IT Manager where appropriate, with lots of opportunities to learn how to resolve these issues independently. A basic understanding of Azure AD environments, some Network troubleshooting and any experience managing devices via Microsoft Intune, would be highly beneficial.
              - paragraph [ref=e113]
              - paragraph [ref=e114]: A strong communicator with a helpful, user-focused approach is essential, as is a positive attitude, curiosity about IT Systems and a genuine desire to learn and progress. If you are proactive, keen to grow, and enjoy solving problems for people, this role will suit you perfectly.
              - paragraph [ref=e115]
              - paragraph [ref=e116]: This is a rare opportunity to join and have a huge impact within a truly exciting and established business. The company is quick to recognize talent and keen to nurture and develop it, as such your career with the company will go as far as your ambitions take you. The exceptional career opportunity really makes this an elite environment for Desktop Support Analysts.
              - paragraph [ref=e117]
              - paragraph [ref=e118]:
                - strong [ref=e119]: "Salary:"
                - text: £30k - £35k + Excellent Bonus + Unbeatable Benefits
              - paragraph [ref=e120]: To apply for this position please send your CV to Nathan Warner at Noir.
