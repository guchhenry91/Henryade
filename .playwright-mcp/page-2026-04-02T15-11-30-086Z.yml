            - generic [ref=e107]:
              - paragraph [ref=e108]: Our client, a prominent player in the Defence & Security sector, is currently looking for an Applications Support Engineer to join their dynamic team based in Harlow (Hybrid). This position is a Fixed Term Contract for 12 months, offering full-time hours of 37 hours per week. The successful applicant must be SC eligible.
              - strong [ref=e109]: "About the Role:"
              - paragraph [ref=e110]: The Applications Support Engineer will become part of the wider Data and BI Product Family, initially focusing on technical deployment and application support for a major financial planning transformation. This role involves a close working relationship with programme teams and Digital Technology functions such as Architecture, Security, and Operations. Strong technical troubleshooting skills and hands-on experience with financial planning platforms are essential.
              - strong [ref=e111]: "Key Responsibilities:"
              - strong [ref=e112]: "Deployment & Technical Support:"
              - list [ref=e113]:
                - listitem [ref=e114]: Support the initial deployment, configuration, and technical validation of the new financial platform.
                - listitem [ref=e115]: Provide hands-on troubleshooting and issue resolution across application, interface, and configuration layers.
                - listitem [ref=e116]: Work closely with infrastructure, network, and security teams to ensure end-to-end environment readiness.
              - strong [ref=e117]: "Collaboration & Cross-Functional Engagement:"
              - list [ref=e118]:
                - listitem [ref=e119]: Collaborate with key programme stakeholders including Architecture, Engineering, Programme Delivery, QA, and Finance Operations.
                - listitem [ref=e120]: Participate in Agile ceremonies and contribute to iterative delivery cycles, backlog refinement, and continuous improvement.
                - listitem [ref=e121]: Assist in interpreting architectural and design requirements into actionable support tasks.
              - strong [ref=e122]: "Operational Readiness & Transition:"
              - list [ref=e123]:
                - listitem [ref=e124]: Prepare the wider support organisation for steady-state operations by developing documentation, standard operating procedures, and knowledge articles.
                - listitem [ref=e125]: Deliver training and knowledge-transfer sessions to ensure operational teams can confidently support the live Finance platform.
                - listitem [ref=e126]: Contribute to hyper-care and early life support activities post-go-live.
              - strong [ref=e127]: "Monitoring, Incident Management & Continuous Improvement:"
              - list [ref=e128]:
                - listitem [ref=e129]: Implement and maintain monitoring solutions to ensure system availability and performance.
                - listitem [ref=e130]: Manage incident triage, root cause analysis, and problem resolution for platform-related issues.
                - listitem [ref=e131]: Identify opportunities to enhance stability, resilience, and operational efficiency of the platform.
              - strong [ref=e132]: "Job Requirements:"
              - strong [ref=e133]: "Essential:"
              - list [ref=e134]:
                - listitem [ref=e135]: Experience in application support, ideally with finance platforms, OneStream in particular.
                - listitem [ref=e136]: Strong understanding of Service Management frameworks such as ITIL.
                - listitem [ref=e137]:
                  - text: "Solid background in:"
                  - list [ref=e138]:
                    - listitem [ref=e139]: Operating system management (Windows/Linux)
                    - listitem [ref=e140]: Application troubleshooting and performance optimisation
                    - listitem [ref=e141]: Log analysis, system monitoring, and incident management
                - listitem [ref=e142]: Ability to collaborate effectively with technical and non-technical stakeholders.
                - listitem [ref=e143]: Experience working in structured delivery environments; familiarity with Agile ways of working is advantageous.
              - strong [ref=e144]: "Desirable:"
              - list [ref=e145]:
                - listitem [ref=e146]: Experience in support of a wide range of Data and MI/BI platforms.
                - listitem [ref=e147]: Experience supporting applications in regulated industries (e.g., government, aerospace, and defence).
                - listitem [ref=e148]: Knowledge of integration concepts (ETL, Event, APIs, message-based interfaces).
                - listitem [ref=e149]: Exposure to deployment automation or DevOps practices.
              - strong [ref=e150]: "Personal Attributes:"
              - list [ref=e151]:
                - listitem [ref=e152]: Strong analytical and problem-solving mindset.
                - listitem [ref=e153]: Clear communicator able to work across diverse technical teams.
                - listitem [ref=e154]: Proactive, collaborative, and committed to delivering high-quality support.
                - listitem [ref=e155]: Adaptable, eager to learn, and able to transition seamlessly between project and BAU contexts.
              - paragraph [ref=e156]: If you are a dedicated and skilled Applications Support Engineer looking to contribute to national security projects within a supportive and innovative environment, apply now to join our client's esteemed team in Harlow.
