            - generic [ref=e106]:
              - paragraph [ref=e107]:
                - text: 2nd Line Service Desk Engineer
                - text: £35,000 – £40,000 + benefits including generous pension and holiday, bonus, private healthcare
                - text: Epsom, Surrey, KT17
              - paragraph [ref=e108]: Our client is an extremely well-established (100+ years), independent financial services organisation with an outstanding reputation for stability, service excellence, and a genuinely supportive working culture. They offer long-term career security, career progression, and a generous benefits package.
              - paragraph [ref=e109]: They are now seeking an experienced 2nd Line Service Desk Engineer to join their Service Desk team, providing high-quality technical support across a complex, regulated financial services environment.
              - paragraph [ref=e110]: "The 2 nd Line Service Desk Engineer Role:"
              - paragraph [ref=e111]: You will provide advanced 2nd line support to end users, owning incidents through to resolution and acting as a technical escalation point for 1st line. Working within SLA and ITIL frameworks, you will deliver a professional, customer-focused service while contributing to continuous improvement and knowledge sharing.
              - paragraph [ref=e112]: "Key responsibilities include:"
              - list [ref=e113]:
                - listitem [ref=e114]: Resolving and owning escalated incidents and service requests across desktop, server, O365, SaaS, Azure and on-prem environments
                - listitem [ref=e115]: Acting as a Subject Matter Expert for defined platforms and technologies
                - listitem [ref=e116]: Supporting joiners, movers and leavers, device builds, asset management and MDM
                - listitem [ref=e117]: Hands-on troubleshooting, software and hardware installation, backups and restores
                - listitem [ref=e118]: Working closely with 3rd line, security, change and external vendors
                - listitem [ref=e119]: Contributing to documentation, knowledge base articles and service improvements
                - listitem [ref=e120]: Operating in a regulated, security-conscious financial services environment
              - paragraph [ref=e121]: Skills & Experience
              - list [ref=e122]:
                - listitem [ref=e123]: Minimum 3 years’ experience in a 2nd Line Support / Service Desk Engineer role
                - listitem [ref=e124]: Previous experience working within Financial Services or a highly regulated environment is preferred
                - listitem [ref=e125]: Strong knowledge of Windows desktop and server OS, Microsoft 365, Active Directory, Exchange, GPO
                - listitem [ref=e126]: Experience with Azure, SaaS, MDM, basic networking and virtualisation (VMware preferred)
                - listitem [ref=e127]: Familiar with ITIL, SLAs, CSAT and structured incident/problem management
                - listitem [ref=e128]: Excellent communication skills and a customer-first mindset
                - listitem [ref=e129]: Confident troubleshooting complex technical issues and working under pressure
              - paragraph [ref=e130]: Why Apply?
              - list [ref=e131]:
                - listitem [ref=e132]: Join a financially secure, century-established organisation
                - listitem [ref=e133]: Supportive, people-focused culture with long-term career prospects
                - listitem [ref=e134]: Exposure to enterprise-grade technology in a regulated, professional environment
                - listitem [ref=e135]: Competitive salary and generous benefits package
              - paragraph [ref=e136]: This is an excellent opportunity for a capable 2nd Line Engineer seeking stability, progression and the chance to work for a highly respected financial services institution.
