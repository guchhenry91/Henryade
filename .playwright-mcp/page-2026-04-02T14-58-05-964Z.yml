                - listitem [ref=e124]: Assist with cybersecurity protocols, updates, and best practice implementation
                - listitem [ref=e125]: Manage IT ticketing system, ensuring timely resolution and excellent user communication
                - listitem [ref=e126]: Support onboarding and offboarding processes for employees
                - listitem [ref=e127]: Maintain IT documentation and asset registers
                - listitem [ref=e128]: Liaise with third-party providers where required
