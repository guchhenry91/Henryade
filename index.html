<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Betting Model Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',monospace;background:#0a0a0a;color:#ddd;min-height:100vh}
  header{background:#111;border-bottom:1px solid #222;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header h1{color:#00ff88;font-size:1.1em;letter-spacing:1px}
  .token-bar{display:flex;gap:16px;align-items:center;font-size:0.8em;flex-wrap:wrap}
  .token-info{background:#1a1a1a;padding:5px 12px;border-radius:4px;border:1px solid #333}
  .token-info span{color:#ffcc00;font-weight:bold}
  .cache-info{color:#555;font-size:0.75em}
  .btn{background:#1a2a1a;color:#00ff88;border:1px solid #00ff88;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:0.8em;transition:all .2s}
  .btn:hover{background:#00ff88;color:#000}
  .btn-danger{border-color:#ff4444;color:#ff4444}
  .btn-danger:hover{background:#ff4444;color:#000}
  .tabs{display:flex;gap:4px;padding:12px 20px;background:#111;border-bottom:1px solid #222;overflow-x:auto;white-space:nowrap}
  .tab{padding:6px 14px;border-radius:4px;cursor:pointer;font-size:0.85em;color:#888;border:1px solid transparent;transition:all .2s}
  .tab:hover{color:#ddd}

  .match-title{color:#fff;font-weight:bold;font-size:0.95em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .match-time{color:#555;font-size:0.78em;font-weight:normal}
  .odds-table{width:100%;border-collapse:collapse;font-size:0.82em;margin-bottom:10px}
  .odds-table th{background:#1a1a1a;color:#888;text-align:left;padding:5px 8px;font-weight:normal}
  .odds-table td{padding:4px 8px;border-bottom:1px solid #1a1a1a}
  .pos{color:#00ff88;font-weight:bold}
  .neg{color:#ff4444}
  .neutral{color:#888}
  .score-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .score-chip{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:4px 10px;font-size:0.8em}
  .score-chip.top{border-color:#00ff88;color:#00ff88}
  .score-chip.second{border-color:#88ff00;color:#88ff00}
  .score-chip.third{border-color:#ccff00;color:#ccff00}
  .label{color:#888;font-size:0.75em;margin-bottom:4px;margin-top:8px}
  .value-box{background:#0a2a0a;border:1px solid #00ff8844;border-radius:6px;padding:14px;margin-top:20px}
  .value-box h3{color:#00ff88;margin-bottom:10px;font-size:0.9em}
  .value-item{padding:5px 0;border-bottom:1px solid #0f2a0f;font-size:0.82em;color:#00ff88}
  .value-item .match-ref{color:#888;font-size:0.9em}
  .tier-a{background:#00ff8822;color:#00ff88;padding:2px 6px;border-radius:3px;font-size:0.75em;font-weight:bold}
  .tier-b{background:#ffcc0022;color:#ffcc00;padding:2px 6px;border-radius:3px;font-size:0.75em;font-weight:bold}
  .loading{color:#555;font-style:italic;padding:20px;text-align:center}
  .error{color:#ff4444;padding:10px;background:#1a0000;border-radius:4px;margin:10px 0;font-size:0.85em}
  .no-games{color:#555;font-size:0.85em;padding:10px 0;font-style:italic}
  /* ── Winner box ── */
  .winner-box{background:#0a1a0a;border:1px solid #00ff8833;border-radius:6px;padding:12px;margin-bottom:12px}
  .winner-box-title{color:#00ff88;font-size:0.78em;font-weight:bold;letter-spacing:1px;margin-bottom:8px}
  .winner-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:0.82em}
  .winner-name{min-width:140px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .winner-name.pick{color:#00ff88;font-weight:bold}
  .bar-wrap{flex:1;background:#1a1a1a;border-radius:3px;height:6px}
  .bar-fill{height:6px;border-radius:3px;background:#00ff88}
  .bar-fill.draw{background:#888}
  .bar-fill.away{background:#00ccff}
  .pct-label{min-width:38px;text-align:right;color:#888;font-size:0.8em}
  .winner-summary{margin-top:8px;font-size:0.8em;color:#aaa;border-top:1px solid #1a2a1a;padding-top:8px}
  /* ── Player props table ── */
  .section-hdr{color:#00ccff;font-size:0.82em;font-weight:bold;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #1a2a3a;letter-spacing:0.5px}
  .ptable{width:100%;border-collapse:collapse;font-size:0.8em}
  .ptable th{background:#161616;color:#666;text-align:left;padding:4px 6px;font-weight:normal;font-size:0.85em}
  .ptable td{padding:4px 6px;border-bottom:1px solid #161616;vertical-align:middle}
  .ptable tr:hover td{background:#141414}
  .pick-over{color:#00ff88;font-weight:bold}
  .pick-under{color:#ff9944;font-weight:bold}
  /* ── Confidence badges ── */
  .badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:0.73em;font-weight:bold;letter-spacing:0.5px}
  .badge-high{background:#00ff8822;color:#00ff88;border:1px solid #00ff8844}
  .badge-med{background:#ffcc0022;color:#ffcc00;border:1px solid #ffcc0044}
  .badge-low{background:#33333344;color:#666;border:1px solid #33333366}
  @media(max-width:600px){.winner-name{min-width:100px}}
</style>
</head>
<body>

<header>
  <h1>⚡ BETTING MODEL DASHBOARD</h1>
  <div class="token-bar">
    <div class="token-info">Tokens Left: <span id="tokensLeft">—</span></div>
    <div class="token-info">Used: <span id="tokensUsed">—</span></div>
    <div class="cache-info" id="cacheStatus">Cache: checking...</div>
    <button class="btn" onclick="refreshAll(false)">↻ Cache</button>
    <button class="btn btn-danger" onclick="refreshAll(true)">⚡ Refresh</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('all',event)">All Value Bets</div>
  <div class="tab" onclick="showTab('soccer',event)">⚽ Soccer</div>
  <div class="tab" onclick="showTab('nba',event)">🏀 NBA</div>
  <div class="tab" onclick="showTab('nfl',event)">🏈 NFL</div>
  <div class="tab" onclick="showTab('nhl',event)">🏒 NHL</div>
  <div class="tab" onclick="showTab('mlb',event)">⚾ MLB</div>
</div>

<div id="tab-all"    class="tab-content active"><div class="loading" id="all-loading">Loading...</div></div>
<div id="tab-soccer" class="tab-content"><div class="loading">Click Soccer tab to load</div></div>
<div id="tab-nba"    class="tab-content"><div class="loading">Click NBA tab to load</div></div>
<div id="tab-nfl"    class="tab-content"><div class="loading">Click NFL tab to load</div></div>
<div id="tab-nhl"    class="tab-content"><div class="loading">Click NHL tab to load</div></div>
<div id="tab-mlb"    class="tab-content"><div class="loading">Click MLB tab to load</div></div>

<script>
const API_KEY = '17b4d42651ab4e81ef298300544f5a21';
const BASE    = 'https://api.the-odds-api.com/v4';
const CACHE_TTL = 6 * 60 * 60 * 1000;
const allValueBets = [];
const loadedTabs = new Set();

const SPORT_TABS = {
  nba: {
    key: 'basketball_nba', label: '🏀 NBA', region: 'us',
    props: 'player_points,player_rebounds,player_assists,player_threes'
  },
  nfl: {
    key: 'americanfootball_nfl', label: '🏈 NFL', region: 'us',
    props: 'player_pass_yds,player_rush_yds,player_receiving_yds,player_pass_tds,player_receptions'
  },
  nhl: {
    key: 'icehockey_nhl', label: '🏒 NHL', region: 'us',
    props: 'player_goals,player_points,player_shots_on_goal,player_saves'
  },
  mlb: {
    key: 'baseball_mlb', label: '⚾ MLB', region: 'us',
    props: 'batter_home_runs,batter_hits,batter_rbis,batter_runs_scored,batter_total_bases'
  },
};

// ── Tab navigation ────────────────────────────────────────────────────────────
function showTab(name, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  if (!loadedTabs.has(name)) {
    loadedTabs.add(name);
    if (name === 'soccer') buildSoccer(false);
    else if (SPORT_TABS[name]) buildSportTab(name, false);
  }
}

// ── Cache ─────────────────────────────────────────────────────────────────────
function cacheKey(k)   { return 'bm_' + k + '_' + new Date().toDateString(); }
function getCache(k)   {
  try { const r = localStorage.getItem(cacheKey(k)); if (!r) return null;
    const {ts,data} = JSON.parse(r); return Date.now()-ts > CACHE_TTL ? null : data;
  } catch { return null; }
}
function setCache(k,d) { try { localStorage.setItem(cacheKey(k), JSON.stringify({ts:Date.now(),data:d})); } catch {} }
function clearAllCache(){ Object.keys(localStorage).filter(k=>k.startsWith('bm_')).forEach(k=>localStorage.removeItem(k)); }
function updateCacheStatus(){
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('bm_'));
  if (!keys.length) { document.getElementById('cacheStatus').textContent='Cache: empty'; return; }
  try { const ts=JSON.parse(localStorage.getItem(keys[0])).ts; const ago=Math.round((Date.now()-ts)/60000);
    document.getElementById('cacheStatus').textContent=`Cache: ${ago}m ago (${keys.length})`; }
  catch { document.getElementById('cacheStatus').textContent=`Cache: ${keys.length} stored`; }
}

// ── API fetch helpers ─────────────────────────────────────────────────────────
function updateTokens(res) {
  const rem = res.headers.get('x-requests-remaining');
  const used = res.headers.get('x-requests-used');
  if (rem)  document.getElementById('tokensLeft').textContent = rem;
  if (used) document.getElementById('tokensUsed').textContent = used;
}

async function apiFetch(sport, markets, region='uk', force=false) {
  const ck = `${sport}_${markets}`;
  if (!force) { const c = getCache(ck); if (c) return c; }
  const url = `${BASE}/sports/${sport}/odds/?apiKey=${API_KEY}&regions=${region}&markets=${markets}&oddsFormat=decimal`;
  const res = await fetch(url);
  updateTokens(res);
  if (!res.ok) throw new Error(`API ${res.status}: ${sport}`);
  const data = await res.json();
  setCache(ck, data);
  return data;
}

async function fetchEvents(sport, force=false) {
  const ck = `events_${sport}`;
  if (!force) { const c = getCache(ck); if (c) return c; }
  const res = await fetch(`${BASE}/sports/${sport}/events?apiKey=${API_KEY}&dateFormat=iso`);
  updateTokens(res);
  if (!res.ok) throw new Error(`API ${res.status}: events`);
  const data = await res.json();
  setCache(ck, data);
  return data;
}

async function fetchEventProps(sport, eventId, markets, region, force=false) {
  const ck = `props_${eventId}_${markets}`;
  if (!force) { const c = getCache(ck); if (c) return c; }
  const url = `${BASE}/sports/${sport}/events/${eventId}/odds?apiKey=${API_KEY}&regions=${region}&markets=${markets}&oddsFormat=decimal`;
  const res = await fetch(url);
  updateTokens(res);
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  setCache(ck, data);
  return data;
}

// ── Poisson model ─────────────────────────────────────────────────────────────
function poisson(lam, k) { let r=Math.exp(-lam); for(let i=1;i<=k;i++) r*=lam/i; return r; }
function correctScores(hXG, aXG, max=6) {
  const s=[];
  for(let h=0;h<=max;h++) for(let a=0;a<=max;a++) s.push({h,a,p:poisson(hXG,h)*poisson(aXG,a)});
  s.sort((a,b)=>b.p-a.p); return s;
}
function impliedProb(o) { return 1/o; }
function edge(mP, o)    { return ((mP-impliedProb(o))*100).toFixed(1); }
function edgeHtml(e) {
  const n=parseFloat(e);
  if (n>3)  return `<span class="pos">+${e}%</span>`;
  if (n<-3) return `<span class="neg">${e}%</span>`;
  return `<span class="neutral">${e}%</span>`;
}

// ── Confidence helpers ────────────────────────────────────────────────────────
function propConf(overOdds, underOdds) {
  if (!overOdds || !underOdds) return null;
  const oi=1/overOdds, ui=1/underOdds, tot=oi+ui;
  const op=(oi/tot)*100, up=(ui/tot)*100;
  const pick = op>=up ? 'OVER' : 'UNDER';
  const pct  = Math.max(op, up);
  const conf = pct>=68 ? 'HIGH' : pct>=58 ? 'MED' : 'LOW';
  return { pick, pct: pct.toFixed(1), conf, op: op.toFixed(1), up: up.toFixed(1) };
}

function badge(conf) {
  if (conf==='HIGH') return '<span class="badge badge-high">HIGH</span>';
  if (conf==='MED')  return '<span class="badge badge-med">MED</span>';
  return '<span class="badge badge-low">LOW</span>';
}

function pickHtml(pick) {
  return pick==='OVER'
    ? '<span class="pick-over">OVER</span>'
    : '<span class="pick-under">UNDER</span>';
}

// ── Winner prediction box ─────────────────────────────────────────────────────
function winnerBox(home, away, homeOdds, awayOdds, drawOdds) {
  if (!homeOdds || !awayOdds) return '';
  const hi=1/homeOdds, ai=1/awayOdds, di=drawOdds?1/drawOdds:0;
  const tot=hi+ai+di;
  const hp=(hi/tot)*100, ap=(ai/tot)*100, dp=(di/tot)*100;

  let winnerName, winnerPct;
  if (hp>=ap && hp>=dp) { winnerName=home; winnerPct=hp; }
  else if (ap>=hp && ap>=dp) { winnerName=away; winnerPct=ap; }
  else { winnerName='Draw'; winnerPct=dp; }

  const conf = winnerPct>=65 ? 'HIGH' : winnerPct>=55 ? 'MED' : 'LOW';

  const row = (name, pct, cls, isMed) => `
    <div class="winner-row">
      <span class="winner-name ${name===winnerName?'pick':''}">${name}</span>
      <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100).toFixed(0)}%"></div></div>
      <span class="pct-label">${pct.toFixed(1)}%</span>
    </div>`;

  return `<div class="winner-box">
    <div class="winner-box-title">🏆 WINNER PREDICTION</div>
    ${row(home, hp, '', false)}
    ${drawOdds ? row('Draw', dp, 'draw', true) : ''}
    ${row(away, ap, 'away', false)}
    <div class="winner-summary">
      Pick: <strong style="color:${winnerName!=='Draw'?'#00ff88':'#aaa'}">${winnerName}</strong>
      &nbsp;${badge(conf)}&nbsp;${winnerPct.toFixed(1)}% confidence
      &nbsp;·&nbsp; Odds: ${winnerName===home?homeOdds:winnerName===away?awayOdds:drawOdds}
    </div>
  </div>`;
}

// ── Best odds helpers ─────────────────────────────────────────────────────────
function bestOdds(ev, mktKey) {
  const best={};
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key===mktKey);
    if(!m) return;
    (m.outcomes||[]).forEach(o=>{if(!best[o.name]||o.price>best[o.name]) best[o.name]=o.price;});
  });
  return best;
}
function bestTotal(ev, line=2.5) {
  let ov=0,un=0;
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key==='totals'); if(!m) return;
    (m.outcomes||[]).forEach(o=>{
      if(Math.abs((o.point||2.5)-line)<0.3){
        if(o.name==='Over'&&o.price>ov) ov=o.price;
        if(o.name==='Under'&&o.price>un) un=o.price;
      }
    });
  });
  return {over:ov||null,under:un||null};
}
function estimateXG(hO,aO,dO,tot=2.5) {
  const hi=impliedProb(hO),ai=impliedProb(aO);
  return { homeXG: tot*(hi/(hi+ai)), awayXG: tot*(ai/(hi+ai)) };
}
function gameDate(iso) {
  return new Date(iso).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── Player props table renderer ───────────────────────────────────────────────
function renderProps(propData, title) {
  const lines = {};
  (propData.bookmakers||[]).forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      (mkt.outcomes||[]).forEach(o=>{
        const key=`${o.description||o.name}__${mkt.key}`;
        if(!lines[key]) lines[key]={player:o.description||o.name, market:mkt.key, line:o.point, bestOver:0, bestUnder:0};
        if(o.name==='Over'   && o.price>lines[key].bestOver)  lines[key].bestOver=o.price;
        if(o.name==='Under'  && o.price>lines[key].bestUnder) lines[key].bestUnder=o.price;
      });
    });
  });

  const allProps = Object.values(lines)
    .filter(p=>p.bestOver>0 && p.bestUnder>0 && p.line!=null)
    .map(p=>({...p, c:propConf(p.bestOver,p.bestUnder)}))
    .filter(p=>p.c)
    // Filter trivial: UNDER on a 0.5 line is nearly always ~99% and has no betting value
    .filter(p => !(p.c.pick==='UNDER' && p.line<=0.5))
    .sort((a,b)=>parseFloat(b.c.pct)-parseFloat(a.c.pct));

  // Cap at 3 per market type so stats are diverse (hits, RBIs, total bases, etc.)
  const mktCount = {};
  const props = [];
  for (const p of allProps) {
    mktCount[p.market] = (mktCount[p.market]||0);
    if (mktCount[p.market] < 3) { props.push(p); mktCount[p.market]++; }
    if (props.length >= 10) break;
  }

  if (!props.length) return `<div class="no-games">No player props available.</div>`;

  let html = `<div class="section-hdr">🎯 ${title} — TOP 10 PLAYER PREDICTIONS</div>
    <table class="ptable">
      <tr><th>#</th><th>Player</th><th>Stat</th><th>Line</th><th>Pick</th><th>Confidence</th><th>Prob%</th></tr>`;

  props.forEach((p,i)=>{
    const stat = p.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
    html += `<tr>
      <td style="color:#555">${i+1}</td>
      <td style="color:#fff;font-weight:bold">${p.player}</td>
      <td style="color:#aaa;font-size:0.9em">${stat}</td>
      <td style="color:#ffcc00">${p.line}</td>
      <td>${pickHtml(p.c.pick)}</td>
      <td>${badge(p.c.conf)}</td>
      <td style="color:#888">${p.c.pct}%</td>
    </tr>`;
  });
  html += '</table>';
  return html;
}

// ── Soccer goal scorer renderer ───────────────────────────────────────────────
function renderGoalScorers(propData) {
  const scorers = {};
  (propData.bookmakers||[]).forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      if (mkt.key !== 'player_goal_scorer_anytime') return;
      (mkt.outcomes||[]).forEach(o=>{
        if (!scorers[o.name] || o.price < scorers[o.name]) scorers[o.name]=o.price;
      });
    });
  });

  const list = Object.entries(scorers)
    .map(([name,odds])=>({name, odds, prob:(1/odds*100)}))
    .sort((a,b)=>b.prob-a.prob)
    .slice(0,10);

  if (!list.length) return '';

  let html = `<div class="section-hdr">⚽ TOP 10 LIKELY GOAL SCORERS</div>
    <table class="ptable">
      <tr><th>#</th><th>Player</th><th>Odds</th><th>Probability</th><th>Confidence</th></tr>`;

  list.forEach((s,i)=>{
    const conf = s.prob>=35?'HIGH':s.prob>=20?'MED':'LOW';
    html += `<tr>
      <td style="color:#555">${i+1}</td>
      <td style="color:#fff;font-weight:bold">${s.name}</td>
      <td style="color:#ffcc00">${s.odds}</td>
      <td style="color:#aaa">${s.prob.toFixed(1)}%</td>
      <td>${badge(conf)}</td>
    </tr>`;
  });
  html += '</table>';
  return html;
}

// ── SOCCER tab ────────────────────────────────────────────────────────────────
async function buildSoccer(force) {
  const container = document.getElementById('tab-soccer');
  container.innerHTML = '<div class="loading">Loading soccer...</div>';

  const leagues = [
    { key:'soccer_epl',                           label:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League',    props:true  },
    { key:'soccer_uefa_champs_league',            label:'🌍 Champions League',            props:false },
    { key:'soccer_spain_la_liga',                 label:'🇪🇸 La Liga',                    props:false },
    { key:'soccer_fifa_world_cup_qualifiers_europe', label:'🌐 WC Qualifiers',            props:false },
  ];

  let html = '';
  for (const lg of leagues) {
    try {
      const events = await apiFetch(lg.key, 'h2h,totals', 'uk', force);
      const now = new Date();
      const today = events.filter(e=>{
        const d=new Date(e.commence_time);
        return d>=now && d<=new Date(now.getTime()+4*24*60*60*1000);
      });

      html += `<div class="sport-section"><div class="sport-title">${lg.label} <span style="color:#555;font-size:0.8em">(${today.length} upcoming)</span></div>`;
      if (!today.length) { html+='<div class="no-games">No matches in next 4 days.</div></div>'; continue; }

      for (const ev of today) {
        const h2h = bestOdds(ev,'h2h');
        const home=ev.home_team, away=ev.away_team;
        const hO=h2h[home], aO=h2h[away], dO=h2h['Draw'];
        if (!hO||!aO) continue;

        const tot = bestTotal(ev,2.5);
        const {homeXG,awayXG} = estimateXG(hO,aO,dO||4,2.5);
        const scores = correctScores(homeXG,awayXG);
        let hw=0,dr=0,aw=0,ov=0,un=0,btts=0;
        scores.forEach(s=>{
          if(s.h>s.a) hw+=s.p; else if(s.h===s.a) dr+=s.p; else aw+=s.p;
          if(s.h+s.a>2.5) ov+=s.p; else un+=s.p;
          if(s.h>0&&s.a>0) btts+=s.p;
        });
        const hwE=parseFloat(edge(hw,hO)),drE=parseFloat(edge(dr,dO||99));
        const awE=parseFloat(edge(aw,aO));
        const ovE=tot.over?parseFloat(edge(ov,tot.over)):null;
        const unE=tot.under?parseFloat(edge(un,tot.under)):null;
        if(hwE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:`${home} Win`,e:hwE});
        if(drE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Draw',e:drE});
        if(awE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:`${away} Win`,e:awE});
        if(ovE&&ovE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Over 2.5',e:ovE});
        if(unE&&unE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Under 2.5',e:unE});

        const top5 = scores.slice(0,5);

        html += `<div class="match-card">
          <div class="match-title"><span>${home} vs ${away}</span><span class="match-time">${gameDate(ev.commence_time)}</span></div>
          ${winnerBox(home,away,hO,aO,dO)}
          <table class="odds-table">
            <tr><th>Outcome</th><th>Model%</th><th>Odds</th><th>Imp%</th><th>Edge</th></tr>
            <tr><td>${home}</td><td>${(hw*100).toFixed(1)}%</td><td>${hO}</td><td>${(impliedProb(hO)*100).toFixed(1)}%</td><td>${edgeHtml(hwE.toFixed(1))}</td></tr>
            ${dO?`<tr><td>Draw</td><td>${(dr*100).toFixed(1)}%</td><td>${dO}</td><td>${(impliedProb(dO)*100).toFixed(1)}%</td><td>${edgeHtml(drE.toFixed(1))}</td></tr>`:''}
            <tr><td>${away}</td><td>${(aw*100).toFixed(1)}%</td><td>${aO}</td><td>${(impliedProb(aO)*100).toFixed(1)}%</td><td>${edgeHtml(awE.toFixed(1))}</td></tr>
            ${tot.over?`<tr><td>Over 2.5</td><td>${(ov*100).toFixed(1)}%</td><td>${tot.over}</td><td>${(impliedProb(tot.over)*100).toFixed(1)}%</td><td>${edgeHtml(ovE.toFixed(1))}</td></tr>`:''}
            ${tot.under?`<tr><td>Under 2.5</td><td>${(un*100).toFixed(1)}%</td><td>${tot.under}</td><td>${(impliedProb(tot.under)*100).toFixed(1)}%</td><td>${edgeHtml(unE.toFixed(1))}</td></tr>`:''}
            <tr><td>BTTS</td><td>${(btts*100).toFixed(1)}%</td><td colspan="3" style="color:${btts>0.5?'#00ff88':'#ff6666'}">${btts>0.5?'YES — likely':'NO — unlikely'}</td></tr>
          </table>
          <div class="label">TOP 5 CORRECT SCORES (Poisson)</div>
          <div class="score-grid">
            ${top5.map((s,i)=>`<div class="score-chip ${i===0?'top':i===1?'second':i===2?'third':''}">${home.split(' ').pop()} ${s.h}–${s.a} ${away.split(' ').pop()} <span style="color:#555">${(s.p*100).toFixed(2)}%</span></div>`).join('')}
          </div>`;

        // EPL goal scorers
        if (lg.props) {
          try {
            const propData = await fetchEventProps(lg.key, ev.id, 'player_goal_scorer_anytime', 'uk', force);
            html += renderGoalScorers(propData);
          } catch(e) {
            html += `<div class="no-games" style="margin-top:8px">Goal scorer odds unavailable</div>`;
          }
        }

        html += '</div>';
      }
      html += '</div>';
    } catch(e) {
      html += `<div class="sport-section"><div class="sport-title">${lg.label}</div><div class="error">⚠ ${e.message}</div></div>`;
    }
  }
  container.innerHTML = html || '<div class="no-games">No soccer data.</div>';
}

// ── SPORT TAB builder (NBA/NFL/NHL/MLB) ───────────────────────────────────────
async function buildSportTab(name, force) {
  const s = SPORT_TABS[name];
  const container = document.getElementById('tab-' + name);
  container.innerHTML = `<div class="loading">Loading ${s.label}...</div>`;

  try {
    // 1. h2h bulk for winner predictions
    const h2hBulk = await apiFetch(s.key, 'h2h', s.region, force);

    // 2. events list for IDs
    const events = await fetchEvents(s.key, force);

    const now = new Date();
    const cutoff = new Date(now.getTime() + 48*60*60*1000);
    const upcoming = (events||[])
      .filter(e=>{ const d=new Date(e.commence_time); return d>=now && d<=cutoff; })
      .slice(0, 5); // top 5 upcoming games

    if (!upcoming.length) {
      container.innerHTML = `<div class="sport-section"><div class="sport-title">${s.label}</div><div class="no-games">No games in next 48 hours.</div></div>`;
      return;
    }

    let html = `<div class="sport-section"><div class="sport-title">${s.label} — ${upcoming.length} games</div>`;

    for (const ev of upcoming) {
      const home=ev.home_team, away=ev.away_team;

      // Get h2h odds from bulk data
      const h2hEv = (h2hBulk||[]).find(e=>e.id===ev.id);
      const h2h   = h2hEv ? bestOdds(h2hEv,'h2h') : {};
      const hO=h2h[home], aO=h2h[away];

      html += `<div class="match-card">
        <div class="match-title">
          <span>${home} vs ${away}</span>
          <span class="match-time">${gameDate(ev.commence_time)}</span>
        </div>`;

      // Winner box
      if (hO && aO) html += winnerBox(home, away, hO, aO, null);

      // Player props
      try {
        const propData = await fetchEventProps(s.key, ev.id, s.props, s.region, force);
        html += renderProps(propData, `${home} vs ${away}`);
      } catch(propErr) {
        html += `<div class="error">⚠ Props: ${propErr.message}</div>`;
      }

      html += '</div>';
    }

    html += '</div>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div class="error">⚠ ${s.label} error: ${e.message}</div>`;
  }
}

// ── ALL VALUE BETS ────────────────────────────────────────────────────────────
function buildAllTab() {
  const container = document.getElementById('tab-all');
  if (!allValueBets.length) {
    container.innerHTML='<div class="no-games">No soccer value bets detected. Check individual sport tabs for predictions.</div>';
    return;
  }
  allValueBets.sort((a,b)=>b.e-a.e);
  const tier=b=>b.e>=8?'<span class="tier-a">A</span>':'<span class="tier-b">B</span>';
  let html=`<div class="value-box"><h3>✅ SOCCER VALUE BETS — Edge > +3% (${allValueBets.length} found)</h3>`;
  allValueBets.forEach(v=>{
    html+=`<div class="value-item">${tier(v)} +${v.e}% &nbsp;|&nbsp; <strong>${v.bet}</strong> &nbsp;|&nbsp; <span class="match-ref">${v.match} (${v.sport})</span></div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

// ── Master refresh ────────────────────────────────────────────────────────────
async function refreshAll(force=false) {
  if (force) {
    clearAllCache();
    loadedTabs.clear();
    Object.keys(SPORT_TABS).forEach(k=>{
      document.getElementById('tab-'+k).innerHTML=`<div class="loading">Click the tab to load ${SPORT_TABS[k].label}</div>`;
    });
    document.getElementById('tab-soccer').innerHTML='<div class="loading">Click Soccer tab to reload</div>';
  }
  allValueBets.length=0;
  document.getElementById('all-loading') && (document.getElementById('all-loading').style.display='block');

  loadedTabs.add('soccer');
  await buildSoccer(force);
  buildAllTab();
  updateCacheStatus();
  document.getElementById('all-loading') && (document.getElementById('all-loading').style.display='none');
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', ()=>{ refreshAll(false); });
</script>
