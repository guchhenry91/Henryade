<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Betting Model Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#080808;color:#bbb;min-height:100vh}

  /* ── Header ── */
  header{background:#0d0d0d;border-bottom:1px solid #161616;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header h1{color:#00ff88;font-size:0.95em;letter-spacing:2px;font-weight:700}
  .token-bar{display:flex;gap:8px;align-items:center;font-size:0.75em;flex-wrap:wrap}
  .token-info{background:#111;padding:4px 10px;border-radius:20px;border:1px solid #1e1e1e;color:#444}
  .token-info span{color:#ffcc00;font-weight:700}
  .cache-info{color:#333;font-size:0.73em}
  .btn{background:transparent;color:#00ff88;border:1px solid #00ff8840;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:0.75em;transition:all .2s;font-weight:600}
  .btn:hover{background:#00ff8812;border-color:#00ff88}
  .btn-danger{border-color:#ff444440;color:#ff4444}
  .btn-danger:hover{background:#ff444412;border-color:#ff4444}

  /* ── Tabs ── */
  .tabs{display:flex;padding:0 16px;background:#0d0d0d;border-bottom:1px solid #161616;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:12px 16px;cursor:pointer;font-size:0.82em;color:#444;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;user-select:none;flex-shrink:0}
  .tab:hover{color:#888}
  .tab.active{color:#00ff88;border-bottom-color:#00ff88}

  /* ── Layout ── */
  .tab-content{display:none;padding:20px;max-width:1100px;margin:0 auto}
  .tab-content.active{display:block}
  .sport-section{margin-bottom:32px}
  .sport-title{color:#00ccff;font-size:0.78em;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #111;display:flex;align-items:center;gap:8px;letter-spacing:1.5px;text-transform:uppercase}
  .match-card{background:#0d0d0d;border:1px solid #181818;border-radius:10px;padding:16px;margin-bottom:14px;transition:border-color .2s}
  .match-card:hover{border-color:#222}
  .match-title{color:#fff;font-weight:600;font-size:0.93em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .match-time{color:#333;font-size:0.73em;font-weight:normal;white-space:nowrap}

  /* ── Odds table ── */
  .odds-table{width:100%;border-collapse:collapse;font-size:0.78em;margin-bottom:12px;overflow-x:auto;display:block}
  .odds-table th{background:#111;color:#444;text-align:left;padding:6px 8px;font-weight:500;white-space:nowrap}
  .odds-table td{padding:5px 8px;border-bottom:1px solid #101010;white-space:nowrap}
  .pos{color:#00ff88;font-weight:700}
  .neg{color:#ff4444}
  .neutral{color:#444}

  /* ── Score chips ── */
  .score-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .score-chip{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:5px 12px;font-size:0.75em;white-space:nowrap}
  .score-chip.top{border-color:#00ff8850;color:#00ff88;background:#00ff8808}
  .score-chip.second{border-color:#88ff0035;color:#88ff00}
  .score-chip.third{border-color:#ccff0025;color:#ccff00}
  .label{color:#333;font-size:0.7em;margin-bottom:6px;margin-top:10px;text-transform:uppercase;letter-spacing:0.5px}

  /* ── Value box ── */
  .value-box{background:#0a0a0a;border:1px solid #181818;border-radius:10px;padding:18px;margin-top:16px}
  .value-box h3{color:#00ff88;margin-bottom:12px;font-size:0.82em;letter-spacing:1.5px;text-transform:uppercase}
  .value-item{padding:7px 0;border-bottom:1px solid #101010;font-size:0.81em;color:#00ff88}
  .value-item .match-ref{color:#444;font-size:0.9em}

  /* ── Tier badges ── */
  .tier-a{background:#00ff8815;color:#00ff88;padding:2px 9px;border-radius:12px;font-size:0.7em;font-weight:700;border:1px solid #00ff8840;display:inline-block}
  .tier-b{background:#ffcc0012;color:#ffcc00;padding:2px 9px;border-radius:12px;font-size:0.7em;font-weight:700;border:1px solid #ffcc0030;display:inline-block}

  /* ── Confidence badges ── */
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:0.68em;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
  .badge-high{background:#00ff8812;color:#00ff88;border:1px solid #00ff8845;box-shadow:0 0 10px #00ff8815}
  .badge-med{background:#ffcc0012;color:#ffcc00;border:1px solid #ffcc0040}
  .badge-low{background:#ffffff06;color:#383838;border:1px solid #222}

  /* ── Pick cards ── */
  .section-hdr{color:#00ccff;font-size:0.72em;font-weight:700;margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid #111;letter-spacing:1.5px;text-transform:uppercase}
  .pick-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:6px}
  .pick-card{background:#101010;border:1px solid #1a1a1a;border-radius:8px;padding:14px;position:relative;transition:border-color .2s}
  .pick-card:hover{border-color:#252525}
  .pick-card.best-pick{border-color:#00ff8828;background:#0a110a}
  .pick-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .pick-card-player{font-size:0.9em;font-weight:600;color:#ddd;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pick-card.best-pick .pick-card-player{color:#fff}
  .pick-card-stat{font-size:0.68em;color:#383838;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
  .pick-card-line{font-size:1.6em;font-weight:700;color:#ffcc00;line-height:1;margin-bottom:6px}
  .pick-card-direction{font-size:0.88em;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .pick-card-pct{font-size:0.75em;color:#333;font-weight:400}
  .pick-card-reason{font-size:0.7em;color:#383838;border-top:1px solid #181818;padding-top:8px;margin-top:4px;line-height:1.5}
  .score-badge{display:inline-block;font-size:0.68em;color:#444;background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:1px 7px;cursor:help;position:relative}
  .score-badge:hover .score-tip{display:block}
  .score-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:10px 12px;min-width:200px;z-index:200;font-size:1.1em;line-height:1.8;white-space:nowrap;box-shadow:0 4px 20px #000a;pointer-events:none}
  .score-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#222}
  .pick-over{color:#00ff88;font-weight:700}
  .pick-under{color:#ff9944;font-weight:700}

  /* ── My Picks slip ── */
  .my-picks-btn{position:fixed;bottom:20px;right:20px;background:#00ff88;color:#000;border:none;border-radius:50px;padding:10px 18px;font-size:0.82em;font-weight:700;cursor:pointer;z-index:1000;box-shadow:0 4px 20px #00ff8840;transition:all .2s}
  .my-picks-btn:hover{background:#00cc66;transform:scale(1.05)}
  .my-picks-btn .slip-count{background:#000;color:#00ff88;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:0.75em;margin-left:6px}
  .slip-panel{position:fixed;bottom:70px;right:20px;width:320px;max-height:70vh;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:12px;z-index:999;display:none;flex-direction:column;box-shadow:0 8px 40px #000a}
  .slip-panel.open{display:flex}
  .slip-header{padding:14px 16px;border-bottom:1px solid #181818;display:flex;justify-content:space-between;align-items:center}
  .slip-header h3{color:#00ff88;font-size:0.82em;font-weight:700;letter-spacing:1.5px}
  .slip-body{overflow-y:auto;flex:1;padding:10px}
  .slip-item{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
  .slip-item-player{color:#ddd;font-size:0.82em;font-weight:600}
  .slip-item-detail{color:#444;font-size:0.7em;margin-top:2px}
  .slip-item-pick{display:flex;gap:6px;margin-top:8px}
  .slip-pick-btn{flex:1;padding:5px 0;border-radius:6px;border:1px solid #222;background:#0a0a0a;color:#444;font-size:0.75em;font-weight:700;cursor:pointer;transition:all .15s}
  .slip-pick-btn.over.active{background:#00ff8815;color:#00ff88;border-color:#00ff8850}
  .slip-pick-btn.under.active{background:#ff994415;color:#ff9944;border-color:#ff994450}
  .slip-pick-btn:hover{background:#151515}
  .slip-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:#333;cursor:pointer;font-size:0.9em;padding:2px 6px}
  .slip-remove:hover{color:#ff4444}
  .slip-footer{padding:12px 16px;border-top:1px solid #181818}
  .slip-empty{color:#333;font-size:0.8em;text-align:center;padding:20px}
  .pick-card-select{display:flex;gap:5px;margin-top:10px;border-top:1px solid #181818;padding-top:10px}
  .pick-select-btn{flex:1;padding:5px 0;border-radius:6px;border:1px solid #1a1a1a;background:#0a0a0a;color:#383838;font-size:0.72em;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
  .pick-select-btn:hover{background:#151515;color:#666}
  .pick-select-btn.over.sel{background:#00ff8815;color:#00ff88;border-color:#00ff8840}
  .pick-select-btn.under.sel{background:#ff994415;color:#ff9944;border-color:#ff994440}

  /* ── Hero section ── */
  .hero-section{background:linear-gradient(160deg,#0a120a 0%,#0d0d0d 60%);border:1px solid #00ff8820;border-radius:12px;padding:20px;margin-bottom:20px}
  .hero-title{color:#00ff88;font-size:0.78em;font-weight:700;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .hero-pick{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #0f0f0f;flex-wrap:wrap}
  .hero-pick:last-child{border-bottom:none}
  .hero-rank{font-size:0.9em;color:#252525;min-width:22px;font-weight:700;text-align:center}
  .hero-pick.rank-1 .hero-rank{color:#00ff88}
  .hero-pick.rank-2 .hero-rank{color:#00cc66}
  .hero-player{font-weight:600;color:#ccc;font-size:0.88em}
  .hero-detail{color:#383838;font-size:0.75em;margin-top:2px}

  /* ── Record bar ── */
  .record-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .record-stat{background:#0f0f0f;border:1px solid #181818;border-radius:8px;padding:12px 18px;text-align:center;min-width:72px}
  .record-num{font-size:1.5em;font-weight:700;line-height:1}
  .record-label{font-size:0.62em;color:#383838;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .streak-chip{background:#0f0f0f;border:1px solid #181818;border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .streak-val{font-size:0.9em;font-weight:700}
  .streak-w{color:#00ff88}
  .streak-l{color:#ff4444}

  /* ── History table ── */
  .ptable{width:100%;border-collapse:collapse;font-size:0.78em}
  .ptable th{background:#0f0f0f;color:#383838;text-align:left;padding:7px 8px;font-weight:500;font-size:0.82em;border-bottom:1px solid #181818}
  .ptable td{padding:6px 8px;border-bottom:1px solid #0d0d0d;vertical-align:middle}
  .ptable tr:hover td{background:#0c0c0c}
  .mark-btn{padding:3px 10px;border-radius:12px;cursor:pointer;font-size:0.72em;font-weight:600;border:1px solid transparent;transition:all .15s}
  .mark-w{background:#00ff8812;color:#00ff88;border-color:#00ff8840}
  .mark-w:hover{background:#00ff8825}
  .mark-l{background:#ff444412;color:#ff4444;border-color:#ff444440}
  .mark-l:hover{background:#ff444425}
  .mark-v{background:#ffffff06;color:#383838;border-color:#1e1e1e}
  .mark-v:hover{background:#151515}

  /* ── State ── */
  .loading{color:#282828;font-style:italic;padding:40px;text-align:center;font-size:0.88em}
  .error{color:#ff4444;padding:12px 16px;background:#110000;border-radius:8px;margin:10px 0;font-size:0.82em;border:1px solid #ff444428}
  .no-games{color:#2a2a2a;font-size:0.82em;padding:12px 0;font-style:italic}

  /* ── Winner box ── */
  .winner-box{background:#0a0f0a;border:1px solid #161c16;border-radius:8px;padding:14px;margin-bottom:14px}
  .winner-box-title{color:#00ff88;font-size:0.7em;font-weight:700;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase}
  .winner-row{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:0.82em}
  .winner-name{min-width:130px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .winner-name.pick{color:#fff;font-weight:600}
  .bar-wrap{flex:1;background:#111;border-radius:4px;height:4px}
  .bar-fill{height:4px;border-radius:4px;background:#00ff88;transition:width .5s}
  .bar-fill.draw{background:#444}
  .bar-fill.away{background:#00ccff}
  .pct-label{min-width:38px;text-align:right;color:#444;font-size:0.78em}
  .winner-summary{margin-top:10px;font-size:0.78em;color:#666;border-top:1px solid #111;padding-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* ── Mobile ── */
  @media(max-width:640px){
    .pick-cards{grid-template-columns:1fr 1fr}
    .winner-name{min-width:90px}
    .tab{padding:10px 10px;font-size:0.76em}
    .record-stat,.streak-chip{padding:10px 12px}
    .record-num{font-size:1.2em}
    .hero-pick{gap:8px}
    header{padding:10px 14px}
  }
  @media(max-width:380px){
    .pick-cards{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <h1>⚡ BETTING MODEL DASHBOARD</h1>
  <div class="token-bar">
    <div class="token-info">Tokens Left: <span id="tokensLeft">—</span></div>
    <div class="token-info">Used: <span id="tokensUsed">—</span></div>
    <div class="cache-info" id="cacheStatus">Cache: checking...</div>
    <button class="btn" onclick="refreshAll(false)">↻ Cache</button>
    <button class="btn btn-danger" onclick="if(_tokensLeft!==null&&_tokensLeft<=TOKEN_WARN){if(!confirm(`Only ${_tokensLeft} tokens left. Hard refresh will use ~10 tokens. Continue?`))return;}refreshAll(true)">⚡ Refresh</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('all',event)">All Value Bets</div>
  <div class="tab" onclick="showTab('soccer',event)">⚽ Soccer</div>
  <div class="tab" onclick="showTab('nba',event)">🏀 NBA</div>
  <div class="tab" onclick="showTab('nfl',event)">🏈 NFL</div>
  <div class="tab" onclick="showTab('nhl',event)">🏒 NHL</div>
  <div class="tab" onclick="showTab('mlb',event)">⚾ MLB</div>
  <div class="tab" onclick="showTab('history',event)">📊 History</div>
</div>

<div id="tab-all"    class="tab-content active"><div class="loading" id="all-loading">Loading...</div></div>
<div id="tab-soccer" class="tab-content"><div class="loading">Loading...</div></div>
<div id="tab-nba"    class="tab-content"><div class="loading">Loading...</div></div>
<div id="tab-nfl"    class="tab-content"><div class="loading">Loading...</div></div>
<div id="tab-nhl"    class="tab-content"><div class="loading">Loading...</div></div>
<div id="tab-mlb"     class="tab-content"><div class="loading">Loading...</div></div>
<div id="tab-history" class="tab-content"><div class="loading">Loading...</div></div>

<script>
const API_KEY = '17b4d42651ab4e81ef298300544f5a21';
const BASE    = 'https://api.the-odds-api.com/v4';
const CACHE_TTL    = 3 * 60 * 60 * 1000; // 3hrs — lines move fast, keep data fresh without hammering the API

// ── All dates use US Eastern timezone (matches ESPN + US sportsbooks) ─────────
const TZ = 'America/New_York';
function todayET() {
  // Returns YYYY-MM-DD in US Eastern time
  return new Date().toLocaleDateString('en-CA', { timeZone: TZ }); // en-CA = YYYY-MM-DD format
}
function dateToET(d) {
  // Converts any Date/ISO string to YYYY-MM-DD in US Eastern
  return new Date(d).toLocaleDateString('en-CA', { timeZone: TZ });
}
function displayDateET(iso) {
  // Human-readable: "Wed, 2 Apr 19:30" in US Eastern
  return new Date(iso).toLocaleString('en-GB', { timeZone: TZ, weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}
const TOKEN_WARN   = 10;   // show warning banner below this many tokens remaining
const TOKEN_BLOCK  = 3;    // block all live API calls below this — serve cache only
let   _tokensLeft  = null; // updated on every response header
const allValueBets = [];
const allPropBets  = [];   // slate-wide best prop pick per game, all sports
const loadedTabs = new Set();
const tabLoadedAt = {}; // tracks when each tab last loaded, for "X mins ago" display

function stampTab(name) {
  tabLoadedAt[name] = Date.now();
  const el = document.getElementById('tab-stamp-' + name);
  if (el) el.textContent = 'Updated just now';
}
function getTabAge(name) {
  const ts = tabLoadedAt[name];
  if (!ts) return null;
  const mins = Math.round((Date.now() - ts) / 60000);
  return mins < 1 ? 'Updated just now' : `Updated ${mins} min${mins !== 1 ? 's' : ''} ago`;
}

const SPORT_TABS = {
  nba: {
    key: 'basketball_nba', label: '🏀 NBA', region: 'us',
    props: 'player_points,player_rebounds,player_assists,player_threes,player_blocks,player_steals,player_turnovers'
  },
  nfl: {
    key: 'americanfootball_nfl', label: '🏈 NFL', region: 'us',
    props: 'player_pass_yds,player_rush_yds,player_receiving_yds,player_pass_tds,player_receptions'
  },
  nhl: {
    key: 'icehockey_nhl', label: '🏒 NHL', region: 'us',
    props: 'player_shots_on_goal,player_points,player_assists,player_goals,player_power_play_points,player_blocked_shots'
  },
  mlb: {
    key: 'baseball_mlb', label: '⚾ MLB', region: 'us',
    props: 'batter_home_runs,batter_hits,batter_rbis,batter_runs_scored,batter_total_bases,batter_strikeouts,batter_walks,pitcher_strikeouts,pitcher_earned_runs'
  },
};

// ── ESPN Stats Layer ──────────────────────────────────────────────────────────
// Maps Odds API market keys → ESPN stat keys per league
const ESPN_STAT_MAP = {
  // NBA — v3 uses totalRebounds, compound threePointFieldGoalsMade-...Attempted
  player_points:           { nba: 'points', nhl: 'points' },
  player_rebounds:         { nba: 'totalRebounds' },
  player_assists:          { nba: 'assists', nhl: 'assists' },
  player_threes:           { nba: 'threePointFieldGoalsMade' }, // v3 compound — parser takes first number
  player_blocks:           { nba: 'blocks' },
  player_steals:           { nba: 'steals' },
  player_made_field_goals: { nba: 'fieldGoalsMade' },
  player_turnovers:        { nba: 'turnovers' },
  // NFL
  player_pass_yds:         { nfl: 'passingYards' },
  player_rush_yds:         { nfl: 'rushingYards' },
  player_receiving_yds:    { nfl: 'receivingYards' },
  player_pass_tds:         { nfl: 'passingTouchdowns' },
  player_receptions:       { nfl: 'receptions' },
  // NHL — v3 uses shotsTotal not shots, powerPlayGoals+Assists for PPP
  player_shots_on_goal:    { nhl: 'shotsTotal' },
  player_goals:            { nhl: 'goals' },
  player_power_play_points:{ nhl: 'powerPlayGoals' }, // proxy — PPG is part of PPP
  player_blocked_shots:    { nhl: 'blockedShots' },
  // MLB batters — v3 uses RBIs (capitalised)
  batter_hits:             { mlb: 'hits' },
  batter_home_runs:        { mlb: 'homeRuns' },
  batter_rbis:             { mlb: 'RBIs' },
  batter_runs_scored:      { mlb: 'runs' },
  batter_total_bases:      { mlb: 'totalBases' },
  batter_strikeouts:       { mlb: 'strikeouts' },
  batter_walks:            { mlb: 'walks' },
  // MLB pitchers
  pitcher_strikeouts:      { mlb: 'strikeouts' },
  pitcher_earned_runs:     { mlb: 'earnedRuns' },
};

const ESPN_LEAGUE_CFG = {
  nba: { sport: 'basketball',       league: 'nba' },
  nfl: { sport: 'americanfootball', league: 'nfl' },
  nhl: { sport: 'hockey',           league: 'nhl' },
  mlb: { sport: 'baseball',         league: 'mlb' },
};

// Persistent caches — survive page refresh, avoid re-fetching ESPN data
const _ATHLETE_CACHE_KEY = 'bm_athlete_ids_v2';
const _INJURY_CACHE_KEY  = 'bm_injury_v1';
const _GAMELOG_CACHE_KEY  = 'bm_gamelogs_v1';
const _STANDINGS_CACHE_KEY = 'bm_standings_v1';

function _loadCache(key) { try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; } }
function _saveCache(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch {} }

// Athlete ID cache — persistent across refreshes (players don't change IDs)
const _athleteIdCache = _loadCache(_ATHLETE_CACHE_KEY);

// Search ESPN for an athlete ID by name. Returns athlete ID string or null.
async function espnAthleteId(sport, league, playerName) {
  const cacheKey = `${league}__${playerName}`;
  // Return cached ID if found. Retry nulls (may have been cached from dead v2 endpoint)
  if (_athleteIdCache[cacheKey]) return _athleteIdCache[cacheKey]; // found = use it
  // If cached as null, still retry — v3 endpoint may succeed where v2 failed
  try {
    const pLower = playerName.toLowerCase();
    const lastName = pLower.split(' ').filter(w => w.length > 2).pop() || pLower;

    // Use ESPN common/v3 search — works across all sports (v2 is dead for MLB/NBA)
    const trySearch = async (q) => {
      const res = await fetch(`https://site.web.api.espn.com/apis/common/v3/search?query=${encodeURIComponent(q)}&limit=8&type=player&sport=${sport}&league=${league}`);
      if (!res.ok) return null;
      const data = await res.json();
      const athletes = data.items || [];
      return athletes.find(a => {
        const n = (a.displayName || a.fullName || '').toLowerCase();
        return n === pLower || n.includes(lastName);
      }) || null;
    };

    let match = await trySearch(playerName); // full name first (more accurate with v3)
    if (!match && lastName !== pLower) match = await trySearch(lastName); // fallback to last name

    const id = match ? (match.id || null) : null;
    _athleteIdCache[cacheKey] = id;
    _saveCache(_ATHLETE_CACHE_KEY, _athleteIdCache);
    return id;
  } catch { _athleteIdCache[cacheKey] = null; return null; }
}

// Fetch gamelog from ESPN common/v3 endpoint — works for all sports.
// Returns per-game entries with stat value and home/away flag, or null.
// Handles compound stats like "9-21" (made-attempted) by taking the first number.
const _gamelogRawCache = {};
async function espnPlayerGamelog(sport, league, athleteId, statKey) {
  try {
    // Cache raw gamelog per athlete — reused by stats + rest factor
    const glKey = `${league}__${athleteId}`;
    let data = _gamelogRawCache[glKey];
    if (!data) {
      const res = await fetch(
        `https://site.web.api.espn.com/apis/common/v3/sports/${sport}/${league}/athletes/${athleteId}/gamelog`
      );
      if (!res.ok) return null;
      data = await res.json();
      _gamelogRawCache[glKey] = data; // cache for reuse by getRestFactor
    }

    // v3 format: top-level "names" array for stat keys, "seasonTypes" with events
    const names = data.names || [];
    let idx = names.indexOf(statKey);

    // Handle compound stat keys: "threePointFieldGoalsMade" is stored as
    // "threePointFieldGoalsMade-threePointFieldGoalsAttempted" in v3
    if (idx === -1) {
      idx = names.findIndex(n => n.startsWith(statKey + '-') || n === statKey);
    }
    // Also try common renames between v2 and v3
    const v3Renames = {
      rebounds: 'totalRebounds', rbi: 'RBIs',       // NBA/MLB
      shots: 'shotsTotal', blockedShots: 'blocked',  // NHL — v3 uses different names
      powerPlayPoints: 'powerPlayGoals',              // NHL — proxy PPG for PPP gamelog
    };
    if (idx === -1 && v3Renames[statKey]) {
      idx = names.indexOf(v3Renames[statKey]);
    }
    if (idx === -1) return null;

    const entries = []; // { val, isHome, gameDate }
    const eventsMap = data.events || {};

    for (const st of (data.seasonTypes || [])) {
      for (const cat of (st.categories || [])) {
        for (const ev of (cat.events || [])) {
          const rawVal = (ev.stats || [])[idx];
          if (rawVal == null) continue;
          let val;
          if (typeof rawVal === 'string' && rawVal.includes('-')) {
            val = parseFloat(rawVal.split('-')[0]);
          } else {
            val = parseFloat(rawVal);
          }
          if (isNaN(val)) continue;

          const evInfo = eventsMap[ev.eventId] || {};
          const isHome = evInfo.homeTeamId
            ? true
            : (ev.atVs !== '@');
          const gameDate = evInfo.gameDate || null;
          entries.push({ val, isHome, gameDate });
        }
      }
    }
    return entries.length ? entries : null;
  } catch { return null; }
}

// ── Negative Binomial Distribution ────────────────────────────────────────────
// Replaces simple L5 average comparison with full probability distribution.
// Given a player's mean and variance, calculates exact P(OVER line) or P(UNDER line).
// Handles overdispersion (variance > mean) which Poisson cannot.

// Negative binomial PMF: P(X=k) = C(k+r-1, k) * p^r * (1-p)^k
// Parameterized from mean (μ) and variance (σ²): r = μ²/(σ²-μ), p = μ/σ²
function negBinomCDF(mean, variance, threshold) {
  // If variance <= mean, use Poisson (no overdispersion)
  if (variance <= mean || mean <= 0) {
    let cdf = 0;
    for (let k = 0; k <= Math.floor(threshold); k++) {
      cdf += poisson(mean, k);
    }
    return Math.min(1, Math.max(0, cdf));
  }
  // Negative binomial parameters
  const r = (mean * mean) / (variance - mean);
  const p = mean / variance;
  if (r <= 0 || p <= 0 || p >= 1) return 0.5; // degenerate — return neutral

  // CDF: sum PMF from 0 to floor(threshold)
  let cdf = 0;
  const maxK = Math.floor(threshold);
  // Use log-space to avoid overflow for large k
  let logPMF = r * Math.log(p); // log(P(X=0)) = r*log(p)
  cdf += Math.exp(logPMF);
  for (let k = 1; k <= maxK; k++) {
    // Recurrence: P(X=k) = P(X=k-1) * (k+r-1)/k * (1-p)
    logPMF += Math.log((k + r - 1) / k) + Math.log(1 - p);
    cdf += Math.exp(logPMF);
    if (cdf > 0.999) break; // numerical stability
  }
  return Math.min(1, Math.max(0, cdf));
}

// Returns P(OVER threshold) using negative binomial distribution
function probOverLine(mean, variance, line) {
  return 1 - negBinomCDF(mean, variance, line);
}

// Master stats fetcher — negative binomial distribution + hot/cold streak + home/away split
// Returns { signal, hitProb, avg, variance, ... } with distribution-based probability
async function getStatSignal(leagueShort, playerName, market, line, isHomeGame = null) {
  const cfg     = ESPN_LEAGUE_CFG[leagueShort];
  if (!cfg) return null;
  const statKey = (ESPN_STAT_MAP[market] || {})[leagueShort];
  if (!statKey) return null;

  const athleteId = await espnAthleteId(cfg.sport, cfg.league, playerName);
  if (!athleteId) return null;

  const entries = await espnPlayerGamelog(cfg.sport, cfg.league, athleteId, statKey);
  if (!entries || !entries.length) return null;

  const vals    = entries.map(e => e.val);
  const recent5 = vals.slice(-5);
  const recent15 = vals.slice(-15);
  if (!recent5.length) return null;
  const avg5    = recent5.reduce((a,b)=>a+b,0) / recent5.length;
  const avg15   = recent15.length >= 5 ? recent15.reduce((a,b)=>a+b,0) / recent15.length : avg5;

  // ── Negative binomial: compute variance from recent games ──
  // Use max(L10, L15) for variance estimation — need enough samples
  const varianceSample = vals.slice(-Math.max(10, recent15.length));
  const sampleMean = varianceSample.reduce((a,b)=>a+b,0) / varianceSample.length;
  const variance = varianceSample.length >= 5
    ? varianceSample.reduce((sum,v) => sum + (v - sampleMean)**2, 0) / (varianceSample.length - 1)
    : sampleMean * 1.5; // fallback: assume moderate overdispersion

  // Effective mean: use location-specific or L5
  let effectiveMean = avg5;
  let locationLabel = '';
  if (isHomeGame !== null) {
    const locationEntries = entries.filter(e => e.isHome === isHomeGame).slice(-10);
    if (locationEntries.length >= 3) {
      effectiveMean = locationEntries.map(e=>e.val).reduce((a,b)=>a+b,0) / locationEntries.length;
      const loc = isHomeGame ? 'Home' : 'Away';
      locationLabel = `🏠 ${loc} avg: ${effectiveMean.toFixed(1)} (${locationEntries.length} games)`;
    }
  }

  if (!line || line === 0) return null;

  // ── Distribution-based hit probability ──
  const hitProbOver  = probOverLine(effectiveMean, variance, line);
  const hitProbUnder = 1 - hitProbOver;
  // How many of the last games actually hit OVER?
  const actualHitRate = recent5.filter(v => v > line).length / recent5.length;

  // ── Signal from distribution (replaces simple diff thresholds) ──
  // Signal = how far the distribution probability deviates from 50%
  // P(OVER) = 70% → signal = +0.20 (strong OVER)
  // P(OVER) = 55% → signal = +0.05 (mild OVER)
  // P(OVER) = 45% → signal = -0.05 (mild UNDER)
  const distSignal = (hitProbOver - 0.5) * 0.5; // scale: 70% → +0.10, 80% → +0.15

  // ── Hot/Cold streak ──
  const trendRatio = avg15 > 0 ? avg5 / avg15 : 1;
  let streakSignal = 0;
  let streakLabel  = '';
  if      (trendRatio >= 1.25) { streakSignal =  0.15; streakLabel = `🔥 HOT: L5 ${avg5.toFixed(1)} vs L15 ${avg15.toFixed(1)}`; }
  else if (trendRatio >= 1.10) { streakSignal =  0.06; streakLabel = `↗ Trending up: L5 ${avg5.toFixed(1)} vs L15 ${avg15.toFixed(1)}`; }
  else if (trendRatio <= 0.75) { streakSignal = -0.15; streakLabel = `🥶 COLD: L5 ${avg5.toFixed(1)} vs L15 ${avg15.toFixed(1)}`; }
  else if (trendRatio <= 0.90) { streakSignal = -0.06; streakLabel = `↘ Trending down: L5 ${avg5.toFixed(1)} vs L15 ${avg15.toFixed(1)}`; }

  // ── Combined signal: distribution + streak ──
  const totalSignal = Math.max(-0.35, Math.min(0.35, distSignal + streakSignal * 0.4));

  // ── Staleness detection — how old is the most recent game in ESPN's data? ──
  const gameDates = entries.filter(e => e.gameDate).map(e => new Date(e.gameDate));
  const latestGameDate = gameDates.length ? new Date(Math.max(...gameDates)) : null;
  const daysStale = latestGameDate ? Math.floor((new Date() - latestGameDate) / (1000*60*60*24)) : null;
  const staleLabel = daysStale !== null && daysStale >= 2
    ? `📅 Stats from ${latestGameDate.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:TZ})} (${daysStale}d ago${daysStale >= 4 ? ' ⚠️ STALE' : ''})`
    : null;

  // ── Labels ──
  const consistencyTag = variance <= effectiveMean ? '🎯 Consistent' : variance >= effectiveMean * 2 ? '🎲 Volatile' : '';
  const diff = (effectiveMean - line) / line;
  const probLabel = `📊 ${(hitProbOver*100).toFixed(0)}% OVER / ${(hitProbUnder*100).toFixed(0)}% UNDER (L${varianceSample.length} distribution)`;
  const avgLabel = `📈 L5: ${avg5.toFixed(1)} avg ${consistencyTag} (hit ${(actualHitRate*100).toFixed(0)}% of L5)`;

  const labels = [probLabel, avgLabel, streakLabel, locationLabel, staleLabel].filter(Boolean);

  return {
    avg: parseFloat(avg5.toFixed(2)), games: recent5.length,
    signal: totalSignal, signalLabel: labels[0], extraLabels: labels.slice(1), diff,
    hitProbOver, hitProbUnder, variance: parseFloat(variance.toFixed(2)),
    actualHitRate, consistencyTag, daysStale, staleLabel,
  };
}

const _weatherCache = {};

async function getWeatherForGame(homeTeam, sportLabel, gameDateIso) {
  // Only applies to NFL and MLB
  if (!sportLabel.includes('NFL') && !sportLabel.includes('MLB')) return null;
  // Skip dome teams
  if (DOME_TEAMS.has(homeTeam)) return null;

  const coords = TEAM_CITY_COORDS[homeTeam];
  if (!coords) return null;

  const cacheKey = `wx__${homeTeam}__${gameDateIso.split('T')[0]}`;
  if (_weatherCache[cacheKey] !== undefined) return _weatherCache[cacheKey];

  try {
    const date = gameDateIso.split('T')[0];
    const [lat, lon] = coords;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=wind_speed_10m_max,precipitation_sum,temperature_2m_max&start_date=${date}&end_date=${date}&wind_speed_unit=mph&timezone=auto`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000); // 5s timeout — don't block game card render
    let res;
    try { res = await fetch(url, { signal: ctrl.signal }); } finally { clearTimeout(timer); }
    if (!res || !res.ok) { _weatherCache[cacheKey] = null; return null; }
    const data  = await res.json();
    const wind  = data.daily?.wind_speed_10m_max?.[0] || 0;
    const rain  = data.daily?.precipitation_sum?.[0]  || 0;
    const temp  = data.daily?.temperature_2m_max?.[0] || 70;

    let penalty = 0;
    const flags = [];

    if (sportLabel.includes('NFL')) {
      if (wind >= 20)       { penalty -= 0.20; flags.push(`💨 Wind ${wind.toFixed(0)}mph — passing/kicking impacted`); }
      else if (wind >= 12)  { penalty -= 0.10; flags.push(`💨 Wind ${wind.toFixed(0)}mph — mild passing concern`); }
      if (rain >= 5)        { penalty -= 0.10; flags.push(`🌧 Rain ${rain.toFixed(0)}mm — wet ball, rushing game likely`); }
      if (temp <= 20)       { penalty -= 0.08; flags.push(`🥶 ${temp.toFixed(0)}°F — cold weather factor`); }
    }

    if (sportLabel.includes('MLB')) {
      // Wind: raised threshold — 15mph is normal, only flag 18+ (and we can't know direction)
      if (wind >= 18) {
        penalty -= 0.04; // reduced from 0.08 — direction unknown, could help or hurt
        flags.push(`💨 Wind ${wind.toFixed(0)}mph — monitor park factors`);
      }
      // Rain: only penalize significant rain (delay/cancel risk), not drizzle
      if (rain >= 7)        { penalty -= 0.10; flags.push(`🌧 Heavy rain ${rain.toFixed(0)}mm — delay risk`); }
      // Cold: milder penalty, scaled
      if (temp <= 40)       { penalty -= 0.06; flags.push(`🥶 ${temp.toFixed(0)}°F — cold affects bat speed`); }
      else if (temp <= 50)  { penalty -= 0.03; flags.push(`🌡 ${temp.toFixed(0)}°F — mildly cold`); }
    }

    const result = { wind, rain, temp, penalty, label: flags[0] || null, allFlags: flags };
    _weatherCache[cacheKey] = result;
    return result;
  } catch { _weatherCache[cacheKey] = null; return null; }
}

// ── UPGRADE 1: Line Movement Detection ───────────────────────────────────────
// Saves opening lines to localStorage. On next load compares with current lines.
// Returns { moved, direction, pctChange, label } or null.
const LINE_MOVE_KEY = 'bm_opening_lines';

function saveOpeningLine(eventId, player, market, overOdds, underOdds) {
  const key = `${eventId}__${player}__${market}`;
  try {
    const stored = JSON.parse(localStorage.getItem(LINE_MOVE_KEY)) || {};
    if (!stored[key]) {
      stored[key] = { overOdds, underOdds, ts: Date.now() };
      localStorage.setItem(LINE_MOVE_KEY, JSON.stringify(stored));
    }
  } catch {}
}

function getLineMovement(eventId, player, market, currentOver, currentUnder) {
  const key = `${eventId}__${player}__${market}`;
  try {
    const stored = JSON.parse(localStorage.getItem(LINE_MOVE_KEY)) || {};
    const opening = stored[key];
    if (!opening) return null;
    // Age check — discard stale opening lines older than 3 days
    if (Date.now() - opening.ts > 3 * 24 * 60 * 60 * 1000) return null;

    // Decimal odds must be > 1.0 — anything ≤ 1 means bad/missing data
    if (opening.overOdds <= 1 || opening.underOdds <= 1 || currentOver <= 1 || currentUnder <= 1) return null;
    const openOverProb  = 1 / opening.overOdds;
    const openUnderProb = 1 / opening.underOdds;
    const curOverProb   = 1 / currentOver;
    const curUnderProb  = 1 / currentUnder;

    const overMove  = curOverProb  - openOverProb;   // positive = money on OVER
    const underMove = curUnderProb - openUnderProb;  // positive = money on UNDER

    const threshold = 0.03; // 3% prob shift = meaningful move
    if (Math.abs(overMove) < threshold && Math.abs(underMove) < threshold) return null;

    const direction  = overMove > underMove ? 'OVER' : 'UNDER';
    const pctChange  = Math.max(Math.abs(overMove), Math.abs(underMove));
    const strength   = pctChange >= 0.08 ? 'sharp' : 'mild';
    const label      = `🔀 Line moved ${(pctChange*100).toFixed(1)}% toward ${direction} (${strength})`;
    return { direction, pctChange, strength, label };
  } catch { return null; }
}

// ESPN free injury API — returns status string for a player or null
const _injuryCache = _loadCache(_INJURY_CACHE_KEY); // persisted — injury status doesn't change mid-session

async function getPlayerStatus(sport, league, athleteId) {
  if (!athleteId) return null;
  const cacheKey = `${league}__${athleteId}`;
  if (_injuryCache[cacheKey] !== undefined) return _injuryCache[cacheKey];
  try {
    const res = await fetch(
      `https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/athletes/${athleteId}`
    );
    if (!res.ok) { _injuryCache[cacheKey] = null; return null; }
    const data   = await res.json();
    const status = data.athlete?.status?.type?.description || null;
    _injuryCache[cacheKey] = status;
    _saveCache(_INJURY_CACHE_KEY, _injuryCache);
    return status;
  } catch { _injuryCache[cacheKey] = null; return null; }
}

// Returns true if player should be dropped from picks
function isPlayerUnavailable(status) {
  if (!status) return false;
  const s = status.toLowerCase();
  return s.includes('out') || s.includes('doubtful') || s.includes('injured');
}

// ── UPGRADE 3: Rest & Schedule Factor (back-to-back detector) ─────────────────
// Returns { isB2B, label } for a player's team given the game date
const _scheduleCache = {};

async function getRestFactor(sport, league, athleteId, gameDateIso) {
  if (!athleteId) return null;
  // MLB plays 162 games — B2B is standard, not a fatigue signal
  if (league === 'mlb') return { isB2B: false, label: null, penalty: 0 };
  const cacheKey = `rest__${league}__${athleteId}`;
  if (_scheduleCache[cacheKey] !== undefined) return _scheduleCache[cacheKey];
  try {
    // Reuse cached gamelog from espnPlayerGamelog() — avoids duplicate ESPN call
    const glKey = `${league}__${athleteId}`;
    let data = _gamelogRawCache[glKey];
    if (!data) {
      const res = await fetch(
        `https://site.web.api.espn.com/apis/common/v3/sports/${sport}/${league}/athletes/${athleteId}/gamelog`
      );
      if (!res.ok) { _scheduleCache[cacheKey] = null; return null; }
      data = await res.json();
      _gamelogRawCache[glKey] = data;
    }

    // Find the most recent completed game date — v3 stores events in top-level map
    const eventsMap = data.events || {};
    const dates = [];
    for (const st of (data.seasonTypes || [])) {
      for (const cat of (st.categories || [])) {
        for (const ev of (cat.events || [])) {
          const evInfo = eventsMap[ev.eventId] || {};
          if (evInfo.gameDate) dates.push(new Date(evInfo.gameDate));
          else if (ev.eventDate) dates.push(new Date(ev.eventDate.date || ev.eventDate));
        }
      }
    }
    if (!dates.length) { _scheduleCache[cacheKey] = null; return null; }

    dates.sort((a, b) => b - a);
    const gameDate = new Date(gameDateIso);

    // ── Granular fatigue system (inspired by BookieX) ──
    // Instead of simple B2B yes/no, compute composite fatigue score from:
    // 1. Rest days (0=same day, 1=B2B, 2=normal, 3+=well rested)
    // 2. B2B2B detection (3 games in 3 nights)
    // 3. Each factor weighted by sport
    const restDays = dates.length ? Math.max(0, (gameDate - dates[0]) / (1000 * 60 * 60 * 24)) : 99;
    const isB2B   = restDays <= 1.5;
    const isB2B2B = dates.length >= 2 && restDays <= 1.5
      && (gameDate - dates[1]) / (1000 * 60 * 60 * 24) <= 3.0;

    // Rest penalty dict (BookieX-style): 0-day=extreme, 1-day=B2B, 2-day=normal, 3+=fresh
    const restPenalties = { nba: { 0: -0.30, 1: -0.20, 2: -0.05, 3: 0 }, nhl: { 0: -0.15, 1: -0.10, 2: -0.03, 3: 0 } };
    const sportPenalties = restPenalties[league] || restPenalties.nba;
    const restBucket = Math.min(3, Math.floor(restDays));
    let fatigue = sportPenalties[restBucket] || 0;

    // B2B2B: extra penalty — 3 games in 3 nights is brutal
    if (isB2B2B) fatigue -= (league === 'nhl' ? 0.08 : 0.15);

    const labels = [];
    if (isB2B2B)     labels.push(`🔥 3-in-3 nights — heavy fatigue`);
    else if (isB2B)  labels.push(`😴 Back-to-back (${restDays.toFixed(1)} days rest)`);
    else if (restDays <= 2.5) labels.push(`💤 ${restDays.toFixed(0)} days rest`);
    else labels.push(`✅ Well rested (${restDays.toFixed(0)} days)`);

    const result = {
      isB2B, isB2B2B, restDays: parseFloat(restDays.toFixed(1)),
      label: labels[0], penalty: fatigue,
    };

    _scheduleCache[cacheKey] = result;
    return result;
  } catch { _scheduleCache[cacheKey] = null; return null; }
}

// ── UPGRADE 4: Closing Line Value (CLV) Tracking ─────────────────────────────
// Saves opening line odds when a pick is first created.
// After the game closes, compares pick odds to closing odds to measure CLV.
const CLV_KEY = 'bm_clv_v1';

function saveOpeningOddsForPick(pickId, overOdds, underOdds, pickedDirection) {
  try {
    const stored = JSON.parse(localStorage.getItem(CLV_KEY)) || {};
    if (!stored[pickId]) {
      stored[pickId] = {
        openOver: overOdds, openUnder: underOdds,
        pickedDirection, ts: Date.now()
      };
      localStorage.setItem(CLV_KEY, JSON.stringify(stored));
    }
  } catch {}
}

// Returns CLV label for history display — compares pick odds to closing odds
function getCLV(pickId, closeOver, closeUnder) {
  try {
    const stored = JSON.parse(localStorage.getItem(CLV_KEY)) || {};
    const opening = stored[pickId];
    if (!opening) return null;
    const dir = opening.pickedDirection;
    const openOdds  = dir === 'OVER' ? opening.openOver  : opening.openUnder;
    const closeOdds = dir === 'OVER' ? closeOver         : closeUnder;
    if (!openOdds || !closeOdds) return null;
    const openProb  = 1 / openOdds;
    const closeProb = 1 / closeOdds;
    const clv = (openProb - closeProb) * 100; // positive = beat the close
    if (Math.abs(clv) < 1) return null;
    return {
      clv,
      label: clv > 0
        ? `✅ CLV +${clv.toFixed(1)}% (beat the close)`
        : `❌ CLV ${clv.toFixed(1)}% (line moved against you)`
    };
  } catch { return null; }
}

// ── UPGRADE 4: Opponent Defensive Rating & Pace Factor ──────────────────────
// Fetches NBA/NHL team standings to determine how many points a team allows (OppPPG).
// A player facing a bottom-5 defense gets boosted; facing a top-5 defense gets suppressed.
// Pace proxy: PPG + OppPPG — fast games = more possessions = higher player totals.
const _teamStandingsCache = {};

async function getTeamStandings(sport, league) {
  // MLB: OppPPG doesn't translate to baseball — runs allowed requires different data model
  // Disable for now; MLB calibration + stats handle direction better than generic opponent rating
  if (league === 'mlb') return null;
  const ck = `standings__${league}`;
  if (_teamStandingsCache[ck]) return _teamStandingsCache[ck];
  try {
    const res = await fetch(`https://site.web.api.espn.com/apis/v2/sports/${sport}/${league}/standings`);
    if (!res.ok) return null;
    const data = await res.json();
    const teams = {};
    let totalPPG = 0, totalOPPG = 0, count = 0;
    for (const conf of (data.children || [])) {
      for (const entry of (conf.standings?.entries || [])) {
        const name = entry.team?.displayName || '';
        const stats = {};
        (entry.stats || []).forEach(s => { stats[s.name] = parseFloat(s.value) || 0; });
        const ppg = stats.avgPointsFor || 0;
        const oppg = stats.avgPointsAgainst || 0;
        if (name && ppg > 0) {
          teams[name.toLowerCase()] = { ppg, oppg, pace: ppg + oppg };
          totalPPG += ppg; totalOPPG += oppg; count++;
        }
      }
    }
    const leagueAvg = count ? { ppg: totalPPG/count, oppg: totalOPPG/count, pace: (totalPPG+totalOPPG)/count } : null;
    const result = { teams, leagueAvg };
    _teamStandingsCache[ck] = result;
    return result;
  } catch { return null; }
}

// Returns { defenseRating, paceMultiplier, label } for the OPPONENT team
// defenseRating: <1 = tough defense (suppresses props), >1 = weak defense (boosts props)
// paceMultiplier: <1 = slow game, >1 = fast game
function getOpponentFactor(standings, opponentName) {
  if (!standings || !standings.leagueAvg) return null;
  const opp = standings.teams[opponentName.toLowerCase()];
  if (!opp) return null;
  const avg = standings.leagueAvg;
  // Defense rating: opponent's OppPPG / league avg OppPPG
  // >1 means they allow MORE points than average (weak defense = boost)
  // <1 means they allow FEWER (strong defense = suppress)
  const defenseRating = opp.oppg / avg.oppg;
  // Pace: game pace / league avg pace
  const paceMultiplier = opp.pace / avg.pace;
  // Combined factor: 70% defense + 30% pace
  const factor = defenseRating * 0.7 + paceMultiplier * 0.3;
  // Convert to a signal: centered at 0, positive = boost, negative = suppress
  const signal = (factor - 1.0) * 0.5; // scale down — a 10% defense difference = +0.05 signal
  const label = defenseRating > 1.05
    ? `🎯 Weak defense: ${opp.oppg.toFixed(1)} OppPPG (${((defenseRating-1)*100).toFixed(0)}% above avg)`
    : defenseRating < 0.95
    ? `🛡 Strong defense: ${opp.oppg.toFixed(1)} OppPPG (${((1-defenseRating)*100).toFixed(0)}% below avg)`
    : null;
  return { defenseRating, paceMultiplier, signal, factor, label };
}

// ── Prop scoring constants ────────────────────────────────────────────────────
// Market keys to exclude — these are specialty/novelty bets with no real edge signal
const SPECIALTY_MARKETS = new Set([
  'player_first_basket','player_last_basket',
  'player_double_double','player_triple_double',
  'player_first_goalscorer','player_last_goalscorer',
  'player_anytime_goalscorer',
  'player_to_score_2_or_more_goals',
  'player_grand_slam','player_cycle',
]);
const MAX_VIG   = 0.15;  // lines with vig above this are too juiced to trust
const FAIR_VIG  = 0.08;  // "fair" line benchmark — vig at or below this gets no penalty

// Vig = total over-round — 0.10 means 10% baked into the line
function calcVig(overOdds, underOdds) {
  return (1 / overOdds + 1 / underOdds) - 1;
}

// Composite score:
//   edge        0.30 — vig-removed pick probability above 50%
//   consensus   0.25 — how many distinct bookmakers offer both sides of this line
//   fair_price  0.15 — how close to a fair (low-vig) line
//   vig_penalty 0.10 — subtracted when vig exceeds FAIR_VIG
//   stats       0.20 — L5 average vs prop line signal (ESPN data, 0 if unavailable)
// calib: object from getCalibration() — applies directional win-rate multiplier
function propScore(pct, bookCount, vig, direction, calib, statsSignal = 0, lineMoveSig = 0, restPenalty = 0, weatherPenalty = 0, sportHint = '', oppSignal = 0) {
  const dirCalib        = (calib && calib[direction]) || 1.0;
  const edgeFactor      = (pct - 50) / 50;
  const consensusFactor = Math.min(bookCount / 6, 1);
  const fairFactor      = Math.max(0, 1 - vig / MAX_VIG);
  const vigPenalty      = Math.max(0, (vig - FAIR_VIG) / (MAX_VIG - FAIR_VIG));
  // OVER penalty only for soccer — NBA/NHL/MLB all handled by calibration multiplier now
  const overPenalty = (direction === 'OVER' && sportHint.includes('Soccer')) ? -0.06 : 0;

  // oppSignal: positive = weak defense (boost OVER), negative = strong defense (boost UNDER)
  // Flip sign for UNDER direction: strong defense helps UNDER picks
  const oppAdj = direction === 'OVER' ? oppSignal : -oppSignal;

  const raw = (edgeFactor * 0.22 + consensusFactor * 0.18 + fairFactor * 0.12
    - vigPenalty * 0.08 + statsSignal * 0.20 + lineMoveSig * 0.08
    + oppAdj * 0.12 // opponent defense + pace: 12% weight
    + restPenalty + weatherPenalty + overPenalty) * dirCalib;

  // Market regression (BookieX-style): pull score 10% toward neutral
  // Mild anchor — prevents overconfidence without killing valid picks
  const regressed = raw * 0.90;
  return Math.max(-1, Math.min(1, regressed));
}

// ── Self-improvement: pick history & calibration ─────────────────────────────
const HISTORY_KEY   = 'bm_picks_v1';
const MIN_CALIBRATE = 10;  // picks with results needed before calibration kicks in

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
}

// Save top pick per game — deduped by same-day player+market key
function savePickToHistory(pick) {
  const h = getHistory();
  if (h.find(x => x.id === pick.id)) return;  // already saved today
  h.unshift(pick);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 300))); } catch {}

// Mark a pick as Won, Lost, or Void then rebuild the History tab

  buildHistoryTab();
}

// ── AUTO-GRADING ENGINE ───────────────────────────────────────────────────────
// Uses ESPN's free public API to fetch completed game box scores and auto-mark
// pending picks as W / L / V the next morning on page load.

// Map Odds API market keys → ESPN boxscore stat keys (league-scoped where needed)

  player_points:           { nba: 'points',                      nhl: 'points'        },
  player_rebounds:         { nba: 'rebounds'                                           },
  player_assists:          { nba: 'assists',                     nhl: 'assists'        },

  player_made_field_goals: { nba: 'fieldGoalsMade'                                     },

  player_receiving_yds:    { nfl: 'receivingYards'                                     },

  player_receptions:       { nfl: 'receptions'                                         },

};

// Fuzzy name match — handles ESPN vs Odds API name variations
// Checks: exact, last name, last-two-words (for "Trail Blazers", "Red Sox" etc.)
function nameMatch(a, b) {
  const n = s => s.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  const [na, nb] = [n(a), n(b)];
  if (na === nb) return true;
  if (na.split(' ').pop() === nb.split(' ').pop()) return true;
  // Multi-word match for teams like Trail Blazers, Blue Jays, Red Sox, White Sox
  const lastTwo = s => s.split(' ').slice(-2).join(' ');
  if (lastTwo(na) === lastTwo(nb)) return true;
  // Partial inclusion for shortened names
  if (na.includes(nb) || nb.includes(na)) return true;
  return false;
}

// Format a date string to YYYYMMDD in US Eastern time (ESPN uses ET for game dates)
// Without this, a UK user's local date can be one day ahead of ESPN's game date
function espnDateStr(iso) {
  // YYYYMMDD in US Eastern — ESPN uses ET for all game dates
  return dateToET(iso).replace(/-/g, '');
}

// Extract a player's stat value from an ESPN game summary boxscore
function playerStatFromSummary(summary, playerName, statKey) {
  for (const team of (summary?.boxscore?.players || [])) {
    for (const grp of (team.statistics || [])) {
      const idx = (grp.keys || []).indexOf(statKey);
      if (idx === -1) continue;
      for (const ath of (grp.athletes || [])) {
        if (nameMatch(playerName, ath.athlete?.displayName || '')) {
          const v = parseFloat(ath.stats?.[idx]);
          if (!isNaN(v)) return v;
        }
      }
    }
  }
  return null;
}

// Show a brief toast notification in the bottom-right corner
function showToast(msg, color) {
  const c = color || '#00ff88';
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;background:${c}15;color:${c};border:1px solid ${c}40;padding:10px 18px;border-radius:8px;font-size:0.82em;font-weight:600;z-index:9999;transition:opacity .5s`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3500);
}

// Auto-grade all pending picks from before today using ESPN API
// Tries both the pick date AND the day before (handles late-night games saved after midnight)
async function autoGrade(forceAll = false) {
  const history = getHistory();
  const now     = new Date();
  // forceAll (manual button): try ALL pending picks including today's
  // auto (page load): only picks from 6+ hours ago
  const pending = forceAll
    ? history.filter(p => !p.result)
    : history.filter(p => !p.result && new Date(p.date) < new Date(now.getTime() - 6 * 60 * 60 * 1000));
  if (!pending.length) return 0;

  let graded = 0;

  // Group pending picks by sport + date to minimise ESPN API calls
  // Also include the day before in case game was saved after midnight
  const groups = {};
  pending.forEach(pick => {
    const raw      = pick.sport.replace(/\p{Emoji}/gu, '').trim().toUpperCase();
    const sportKey = Object.keys(ESPN_CFG).find(k => raw.includes(k));
    if (!sportKey) return;

    const pickDate = new Date(pick.date);
    const dayBefore = new Date(pickDate.getTime() - 24 * 60 * 60 * 1000);
    const dates = [espnDateStr(pick.date), espnDateStr(dayBefore.toISOString())];

    // Create group for each date to search (deduped)
    for (const dateStr of [...new Set(dates)]) {
      const gk = `${sportKey}__${dateStr}`;
      if (!groups[gk]) groups[gk] = {
        cfg:     ESPN_CFG[sportKey],
        league:  sportKey.toLowerCase(),
        dateStr,
        picks:   [],
      };
      // Add pick to group if not already there
      if (!groups[gk].picks.find(p => p.id === pick.id)) {
        groups[gk].picks.push(pick);
      }
    }
  });

  for (const grp of Object.values(groups)) {
    try {
      const boardRes = await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/${grp.cfg.sport}/${grp.cfg.league}/scoreboard?dates=${grp.dateStr}&limit=50`
      );
      if (!boardRes.ok) {
        console.warn(`Auto-grade: ESPN scoreboard failed for ${grp.cfg.league} (${grp.dateStr}) — picks not graded`);
        continue;
      }
      const board  = await boardRes.json();
      const events = board.events || [];

      for (const pick of grp.picks) {
        try {
          // Find the ESPN event matching this pick's game — use fuzzy nameMatch
          const [partA, partB] = (pick.match || '').split(/\s+vs\.?\s+/i).map(s => s.trim());
          const matchEv = events.find(ev => {
            const names = (ev.competitions?.[0]?.competitors || [])
              .map(c => c.team?.displayName || c.team?.name || '');
            return names.some(n => partA && nameMatch(partA, n)) ||
                   names.some(n => partB && nameMatch(partB, n));
          });
          if (!matchEv) continue; // may match in another date group

          // Only grade completed games
          if (!matchEv.competitions?.[0]?.status?.type?.completed) continue;

          if (pick.market === 'match_winner') {
            // Grade from scoreboard competitor data — no summary fetch needed
            const comp        = matchEv.competitions?.[0]?.competitors || [];
            const winnerComp  = comp.find(c => c.winner === true);
            const actualWinner = winnerComp ? (winnerComp.team?.displayName || '') : 'Draw';
            const result = nameMatch(pick.pick, actualWinner) ? 'W' : 'L';
            const hp = history.find(x => x.id === pick.id);
            if (hp) { hp.result = result; hp.autoGraded = true; graded++; }
          } else {
            // Grade player prop from box score summary
            const statKey = (MARKET_STAT_KEY[pick.market] || {})[grp.league];
            if (!statKey) continue;

            const sumRes = await fetch(
              `https://site.api.espn.com/apis/site/v2/sports/${grp.cfg.sport}/${grp.cfg.league}/summary?event=${matchEv.id}`
            );
            if (!sumRes.ok) { console.warn(`Auto-grade: ESPN summary failed for event ${matchEv.id}`); continue; }
            const summary    = await sumRes.json();
            const actualStat = playerStatFromSummary(summary, pick.player, statKey);
            if (actualStat === null) continue;

            const result = actualStat === pick.line ? 'V'
              : pick.pick === 'OVER' ? (actualStat > pick.line ? 'W' : 'L')
              : (actualStat < pick.line ? 'W' : 'L');

            const hp = history.find(x => x.id === pick.id);
            if (hp) { hp.result = result; hp.autoGraded = true; graded++; }
          }
        } catch(e) { console.warn('Auto-grade: error on pick', pick?.id, e); }
      }
    } catch(e) { console.warn('Auto-grade: error on group', grp?.cfg?.league, e); }
  }

  if (graded > 0) {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch {}
    const stillPending = history.filter(p => !p.result).length;
    const msg = stillPending > 0
      ? `✓ Auto-graded ${graded} pick${graded > 1 ? 's' : ''} · ${stillPending} still pending`
      : `✓ Auto-graded ${graded} pick${graded > 1 ? 's' : ''} — all caught up!`;
    showToast(msg);
  }
  return graded;
}

// Returns calibration multipliers for OVER and UNDER based on historical win rates.
// At 50% win rate (random) → 1.0×, range capped at [0.80, 1.20].
// Only active once MIN_CALIBRATE picks have settled.
function getCalibration() {
  const settled = getHistory().filter(p => p.result === 'W' || p.result === 'L');
  const base = { OVER: 1.0, UNDER: 1.0, settled: settled.length, ready: false, edgeBuckets: null, bias: null };
  if (settled.length < MIN_CALIBRATE) return base;

  const wr = arr => arr.length ? arr.filter(x => x.result === 'W').length / arr.length : 0.5;
  const factor = w => Math.max(0.65, Math.min(1.25, 1.0 + (w - 0.5) * 0.5));

  const overPicks  = settled.filter(p => p.pick === 'OVER');
  const underPicks = settled.filter(p => p.pick === 'UNDER');

  // ── Edge-bucket calibration (BookieX-style) ──
  // Track win rates by score magnitude to know which edge sizes actually win
  const withScore = settled.filter(p => p.score != null);
  const edgeBuckets = [
    { label: '0.70+',     min: 0.70, max: 99 },
    { label: '0.60–0.70', min: 0.60, max: 0.70 },
    { label: '0.50–0.60', min: 0.50, max: 0.60 },
    { label: '0.40–0.50', min: 0.40, max: 0.50 },
    { label: '<0.40',     min: -99,  max: 0.40 },
  ].map(b => {
    const picks = withScore.filter(p => p.score >= b.min && p.score < b.max);
    const w = picks.filter(p => p.result === 'W').length;
    const l = picks.filter(p => p.result === 'L').length;
    return { ...b, w, l, total: w+l, wr: (w+l) ? (w/(w+l)*100).toFixed(1) : null };
  });

  // ── Bias detection (BookieX-style) ──
  // Separate win rates: favorite/underdog + per-sport + flipped vs non-flipped
  const favPicks = settled.filter(p => parseFloat(p.pct) >= 55); // odds-favored picks
  const dogPicks = settled.filter(p => parseFloat(p.pct) < 55);  // odds-underdog picks
  const sports = [...new Set(settled.map(p => (p.sport || '').replace(/\p{Emoji}/gu, '').trim()))];
  const sportBias = sports.map(sp => {
    const s = settled.filter(p => (p.sport || '').replace(/\p{Emoji}/gu, '').trim() === sp);
    const ov = s.filter(p => p.pick === 'OVER');
    const un = s.filter(p => p.pick === 'UNDER');
    return {
      sport: sp,
      overWR:  ov.length >= 3 ? (wr(ov) * 100).toFixed(0) : null,
      underWR: un.length >= 3 ? (wr(un) * 100).toFixed(0) : null,
      overN: ov.length, underN: un.length,
    };
  });

  return {
    OVER:       factor(wr(overPicks)),
    UNDER:      factor(wr(underPicks)),
    overWR:     (wr(overPicks)  * 100).toFixed(0),
    underWR:    (wr(underPicks) * 100).toFixed(0),
    overCount:  overPicks.length,
    underCount: underPicks.length,
    settled:    settled.length,
    ready:      true,
    // BookieX additions
    edgeBuckets,
    bias: {
      favWR: favPicks.length >= 5 ? (wr(favPicks) * 100).toFixed(0) : null,
      dogWR: dogPicks.length >= 5 ? (wr(dogPicks) * 100).toFixed(0) : null,
      favN: favPicks.length, dogN: dogPicks.length,
      sportBias,
    },
  };
}

// Short reason string — only references real signals
function propReason(pct, bookCount, vig) {
  const parts = [];
  if      (pct >= 68) parts.push(`${pct}% market edge`);
  else if (pct >= 60) parts.push(`${pct}% implied`);
  if      (bookCount >= 5) parts.push(`${bookCount} books aligned`);
  else if (bookCount >= 3) parts.push(`${bookCount} books`);
  if      (vig <= FAIR_VIG) parts.push('fair line');
  else if (vig >= 0.12)     parts.push('juiced');
  return parts.join(' · ') || 'model pick';
}

// ── Tab navigation ────────────────────────────────────────────────────────────
function showTab(name, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  // Lazy load — only fetch when first clicked, not on startup
  if (!loadedTabs.has(name)) {
    loadedTabs.add(name);
    if (name === 'soccer') {
      document.getElementById('tab-soccer').innerHTML = '<div class="loading">Loading soccer...</div>';
      buildSoccer(false).then(() => { buildAllTab(); });
    } else if (name === 'history') {

    } else if (SPORT_TABS[name]) {
      const sportName = SPORT_TABS[name].label || name.toUpperCase();
      document.getElementById('tab-' + name).innerHTML = `<div class="loading">Loading ${sportName}...</div>`;
      buildSportTab(name, false).then(() => { buildAllTab(); }); // rebuild All tab with new picks
    }
  }
}

// ── Cache ─────────────────────────────────────────────────────────────────────
function cacheKey(k)   { return 'bm_' + k; } // no date suffix — TTL handles expiry, key survives midnight
function getCache(k)   {
  try { const r = localStorage.getItem(cacheKey(k)); if (!r) return null;
    const {ts,data} = JSON.parse(r); return Date.now()-ts > CACHE_TTL ? null : data;
  } catch { return null; }
}
function setCache(k,d) { try { localStorage.setItem(cacheKey(k), JSON.stringify({ts:Date.now(),data:d})); } catch {} }
function clearAllCache(){ Object.keys(localStorage).filter(k=>k.startsWith('bm_') && k !== HISTORY_KEY).forEach(k=>localStorage.removeItem(k)); }
function updateCacheStatus(){
  const keys = Object.keys(localStorage).filter(k => k.startsWith('bm_') && k !== HISTORY_KEY);
  if (!keys.length) { document.getElementById('cacheStatus').textContent='Cache: empty'; return; }
  try {
    const entries = keys.map(k => { try { return JSON.parse(localStorage.getItem(k)).ts; } catch { return 0; } });
    const newest = Math.max(...entries);
    const ago = Math.round((Date.now() - newest) / 60000);
    const left = _tokensLeft !== null ? ` · ${_tokensLeft} tokens left` : '';
    document.getElementById('cacheStatus').textContent = `Cache: ${ago}m ago (${keys.length})${left}`;
  } catch { document.getElementById('cacheStatus').textContent=`Cache: ${keys.length} stored`; }
}

// Token guard — returns true if safe to make a live API call
function tokensSafe(force=false) {
  if (_tokensLeft === null) return true; // unknown — allow
  if (_tokensLeft <= TOKEN_BLOCK && !force) {
    showTokenWarning(`⛔ Only ${_tokensLeft} API tokens left — serving cached data only. Refresh tomorrow.`);
    return false;
  }
  return true;
}

function showTokenWarning(msg) {
  let banner = document.getElementById('token-warning');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'token-warning';
    banner.style.cssText = 'background:#110000;color:#ff4444;border-bottom:1px solid #ff444430;padding:8px 20px;font-size:0.78em;font-weight:600;text-align:center';
    document.querySelector('header').insertAdjacentElement('afterend', banner);
  }
  banner.textContent = msg;
  banner.style.display = 'block';
}

// ── API fetch helpers ─────────────────────────────────────────────────────────
function updateTokens(res) {
  const rem  = res.headers.get('x-requests-remaining');
  const used = res.headers.get('x-requests-used');
  if (rem)  { _tokensLeft = parseInt(rem); document.getElementById('tokensLeft').textContent = rem; }
  if (used) document.getElementById('tokensUsed').textContent = used;

  if (_tokensLeft !== null) {
    if (_tokensLeft <= TOKEN_BLOCK) {
      showTokenWarning(`⛔ ${_tokensLeft} tokens left — showing CACHED data (may be stale). Lines may have moved since last fetch.`);
    } else if (_tokensLeft <= TOKEN_WARN) {
      showTokenWarning(`⚠ Low tokens: ${_tokensLeft} remaining — avoid hard refreshes.`);
    } else {
      const banner = document.getElementById('token-warning');
      if (banner) banner.style.display = 'none';
    }
    updateCacheStatus();
  }
}

// ── Poisson model ─────────────────────────────────────────────────────────────
function poisson(lam, k) { let r=Math.exp(-lam); for(let i=1;i<=k;i++) r*=lam/i; return r; }

// Dixon-Coles correlation adjustment for low-scoring outcomes (0-0, 1-0, 0-1, 1-1)
// Standard Poisson assumes independence — this corrects for real-world goal correlation.
// rho < 0 means 0-0 and 1-1 are more likely than Poisson predicts (defensive games).
function dixonColes(h, a, hXG, aXG, rho = -0.05) {
  const base = poisson(hXG, h) * poisson(aXG, a);
  if (h === 0 && a === 0) return base * (1 - hXG * aXG * rho);
  if (h === 1 && a === 0) return base * (1 + aXG * rho);
  if (h === 0 && a === 1) return base * (1 + hXG * rho);
  if (h === 1 && a === 1) return base * (1 - rho);
  return base;
}

function correctScores(hXG, aXG, max=6) {
  const s=[];
  for(let h=0;h<=max;h++) for(let a=0;a<=max;a++) s.push({h,a,p:dixonColes(h,a,hXG,aXG)});
  // Normalize so probabilities sum to 1
  const total = s.reduce((sum,x) => sum + x.p, 0);
  s.forEach(x => x.p /= total);
  s.sort((a,b)=>b.p-a.p); return s;
}
function impliedProb(o) { return 1/o; }
function edge(mP, o)    { return ((mP-impliedProb(o))*100).toFixed(1); }
function edgeHtml(e) {
  const n=parseFloat(e);
  if (n>3)  return `<span class="pos">+${e}%</span>`;
  if (n<-3) return `<span class="neg">${e}%</span>`;
  return `<span class="neutral">${e}%</span>`;
}

// ── Confidence helpers ────────────────────────────────────────────────────────
function propConf(overOdds, underOdds) {
  if (!overOdds || !underOdds) return null;
  const oi=1/overOdds, ui=1/underOdds, tot=oi+ui;
  const op=(oi/tot)*100, up=(ui/tot)*100;
  const pick = op>=up ? 'OVER' : 'UNDER';
  const pct  = Math.max(op, up);
  const conf = pct>=65 ? 'HIGH' : pct>=55 ? 'MED' : 'LOW';
  return { pick, pct: pct.toFixed(1), conf, op: op.toFixed(1), up: up.toFixed(1) };
}

function badge(conf) {
  if (conf==='HIGH') return '<span class="badge badge-high">HIGH</span>';
  if (conf==='MED')  return '<span class="badge badge-med">MED</span>';
  return '<span class="badge badge-low">LOW</span>';
}

function pickHtml(pick) {
  return pick==='OVER'
    ? '<span class="pick-over">OVER</span>'
    : '<span class="pick-under">UNDER</span>';
}

// ── Winner prediction box ─────────────────────────────────────────────────────
// eventDate + sportLabel: when provided, the pick is saved to grading history
function winnerBox(home, away, homeOdds, awayOdds, drawOdds, eventDate, sportLabel) {
  if (!homeOdds || !awayOdds) return '';
  const hi=1/homeOdds, ai=1/awayOdds, di=drawOdds?1/drawOdds:0;
  const tot=hi+ai+di;
  const hp=(hi/tot)*100, ap=(ai/tot)*100, dp=(di/tot)*100;

  let winnerName, winnerPct;
  if (hp>=ap && hp>=dp) { winnerName=home; winnerPct=hp; }
  else if (ap>=hp && ap>=dp) { winnerName=away; winnerPct=ap; }
  else { winnerName='Draw'; winnerPct=dp; }

  const conf = winnerPct>=65 ? 'HIGH' : winnerPct>=55 ? 'MED' : 'LOW';

  // Save this pick to the grading history so it can be auto-graded tomorrow
  if (sportLabel && eventDate) {
    savePickToHistory({
      id:     `${dateToET(eventDate)}_match_${home}_${away}`.replace(/\W+/g, '_'),
      date:   eventDate,
      sport:  sportLabel,
      match:  `${home} vs ${away}`,
      type:   'match_winner',
      player: winnerName,
      market: 'match_winner',
      line:   null,
      pick:   winnerName,
      pct:    winnerPct.toFixed(1),
      conf:   conf,
      result: null,
    });
  }

  const row = (name, pct, cls) => `
    <div class="winner-row">
      <span class="winner-name ${name===winnerName?'pick':''}">${name}</span>
      <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100).toFixed(0)}%"></div></div>
      <span class="pct-label">${pct.toFixed(1)}%</span>
    </div>`;

  return `<div class="winner-box">
    <div class="winner-box-title">🏆 WINNER PREDICTION</div>
    ${row(home, hp, '')}
    ${drawOdds ? row('Draw', dp, 'draw') : ''}
    ${row(away, ap, 'away')}
    <div class="winner-summary">
      Pick: <strong style="color:${winnerName!=='Draw'?'#00ff88':'#aaa'}">${winnerName}</strong>
      &nbsp;${badge(conf)}&nbsp;${winnerPct.toFixed(1)}% confidence
      &nbsp;·&nbsp; Odds: ${winnerName===home?homeOdds:winnerName===away?awayOdds:drawOdds}
    </div>
  </div>`;
}

// ── Best odds helpers ─────────────────────────────────────────────────────────
function bestOdds(ev, mktKey) {
  const best={};
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key===mktKey);
    if(!m) return;
    (m.outcomes||[]).forEach(o=>{if(!best[o.name]||o.price>best[o.name]) best[o.name]=o.price;});
  });
  return best;
}
function bestTotal(ev, line=2.5) {
  let ov=0,un=0;
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key==='totals'); if(!m) return;
    (m.outcomes||[]).forEach(o=>{
      if(Math.abs((o.point||2.5)-line)<0.3){
        if(o.name==='Over'&&o.price>ov) ov=o.price;
        if(o.name==='Under'&&o.price>un) un=o.price;
      }
    });
  });
  return {over:ov||null,under:un||null};
}
function estimateXG(hO, aO, dO, totGoals = 2.5) {
  const hi = impliedProb(hO), ai = impliedProb(aO);

  // Draw adjustment: high draw probability (low odds like 3.0) = cagey, low-scoring game
  // Low draw probability (high odds like 15.0+) = mismatch, likely high-scoring
  // Only suppress total when draw is genuinely likely (odds < 4.0)
  const drawProb = dO ? impliedProb(dO) : 0;
  const drawAdj = drawProb > 0.20 ? Math.max(0.85, 1 - (drawProb - 0.20) * 0.5) : 1.0;

  let homeXG = totGoals * (hi / (hi + ai)) * drawAdj;
  let awayXG = totGoals * (ai / (hi + ai)) * drawAdj;

  // Home advantage
  homeXG *= 1.08;
  awayXG *= 0.94;

  // Clamp: away team in massive mismatch gets 0.25 min (not 0.4 — Port Vale shouldn't get 0.4 xG vs Chelsea)
  return {
    homeXG: Math.max(0.3, Math.min(4.0, homeXG)),
    awayXG: Math.max(0.15, Math.min(3.5, awayXG)),
  };
}

// Derive expected total goals from Over/Under 2.5 odds
// If Over 2.5 is heavily favoured (low odds), total goals >> 2.5
function impliedTotalGoals(overOdds, underOdds) {
  if (!overOdds || !underOdds) return 2.5;
  const overProb = 1 / overOdds;
  const underProb = 1 / underOdds;
  const normOver = overProb / (overProb + underProb); // vig-removed
  // Map: 50% over = 2.5 goals, 70% over ≈ 3.2, 30% over ≈ 1.9
  // Linear approximation: totalGoals ≈ 2.5 + (normOver - 0.5) * 3.0
  return Math.max(1.5, Math.min(5.0, 2.5 + (normOver - 0.5) * 3.0));
}

// Fetch ESPN team recent form — last 5 results, returns { wins, draws, losses, goalsFor, goalsAgainst }
async function fetchTeamForm(sport, league, teamName) {
  try {
    const q   = encodeURIComponent(teamName.split(' ').slice(-1)[0]); // search by last word of team name
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/teams?limit=10&search=${q}`);
    if (!res.ok) return null;
    const data  = await res.json();
    const teams = data.sports?.[0]?.leagues?.[0]?.teams || [];
    const team  = teams.find(t => {
      const n = (t.team?.displayName || t.team?.name || '').toLowerCase();
      return n.includes(teamName.toLowerCase().split(' ').pop().toLowerCase());
    });
    if (!team?.team?.id) return null;

    const id     = team.team.id;
    const evRes  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/teams/${id}/schedule`);
    if (!evRes.ok) return null;
    const evData = await evRes.json();
    const events = (evData.events || []).filter(e => e.competitions?.[0]?.status?.type?.completed).slice(-10);
    if (!events.length) return null;

    let wins=0, draws=0, losses=0, gf=0, ga=0;
    let homeGF=0, homeGA=0, homeGames=0, awayGF=0, awayGA=0, awayGames=0;
    // Collect event IDs for synthetic xG (shot stats from summaries)
    const eventIds = [];
    for (const e of events) {
      const comp = e.competitions?.[0];
      const myComp   = comp?.competitors?.find(c => c.id === String(id));
      const oppComp  = comp?.competitors?.find(c => c.id !== String(id));
      if (!myComp || !oppComp) continue;
      const myScore  = parseInt(myComp.score  || 0);
      const oppScore = parseInt(oppComp.score || 0);
      gf += myScore; ga += oppScore;
      if      (myComp.winner)  wins++;
      else if (oppComp.winner) losses++;
      else                     draws++;
      if (myComp.homeAway === 'home') { homeGF += myScore; homeGA += oppScore; homeGames++; }
      else                            { awayGF += myScore; awayGA += oppScore; awayGames++; }
      if (e.id) eventIds.push({ eid: e.id, isHome: myComp.homeAway === 'home' });
    }

    // Fetch synthetic xG from shot stats (last 6 games max to limit API calls)
    let totalSynXG = 0, totalSynXGA = 0, synGames = 0;
    let homeSynXG = 0, homeSynGames = 0, awaySynXG = 0, awaySynGames = 0;
    const xgBatch = eventIds.slice(-1); // 1 most recent game for xG — fast load, still useful signal
    for (const { eid, isHome } of xgBatch) {
      try {
        const sumRes = await fetch(
          `https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/summary?event=${eid}`
        );
        if (!sumRes.ok) continue;
        const sum = await sumRes.json();
        const bxTeams = sum?.boxscore?.teams || [];
        // Find our team and opponent in boxscore
        for (const bxTeam of bxTeams) {
          const statsMap = {};
          (bxTeam.statistics || []).forEach(s => { statsMap[s.name] = parseFloat(s.displayValue) || 0; });
          const shots = statsMap.totalShots || 0;
          const onTarget = statsMap.shotsOnTarget || 0;
          const offTarget = shots - onTarget;
          // Synthetic xG: on-target shots × 0.30 + off-target × 0.03
          const synXG = onTarget * 0.30 + offTarget * 0.03;
          const isMyTeam = bxTeam.team?.id === String(id);
          if (isMyTeam) {
            totalSynXG += synXG; synGames++;
            if (isHome) { homeSynXG += synXG; homeSynGames++; }
            else        { awaySynXG += synXG; awaySynGames++; }
          } else {
            totalSynXGA += synXG;
          }
        }
      } catch { /* skip this game's stats */ }
    }

    const n = wins + draws + losses;
    const synXGpg  = synGames  ? totalSynXG / synGames  : null;
    const synXGApg = synGames  ? totalSynXGA / synGames : null;
    return n ? {
      wins, draws, losses, goalsFor: gf/n, goalsAgainst: ga/n, games: n,
      homeGoalsFor: homeGames ? homeGF/homeGames : gf/n,
      homeGoalsAg:  homeGames ? homeGA/homeGames : ga/n,
      awayGoalsFor: awayGames ? awayGF/awayGames : gf/n,
      awayGoalsAg:  awayGames ? awayGA/awayGames : ga/n,
      homeGames, awayGames,
      // Synthetic xG from ESPN shot data
      synXG: synXGpg, synXGA: synXGApg,
      homeSynXG: homeSynGames ? homeSynXG / homeSynGames : synXGpg,
      awaySynXG: awaySynGames ? awaySynXG / awaySynGames : synXGpg,
      synGames,
    } : null;
  } catch { return null; }
}
function gameDate(iso) {
  return displayDateET(iso) + ' ET';
}

// ── Player props table renderer ───────────────────────────────────────────────
// sportLabel: passed in so top picks can be collected for the slate-wide All tab
async function renderProps(propData, matchLabel, sportLabel, eventId = '', gameDate = '', homeTeam = '') {
  const calib = getCalibration();
  const leagueShort = Object.keys(ESPN_LEAGUE_CFG).find(k => sportLabel.toUpperCase().includes(k.toUpperCase())) || null;
  const espnCfg = leagueShort ? ESPN_LEAGUE_CFG[leagueShort] : null;

  // Fetch weather + opponent defensive rating in parallel
  const awayTeam = (matchLabel.split(' vs ')[1] || '').trim();
  const [weatherData, standings] = await Promise.all([
    getWeatherForGame(homeTeam, sportLabel, gameDate || new Date().toISOString()),
    espnCfg ? getTeamStandings(espnCfg.sport, espnCfg.league) : Promise.resolve(null),
  ]);
  // Get opponent factor for both teams (we don't know which team the player is on yet)
  const homeOppFactor = getOpponentFactor(standings, awayTeam);  // home players face away defense
  const awayOppFactor = getOpponentFactor(standings, homeTeam);  // away players face home defense
  // Use average of both as a game-level signal (we can't determine per-player team from props alone)
  const gameOppFactor = homeOppFactor || awayOppFactor || null;
  const lines = {};

  // Aggregate across bookmakers — track bestOver, bestUnder, and how many books
  // offer BOTH sides (bookCount = consensus signal)
  (propData.bookmakers||[]).forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      if (SPECIALTY_MARKETS.has(mkt.key)) return;   // skip specialty/novelty markets

      // Collect this bookmaker's prices for this market first
      const bkSide = {};
      (mkt.outcomes||[]).forEach(o=>{
        const key = `${o.description||o.name}__${mkt.key}`;
        if (!bkSide[key]) bkSide[key] = { over:0, under:0, point: o.point };
        if (o.name==='Over'  && o.price > bkSide[key].over)  bkSide[key].over  = o.price;
        if (o.name==='Under' && o.price > bkSide[key].under) bkSide[key].under = o.price;
      });

      // Merge into global lines
      Object.entries(bkSide).forEach(([key, d])=>{
        const player = key.split('__')[0];
        if (!lines[key]) lines[key] = {
          player, market: mkt.key, line: d.point,
          bestOver: 0, bestUnder: 0, bookCount: 0
        };
        if (d.over  > lines[key].bestOver)  lines[key].bestOver  = d.over;
        if (d.under > lines[key].bestUnder) lines[key].bestUnder = d.under;
        if (d.over && d.under) lines[key].bookCount++;  // both sides = this book agrees
      });
    });
  });

  // Score every candidate — fetch all signals in parallel
  const candidates = Object.values(lines)
    .filter(p => p.bestOver > 0 && p.bestUnder > 0 && p.line != null);

  // Save opening lines for CLV tracking (first time we see these lines today)
  if (eventId) {
    candidates.forEach(p => {
      saveOpeningLine(eventId, p.player, p.market, p.bestOver, p.bestUnder);
      const pickId = `${todayET()}_${p.player}_${p.market}`.replace(/\W+/g,'_');
      const c = propConf(p.bestOver, p.bestUnder);
      if (c) saveOpeningOddsForPick(pickId, p.bestOver, p.bestUnder, c.pick);
    });
  }

  // Determine if home team players are playing at home (for home/away split)
  const homeTeamName = homeTeam || (matchLabel.split(' vs ')[0] || '').trim();

  // Fetch stats + athlete IDs (needed for injury & rest) all in parallel
  const [statsResults, athleteIds] = await Promise.all([
    Promise.all(candidates.map(p => {
      if (!leagueShort) return Promise.resolve(null);
      // Pass isHomeGame = null since we don't know player's team from prop data alone
      // ESPN gamelog will still apply home/away split when available
      return getStatSignal(leagueShort, p.player, p.market, p.line, null);
    })),
    Promise.all(candidates.map(p => espnCfg ? espnAthleteId(espnCfg.sport, espnCfg.league, p.player) : Promise.resolve(null))),
  ]);

  // Fetch injury status + rest factor for each athlete in parallel
  const [injuryStatuses, restFactors] = await Promise.all([
    Promise.all(athleteIds.map(id => espnCfg && id ? getPlayerStatus(espnCfg.sport, espnCfg.league, id) : Promise.resolve(null))),
    Promise.all(athleteIds.map(id => espnCfg && id && gameDate ? getRestFactor(espnCfg.sport, espnCfg.league, id, gameDate) : Promise.resolve(null))),
  ]);

  const injuredNames = candidates
    .filter((p, i) => isPlayerUnavailable(injuryStatuses[i]))
    .map(p => p.player);

  const scored = candidates
    .map((p, i) => {
      // Drop injured/doubtful players — names collected above for UI notice
      if (isPlayerUnavailable(injuryStatuses[i])) return null;
