}

// ── Poisson model ─────────────────────────────────────────────────────────────
function poisson(lam, k) { let r=Math.exp(-lam); for(let i=1;i<=k;i++) r*=lam/i; return r; }
function correctScores(hXG, aXG, max=6) {
  const s=[];
  for(let h=0;h<=max;h++) for(let a=0;a<=max;a++) s.push({h,a,p:poisson(hXG,h)*poisson(aXG,a)});
  s.sort((a,b)=>b.p-a.p); return s;
}
function impliedProb(o) { return 1/o; }
function edge(mP, o)    { return ((mP-impliedProb(o))*100).toFixed(1); }
function edgeHtml(e) {
  const n=parseFloat(e);
  if (n>3)  return `<span class="pos">+${e}%</span>`;
  if (n<-3) return `<span class="neg">${e}%</span>`;
  return `<span class="neutral">${e}%</span>`;
}

// ── Confidence helpers ────────────────────────────────────────────────────────
function propConf(overOdds, underOdds) {
  if (!overOdds || !underOdds) return null;
  const oi=1/overOdds, ui=1/underOdds, tot=oi+ui;
  const op=(oi/tot)*100, up=(ui/tot)*100;
  const pick = op>=up ? 'OVER' : 'UNDER';
  const pct  = Math.max(op, up);
  const conf = pct>=65 ? 'HIGH' : pct>=55 ? 'MED' : 'LOW';
  return { pick, pct: pct.toFixed(1), conf, op: op.toFixed(1), up: up.toFixed(1) };
}

function badge(conf) {
  if (conf==='HIGH') return '<span class="badge badge-high">HIGH</span>';
  if (conf==='MED')  return '<span class="badge badge-med">MED</span>';
  return '<span class="badge badge-low">LOW</span>';
}

function pickHtml(pick) {
  return pick==='OVER'
    ? '<span class="pick-over">OVER</span>'
    : '<span class="pick-under">UNDER</span>';
}

// ── Winner prediction box ─────────────────────────────────────────────────────
// eventDate + sportLabel: when provided, the pick is saved to grading history
function winnerBox(home, away, homeOdds, awayOdds, drawOdds, eventDate, sportLabel) {
  if (!homeOdds || !awayOdds) return '';
  const hi=1/homeOdds, ai=1/awayOdds, di=drawOdds?1/drawOdds:0;
  const tot=hi+ai+di;
  const hp=(hi/tot)*100, ap=(ai/tot)*100, dp=(di/tot)*100;

  let winnerName, winnerPct;
  if (hp>=ap && hp>=dp) { winnerName=home; winnerPct=hp; }
  else if (ap>=hp && ap>=dp) { winnerName=away; winnerPct=ap; }
  else { winnerName='Draw'; winnerPct=dp; }

  const conf = winnerPct>=65 ? 'HIGH' : winnerPct>=55 ? 'MED' : 'LOW';

  // Save this pick to the grading history so it can be auto-graded tomorrow
  if (sportLabel && eventDate) {
    savePickToHistory({
      id:     `${new Date(eventDate).toISOString().slice(0,10)}_match_${home}_${away}`.replace(/\W+/g, '_'),
      date:   eventDate,
      sport:  sportLabel,
      match:  `${home} vs ${away}`,
      type:   'match_winner',
      player: winnerName,
      market: 'match_winner',
      line:   null,
      pick:   winnerName,
      pct:    winnerPct.toFixed(1),
      conf:   conf,
      result: null,
    });
  }

  const row = (name, pct, cls) => `
    <div class="winner-row">
      <span class="winner-name ${name===winnerName?'pick':''}">${name}</span>
      <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100).toFixed(0)}%"></div></div>
      <span class="pct-label">${pct.toFixed(1)}%</span>
    </div>`;

  return `<div class="winner-box">
    <div class="winner-box-title">🏆 WINNER PREDICTION</div>
    ${row(home, hp, '')}
    ${drawOdds ? row('Draw', dp, 'draw') : ''}
    ${row(away, ap, 'away')}
    <div class="winner-summary">
      Pick: <strong style="color:${winnerName!=='Draw'?'#00ff88':'#aaa'}">${winnerName}</strong>
      &nbsp;${badge(conf)}&nbsp;${winnerPct.toFixed(1)}% confidence
      &nbsp;·&nbsp; Odds: ${winnerName===home?homeOdds:winnerName===away?awayOdds:drawOdds}
    </div>
  </div>`;
}

// ── Best odds helpers ─────────────────────────────────────────────────────────
function bestOdds(ev, mktKey) {
  const best={};
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key===mktKey);
    if(!m) return;
    (m.outcomes||[]).forEach(o=>{if(!best[o.name]||o.price>best[o.name]) best[o.name]=o.price;});
  });
  return best;
}
function bestTotal(ev, line=2.5) {
  let ov=0,un=0;
  (ev.bookmakers||[]).forEach(bk=>{
    const m=(bk.markets||[]).find(m=>m.key==='totals'); if(!m) return;
    (m.outcomes||[]).forEach(o=>{
      if(Math.abs((o.point||2.5)-line)<0.3){
        if(o.name==='Over'&&o.price>ov) ov=o.price;
        if(o.name==='Under'&&o.price>un) un=o.price;
      }
    });
  });
  return {over:ov||null,under:un||null};
}
function estimateXG(hO,aO,dO,tot=2.5) {
  const hi=impliedProb(hO),ai=impliedProb(aO);
  // Use draw odds to refine xG split — draw probability implies low-scoring game
  const drawAdj = dO ? Math.max(0.8, 1 - impliedProb(dO) * 0.5) : 1;
  const homeXG  = tot * (hi/(hi+ai)) * drawAdj;
  const awayXG  = tot * (ai/(hi+ai)) * drawAdj;
  // Clamp to realistic range: 0.4 – 3.5 goals per team
  return { homeXG: Math.max(0.4, Math.min(3.5, homeXG)), awayXG: Math.max(0.4, Math.min(3.5, awayXG)) };
}

// Fetch ESPN team recent form — last 5 results, returns { wins, draws, losses, goalsFor, goalsAgainst }
async function fetchTeamForm(sport, league, teamName) {
  try {
    const q   = encodeURIComponent(teamName.split(' ').slice(-1)[0]); // search by last word of team name
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/teams?limit=10&search=${q}`);
    if (!res.ok) return null;
    const data  = await res.json();
    const teams = data.sports?.[0]?.leagues?.[0]?.teams || [];
    const team  = teams.find(t => {
      const n = (t.team?.displayName || t.team?.name || '').toLowerCase();
      return n.includes(teamName.toLowerCase().split(' ').pop().toLowerCase());
    });
    if (!team?.team?.id) return null;

    const id     = team.team.id;
    const evRes  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/teams/${id}/schedule?season=2025&seasontype=2`);
    if (!evRes.ok) return null;
    const evData = await evRes.json();
    const events = (evData.events || []).filter(e => e.competitions?.[0]?.status?.type?.completed).slice(-5);
    if (!events.length) return null;

    let wins=0, draws=0, losses=0, gf=0, ga=0;
    for (const e of events) {
      const comp = e.competitions?.[0];
      const myComp   = comp?.competitors?.find(c => c.id === String(id));
      const oppComp  = comp?.competitors?.find(c => c.id !== String(id));
      if (!myComp || !oppComp) continue;
      const myScore  = parseInt(myComp.score  || 0);
      const oppScore = parseInt(oppComp.score || 0);
      gf += myScore; ga += oppScore;
      if      (myComp.winner)  wins++;
      else if (oppComp.winner) losses++;
      else                     draws++;
    }
    const n = wins + draws + losses;
    return n ? { wins, draws, losses, goalsFor: gf/n, goalsAgainst: ga/n, games: n } : null;
  } catch { return null; }
}
function gameDate(iso) {
  return new Date(iso).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── Player props table renderer ───────────────────────────────────────────────
// sportLabel: passed in so top picks can be collected for the slate-wide All tab
async function renderProps(propData, matchLabel, sportLabel, eventId = '', gameDate = '', homeTeam = '') {
  const calib = getCalibration();  // computed once — applied to every pick's score
  const leagueShort = Object.keys(ESPN_LEAGUE_CFG).find(k => sportLabel.toUpperCase().includes(k.toUpperCase())) || null;
  const espnCfg = leagueShort ? ESPN_LEAGUE_CFG[leagueShort] : null;

  // Fetch weather once per game (NFL/MLB outdoor only)
  const weatherData = await getWeatherForGame(homeTeam, sportLabel, gameDate || new Date().toISOString());
  const lines = {};

  // Aggregate across bookmakers — track bestOver, bestUnder, and how many books
  // offer BOTH sides (bookCount = consensus signal)
  (propData.bookmakers||[]).forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      if (SPECIALTY_MARKETS.has(mkt.key)) return;   // skip specialty/novelty markets

      // Collect this bookmaker's prices for this market first
      const bkSide = {};
      (mkt.outcomes||[]).forEach(o=>{
        const key = `${o.description||o.name}__${mkt.key}`;
        if (!bkSide[key]) bkSide[key] = { over:0, under:0, point: o.point };
        if (o.name==='Over'  && o.price > bkSide[key].over)  bkSide[key].over  = o.price;
        if (o.name==='Under' && o.price > bkSide[key].under) bkSide[key].under = o.price;
      });

      // Merge into global lines
      Object.entries(bkSide).forEach(([key, d])=>{
        const player = key.split('__')[0];
        if (!lines[key]) lines[key] = {
          player, market: mkt.key, line: d.point,
          bestOver: 0, bestUnder: 0, bookCount: 0
        };
        if (d.over  > lines[key].bestOver)  lines[key].bestOver  = d.over;
        if (d.under > lines[key].bestUnder) lines[key].bestUnder = d.under;
        if (d.over && d.under) lines[key].bookCount++;  // both sides = this book agrees
      });
    });
  });

  // Score every candidate — fetch all signals in parallel
  const candidates = Object.values(lines)
    .filter(p => p.bestOver > 0 && p.bestUnder > 0 && p.line != null);

  // Save opening lines for CLV tracking (first time we see these lines today)
  if (eventId) {
    candidates.forEach(p => {
      saveOpeningLine(eventId, p.player, p.market, p.bestOver, p.bestUnder);
      const pickId = `${new Date().toISOString().slice(0,10)}_${p.player}_${p.market}`.replace(/\W+/g,'_');
      const c = propConf(p.bestOver, p.bestUnder);
      if (c) saveOpeningOddsForPick(pickId, p.bestOver, p.bestUnder, c.pick);
    });
  }

  // Determine if home team players are playing at home (for home/away split)
  const homeTeamName = homeTeam || (matchLabel.split(' vs ')[0] || '').trim();

  // Fetch stats + athlete IDs (needed for injury & rest) all in parallel
  const [statsResults, athleteIds] = await Promise.all([
    Promise.all(candidates.map(p => {
      if (!leagueShort) return Promise.resolve(null);
      // Pass isHomeGame = null since we don't know player's team from prop data alone
      // ESPN gamelog will still apply home/away split when available
      return getStatSignal(leagueShort, p.player, p.market, p.line, null);
    })),
    Promise.all(candidates.map(p => espnCfg ? espnAthleteId(espnCfg.sport, espnCfg.league, p.player) : Promise.resolve(null))),
  ]);

  // Fetch injury status + rest factor for each athlete in parallel
  const [injuryStatuses, restFactors] = await Promise.all([
    Promise.all(athleteIds.map(id => espnCfg && id ? getPlayerStatus(espnCfg.sport, espnCfg.league, id) : Promise.resolve(null))),
    Promise.all(athleteIds.map(id => espnCfg && id && gameDate ? getRestFactor(espnCfg.sport, espnCfg.league, id, gameDate) : Promise.resolve(null))),
  ]);

  const injuredNames = candidates
    .filter((p, i) => isPlayerUnavailable(injuryStatuses[i]))
    .map(p => p.player);

  const scored = candidates
    .map((p, i) => {
      // Drop injured/doubtful players — names collected above for UI notice
      if (isPlayerUnavailable(injuryStatuses[i])) return null;

      const c = propConf(p.bestOver, p.bestUnder);
      if (!c) return null;
      const vig        = calcVig(p.bestOver, p.bestUnder);
      const statResult = statsResults[i];
      const statSig    = statResult ? statResult.signal : 0;

      // UPGRADE 1: Line movement signal
      const lineMove   = eventId ? getLineMovement(eventId, p.player, p.market, p.bestOver, p.bestUnder) : null;
      const lineMoveSig = lineMove
        ? (lineMove.direction === c.pick ? (lineMove.strength === 'sharp' ? 0.15 : 0.08) : -0.10)
        : 0;

      // UPGRADE 3: Rest/back-to-back penalty
      const restResult  = restFactors[i];
      const restPenalty = restResult ? restResult.penalty : 0;

      // UPGRADE 3: Weather penalty (NFL/MLB outdoor only)
      const weatherPenalty = weatherData ? weatherData.penalty : 0;

      const score = propScore(parseFloat(c.pct), p.bookCount, vig, c.pick, calib, statSig, lineMoveSig, restPenalty, weatherPenalty, sportLabel || '');
      const conf  = score >= 0.50 ? 'HIGH' : score >= 0.35 ? 'MED' : 'LOW';
      return { ...p, c: {...c, conf}, vig, score, statResult, lineMove, restResult, injuryStatus: injuryStatuses[i], weatherData };
    })
    .filter(p => p !== null)
    .filter(p => !(p.c.pick === 'UNDER' && p.line <= 0.5))
    .filter(p => p.vig <= MAX_VIG)
    .filter(p => parseFloat(p.c.pct) <= 72)
    .filter(p => parseFloat(p.c.pct) >= 53)
    .filter(p => p.score >= 0.35) // data shows <0.35 bucket is 17% win rate — cut it
    .sort((a, b) => b.score - a.score);

  // Prioritize HIGH confidence picks first — data shows 87% win rate vs 50% for MED/LOW.
  // Take up to 5 total, HIGH fills first, then MED/LOW backfill remaining slots.
  const highPicks = scored.filter(p => p.c.conf === 'HIGH');
  const otherPicks = scored.filter(p => p.c.conf !== 'HIGH');

  const dirCount = {};
  const props = [];
  // Fill with HIGH first (max 3 per direction)
  for (const p of highPicks) {
    if (props.length >= 5) break;
    const cnt = dirCount[p.c.pick] || 0;
    if (cnt < 3) { props.push(p); dirCount[p.c.pick] = cnt + 1; }
  }
  // Backfill remaining slots with MED/LOW
  for (const p of otherPicks) {
    if (props.length >= 5) break;
    const cnt = dirCount[p.c.pick] || 0;
    if (cnt < 3) { props.push(p); dirCount[p.c.pick] = cnt + 1; }
  }

  const injuryNote = injuredNames.length
    ? `<div style="font-size:0.72em;color:#ff6644;margin-bottom:8px">🚑 Filtered out (injury/doubtful): ${injuredNames.join(', ')}</div>`
    : '';

  if (!props.length) return injuryNote + `<div class="no-games">No qualifying player props.</div>`;

  // Push top pick to slate-wide collection + persist ALL shown picks to history
  if (sportLabel) {
    props.forEach((p, i) => {
      const pick = {
        // Dedup key: same player+market on same calendar day = same pick, don't double-save
        id:        `${new Date().toISOString().slice(0,10)}_${p.player}_${p.market}`.replace(/\W+/g,'_'),
        date:      new Date().toISOString(),
        sport:     sportLabel, match: matchLabel,
        player:    p.player,  market: p.market,
        line:      p.line,    pick:   p.c.pick,
        pct:       p.c.pct,   conf:   p.c.conf,
        score:     p.score,   bookCount: p.bookCount, vig: p.vig,
        result:    null,
      };
      if (i === 0) allPropBets.push(pick);  // slate-wide All tab: top pick only
      savePickToHistory(pick);              // history: all 5 picks tracked
    });
  }

  let html = injuryNote + `<div class="section-hdr">🎯 TOP PICKS — ${matchLabel}</div>
    <div class="pick-cards">`;

  props.forEach((p, i) => {
    const tierHtml = i === 0
      ? '<span class="tier-a">A★</span>'
      : i === 1
      ? '<span class="tier-a">A</span>'
      : '<span class="tier-b">B</span>';
    const stat   = p.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
    const reason = propReason(parseFloat(p.c.pct), p.bookCount, p.vig);
    html += `<div class="pick-card${i === 0 ? ' best-pick' : ''}">
      <div class="pick-card-header">
        ${tierHtml}
        ${badge(p.c.conf)}
      </div>
      <div class="pick-card-player">${p.player}</div>
      <div class="pick-card-stat">${stat}</div>
      <div class="pick-card-line">${p.line}</div>
      <div class="pick-card-direction">${pickHtml(p.c.pick)} <span class="pick-card-pct">${p.c.pct}% implied</span></div>
      ${p.statResult ? `<div style="font-size:0.7em;margin:4px 0 2px;color:${p.statResult.signal>0?'#00ff88':p.statResult.signal<0?'#ff4444':'#555'}">${p.statResult.signalLabel}</div>` : ''}
      ${p.statResult?.extraLabels?.map(l => `<div style="font-size:0.67em;margin:1px 0;color:#555">${l}</div>`).join('') || ''}
      ${p.lineMove ? `<div style="font-size:0.68em;margin:2px 0;color:${p.lineMove.direction===p.c.pick?'#00ccff':'#ff9944'}">${p.lineMove.label}</div>` : ''}
      ${p.restResult?.isB2B ? `<div style="font-size:0.68em;margin:2px 0;color:#ff4444">${p.restResult.label}</div>` : ''}
      ${p.weatherData?.label ? `<div style="font-size:0.68em;margin:2px 0;color:#ff9944">${p.weatherData.label}</div>` : ''}
      <div class="pick-card-reason">${reason}
        <span class="score-badge">score ${p.score.toFixed(2)}
          <div class="score-tip">
            <div style="color:#555;margin-bottom:4px;font-size:0.85em">SCORE BREAKDOWN</div>
            <div style="color:${parseFloat(p.c.pct)>60?'#00ff88':'#888'}">📊 Edge: ${((parseFloat(p.c.pct)-50)/50*0.25).toFixed(3)}</div>
            <div style="color:#888">📚 Books: ${(Math.min(p.bookCount/6,1)*0.20).toFixed(3)} (${p.bookCount} books)</div>
            <div style="color:#888">💰 Vig: ${(Math.max(0,1-p.vig/15)*0.15).toFixed(3)} (${p.vig.toFixed(1)}%)</div>
            ${p.statResult ? `<div style="color:${p.statResult.signal>0?'#00ff88':p.statResult.signal<0?'#ff4444':'#555'}">📈 Stats: ${(p.statResult.signal*0.20).toFixed(3)}</div>` : '<div style="color:#333">📈 Stats: no data</div>'}
            ${p.lineMove ? `<div style="color:${p.lineMove.direction===p.c.pick?'#00ccff':'#ff9944'}">🔀 Line move: ${p.lineMove.direction===p.c.pick?'+':'-'}${(Math.abs(p.lineMove.pctChange>=0.08?0.15:0.08)*0.10).toFixed(3)}</div>` : '<div style="color:#333">🔀 Line move: none</div>'}
            ${p.restResult?.isB2B ? `<div style="color:#ff4444">😴 B2B penalty: ${(p.restResult.penalty).toFixed(3)}</div>` : ''}
            ${p.weatherData?.penalty ? `<div style="color:#ff9944">🌦 Weather: ${(p.weatherData.penalty).toFixed(3)}</div>` : ''}
          </div>
        </span>
      </div>
      <div class="pick-card-select">${(() => {
        const slipPick = { id: `${new Date().toISOString().slice(0,10)}_${p.player}_${p.market}`.replace(/\W+/g,'_'), player: p.player, market: p.market, line: p.line, sport: sportLabel, pct: p.c.pct, myPick: null };
        const enc = encodeURIComponent(JSON.stringify(slipPick));
        const saved = getSlip().find(x => x.id === slipPick.id);
        return `<button class="pick-select-btn over ${saved?.myPick==='OVER'?'sel':''}" data-slip-id="${slipPick.id}" data-dir="OVER" onclick="pickSelect(this,'${enc}','OVER')">OVER</button>
                <button class="pick-select-btn under ${saved?.myPick==='UNDER'?'sel':''}" data-slip-id="${slipPick.id}" data-dir="UNDER" onclick="pickSelect(this,'${enc}','UNDER')">UNDER</button>`;
      })()}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ── Soccer goal scorer renderer ───────────────────────────────────────────────
function renderGoalScorers(propData) {
  const scorers = {};
  (propData.bookmakers||[]).forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      if (mkt.key !== 'player_goal_scorer_anytime') return;
      (mkt.outcomes||[]).forEach(o=>{
        if (!scorers[o.name] || o.price < scorers[o.name]) scorers[o.name]=o.price;
      });
    });
  });

  const list = Object.entries(scorers)
    .map(([name,odds])=>({name, odds, prob:(1/odds*100)}))
    .sort((a,b)=>b.prob-a.prob)
    .slice(0,10);

  if (!list.length) return '';

  let html = `<div class="section-hdr">⚽ TOP 10 LIKELY GOAL SCORERS</div>
    <table class="ptable">
      <tr><th>#</th><th>Player</th><th>Odds</th><th>Probability</th><th>Confidence</th></tr>`;

  list.forEach((s,i)=>{
    const conf = s.prob>=35?'HIGH':s.prob>=20?'MED':'LOW';
    html += `<tr>
      <td style="color:#555">${i+1}</td>
      <td style="color:#fff;font-weight:bold">${s.name}</td>
      <td style="color:#ffcc00">${s.odds}</td>
      <td style="color:#aaa">${s.prob.toFixed(1)}%</td>
      <td>${badge(conf)}</td>
    </tr>`;
  });
  html += '</table>';
  return html;
}

// ── SOCCER tab ────────────────────────────────────────────────────────────────
async function buildSoccer(force) {
  const container = document.getElementById('tab-soccer');
  container.innerHTML = '<div class="loading">Loading soccer...</div>';

  const leagues = [
    { key:'soccer_epl',                           label:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League',    props:true  },
    { key:'soccer_uefa_champs_league',            label:'🌍 Champions League',            props:false },
    { key:'soccer_spain_la_liga',                 label:'🇪🇸 La Liga',                    props:false },
    { key:'soccer_fifa_world_cup_qualifiers_europe', label:'🌐 WC Qualifiers',            props:false },
  ];

  let html = '';
  let lgIdx = 0;
  for (const lg of leagues) {
    if (lgIdx++ > 0) await new Promise(r => setTimeout(r, 400));
    try {
      const events = await apiFetch(lg.key, 'h2h,totals', 'uk', force);
      const now = new Date();
      const today = events.filter(e=>{
        const d=new Date(e.commence_time);
        return d>=now && d<=new Date(now.getTime()+4*24*60*60*1000);
      });

      html += `<div class="sport-section"><div class="sport-title">${lg.label} <span style="color:#555;font-size:0.8em">(${today.length} upcoming)</span></div>`;
      if (!today.length) { html+='<div class="no-games">No matches in next 4 days.</div></div>'; continue; }

      for (const ev of today) {
        const h2h = bestOdds(ev,'h2h');
        const home=ev.home_team, away=ev.away_team;
        const hO=h2h[home], aO=h2h[away], dO=h2h['Draw'];
        if (!hO||!aO) continue;

        const tot = bestTotal(ev,2.5);

        // Fetch recent form for both teams in parallel — upgrades xG from odds-only to stats-backed
        const espnLeague = lg.key.includes('epl') ? {sport:'soccer',league:'eng.1'}
          : lg.key.includes('champs') ? {sport:'soccer',league:'uefa.champions'}
          : lg.key.includes('la_liga') ? {sport:'soccer',league:'esp.1'}
          : {sport:'soccer',league:'fifa.world'};
        const [homeForm, awayForm] = await Promise.all([
          fetchTeamForm(espnLeague.sport, espnLeague.league, home),
          fetchTeamForm(espnLeague.sport, espnLeague.league, away),
        ]);

        // Blend odds-based xG with real form data when available
        let { homeXG, awayXG } = estimateXG(hO, aO, dO||4, 2.5);
        if (homeForm && awayForm) {
          // Use 50% odds-based + 50% real stats blend
          const formHomeXG = (homeForm.goalsFor  * 0.6 + awayForm.goalsAgainst * 0.4);
          const formAwayXG = (awayForm.goalsFor  * 0.6 + homeForm.goalsAgainst * 0.4);
          homeXG = homeXG * 0.5 + formHomeXG * 0.5;
          awayXG = awayXG * 0.5 + formAwayXG * 0.5;
          homeXG = Math.max(0.4, Math.min(3.5, homeXG));
          awayXG = Math.max(0.4, Math.min(3.5, awayXG));
        }
        const scores = correctScores(homeXG,awayXG);
        let hw=0,dr=0,aw=0,ov=0,un=0,btts=0;
        scores.forEach(s=>{
          if(s.h>s.a) hw+=s.p; else if(s.h===s.a) dr+=s.p; else aw+=s.p;
          if(s.h+s.a>2.5) ov+=s.p; else un+=s.p;
          if(s.h>0&&s.a>0) btts+=s.p;
        });
        const hwE=parseFloat(edge(hw,hO)),drE=parseFloat(edge(dr,dO||99));
        const awE=parseFloat(edge(aw,aO));
        const ovE=tot.over?parseFloat(edge(ov,tot.over)):null;
        const unE=tot.under?parseFloat(edge(un,tot.under)):null;
        if(hwE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:`${home} Win`,e:hwE});
        if(drE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Draw',e:drE});
        if(awE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:`${away} Win`,e:awE});
        if(ovE&&ovE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Over 2.5',e:ovE});
        if(unE&&unE>3) allValueBets.push({sport:lg.label,match:`${home} vs ${away}`,bet:'Under 2.5',e:unE});

        const top5 = scores.slice(0,5);

        const formTag = (form) => form
          ? `<span style="font-size:0.7em;color:#555">${form.wins}W-${form.draws}D-${form.losses}L &nbsp;${form.goalsFor.toFixed(1)}gf/${form.goalsAgainst.toFixed(1)}ga (L${form.games})</span>`
          : '';
        html += `<div class="match-card">
          <div class="match-title"><span>${home} vs ${away}</span><span class="match-time">${gameDate(ev.commence_time)}</span></div>
          ${homeForm || awayForm ? `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;font-size:0.78em">
            <div><span style="color:#888">${home.split(' ').pop()}:</span> ${formTag(homeForm)}</div>
            <div><span style="color:#888">${away.split(' ').pop()}:</span> ${formTag(awayForm)}</div>
          </div>` : ''}
          ${winnerBox(home,away,hO,aO,dO,ev.commence_time,lg.label)}
          <table class="odds-table">
            <tr><th>Outcome</th><th>Model%</th><th>Odds</th><th>Imp%</th><th>Edge</th></tr>
            <tr><td>${home}</td><td>${(hw*100).toFixed(1)}%</td><td>${hO}</td><td>${(impliedProb(hO)*100).toFixed(1)}%</td><td>${edgeHtml(hwE.toFixed(1))}</td></tr>
            ${dO?`<tr><td>Draw</td><td>${(dr*100).toFixed(1)}%</td><td>${dO}</td><td>${(impliedProb(dO)*100).toFixed(1)}%</td><td>${edgeHtml(drE.toFixed(1))}</td></tr>`:''}
            <tr><td>${away}</td><td>${(aw*100).toFixed(1)}%</td><td>${aO}</td><td>${(impliedProb(aO)*100).toFixed(1)}%</td><td>${edgeHtml(awE.toFixed(1))}</td></tr>
            ${tot.over?`<tr><td>Over 2.5</td><td>${(ov*100).toFixed(1)}%</td><td>${tot.over}</td><td>${(impliedProb(tot.over)*100).toFixed(1)}%</td><td>${edgeHtml(ovE.toFixed(1))}</td></tr>`:''}
            ${tot.under?`<tr><td>Under 2.5</td><td>${(un*100).toFixed(1)}%</td><td>${tot.under}</td><td>${(impliedProb(tot.under)*100).toFixed(1)}%</td><td>${edgeHtml(unE.toFixed(1))}</td></tr>`:''}
            <tr><td>BTTS</td><td>${(btts*100).toFixed(1)}%</td><td colspan="3" style="color:${btts>0.5?'#00ff88':'#ff6666'}">${btts>0.5?'YES — likely':'NO — unlikely'}</td></tr>
          </table>
          <div class="label">TOP 5 CORRECT SCORES (Poisson)</div>
          <div class="score-grid">
            ${top5.map((s,i)=>`<div class="score-chip ${i===0?'top':i===1?'second':i===2?'third':''}">${home.split(' ').pop()} ${s.h}–${s.a} ${away.split(' ').pop()} <span style="color:#555">${(s.p*100).toFixed(2)}%</span></div>`).join('')}
          </div>`;

        // Save opening line for this soccer event (enables line movement tracking)
        if (tot.over && tot.under) saveOpeningLine(ev.id, 'totals', 'match_total', tot.over, tot.under);

        // EPL goal scorers
        if (lg.props) {
          try {
            const propData = await fetchEventProps(lg.key, ev.id, 'player_goal_scorer_anytime', 'uk', force);
            html += renderGoalScorers(propData);
          } catch(e) {
            html += `<div class="no-games" style="margin-top:8px">Goal scorer odds unavailable</div>`;
          }
        }

        html += '</div>';
      }
      html += '</div>';
    } catch(e) {
      html += `<div class="sport-section"><div class="sport-title">${lg.label}</div><div class="error">⚠ ${e.message}</div></div>`;
    }
  }
  container.innerHTML = html || '<div class="no-games">No soccer data.</div>';
}

// ── SPORT TAB builder (NBA/NFL/NHL/MLB) ───────────────────────────────────────
async function buildSportTab(name, force) {
  const s = SPORT_TABS[name];
  const container = document.getElementById('tab-' + name);
  container.innerHTML = `<div class="loading">Loading ${s.label}...</div>`;

  try {
    // 1. h2h bulk for winner predictions
    const h2hBulk = await apiFetch(s.key, 'h2h', s.region, force);

    // 2. events list for IDs
    const events = await fetchEvents(s.key, force);

    const now = new Date();
    const cutoff = new Date(now.getTime() + 48*60*60*1000);
    const upcoming = (events||[])
      .filter(e=>{ const d=new Date(e.commence_time); return d>=now && d<=cutoff; })
      ; // no cap — show all games for the day

    if (!upcoming.length) {
      container.innerHTML = `<div class="sport-section"><div class="sport-title">${s.label}</div><div class="no-games">No games in next 48 hours.</div></div>`;
      return;
    }

    let html = `<div class="sport-section"><div class="sport-title" style="justify-content:space-between">${s.label} — ${upcoming.length} games<span id="tab-stamp-${name}" style="color:#282828;font-size:0.7em;font-weight:400;letter-spacing:0"></span></div>`;

    for (const ev of upcoming) {
      const home=ev.home_team, away=ev.away_team;

      // Get h2h odds from bulk data
      const h2hEv = (h2hBulk||[]).find(e=>e.id===ev.id);
      const h2h   = h2hEv ? bestOdds(h2hEv,'h2h') : {};
      const hO=h2h[home], aO=h2h[away];

      html += `<div class="match-card">
        <div class="match-title">
          <span>${home} vs ${away}</span>
          <span class="match-time">${gameDate(ev.commence_time)}</span>
        </div>`;

      // Winner box
      if (hO && aO) html += winnerBox(home, away, hO, aO, null, ev.commence_time, s.label);

      // Player props — small delay before each game's prop call to stay under rate limit
      try {
        await new Promise(r => setTimeout(r, 300));
        const propData = await fetchEventProps(s.key, ev.id, s.props, s.region, force);
        html += await renderProps(propData, `${home} vs ${away}`, s.label, ev.id, ev.commence_time, home);
      } catch(propErr) {
        html += `<div class="error">⚠ Props: ${propErr.message}</div>`;
      }

      html += '</div>';
    }

    html += '</div>';
    container.innerHTML = html;
    stampTab(name);
  } catch(e) {
    container.innerHTML = `<div class="error">⚠ ${s.label} error: ${e.message}</div>`;
  }
}

// ── HISTORY & CALIBRATION TAB ─────────────────────────────────────────────────
function buildHistoryTab() {
  const container = document.getElementById('tab-history');
  const history   = getHistory();
  const calib     = getCalibration();
  let html = '';

  // ── Calibration panel ──────────────────────────────────────────────────────
  html += `<div class="value-box"><h3>🧠 MODEL CALIBRATION`;
  if (calib.ready) {
    html += ` — ${calib.settled} settled picks</h3>
    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:8px;font-size:0.85em">
      <div>OVER win rate: <strong style="color:${calib.overWR>=50?'#00ff88':'#ff4444'}">${calib.overWR}%</strong>
        &nbsp;(${calib.overCount} picks) &nbsp;·&nbsp; multiplier: <strong>${calib.OVER.toFixed(2)}×</strong></div>
      <div>UNDER win rate: <strong style="color:${calib.underWR>=50?'#00ff88':'#ff4444'}">${calib.underWR}%</strong>
        &nbsp;(${calib.underCount} picks) &nbsp;·&nbsp; multiplier: <strong>${calib.UNDER.toFixed(2)}×</strong></div>
    </div>
    <p style="color:#555;font-size:0.75em;margin-top:8px">
      Multiplier applied to composite score. Range 0.80×–1.20×. Formula: 1.0 + (win_rate − 0.50) × 0.5</p>`;
  } else {
    html += `</h3>
    <p style="color:#888;font-size:0.85em">Calibration activates after ${MIN_CALIBRATE} settled picks.
      &nbsp;Currently: <strong>${calib.settled} / ${MIN_CALIBRATE}</strong></p>
    <p style="color:#555;font-size:0.75em">Mark results below — the model will adjust OVER/UNDER weights automatically.</p>`;
  }
  html += '</div>';

  // ── Record bar ─────────────────────────────────────────────────────────────
  const pending = history.filter(p => !p.result);
  const settled = history.filter(p => p.result);
  const wins    = settled.filter(p => p.result === 'W').length;
  const losses  = settled.filter(p => p.result === 'L').length;
  const voids   = settled.filter(p => p.result === 'V').length;
  const wl      = wins + losses;
  const wr      = wl ? (wins / wl * 100).toFixed(1) : null;

  // Current streak (W or L run from most recent settled pick)
  const streak = (() => {
    const s = settled.slice();  // newest first
    if (!s.length) return null;
    const last = s[0].result;
    if (last === 'V') return null;
    let n = 0;
    for (const p of s) { if (p.result !== last) break; n++; }
    return { r: last, n };
  })();

  if (wl > 0 || pending.length) {
    html += `<div class="record-bar">
      <div class="record-stat">
        <div class="record-num" style="color:#00ff88">${wins}</div>
        <div class="record-label">Wins</div>
      </div>
      <div class="record-stat">
        <div class="record-num" style="color:#ff4444">${losses}</div>
        <div class="record-label">Losses</div>
      </div>
      <div class="record-stat">
        <div class="record-num" style="color:#333">${voids}</div>
        <div class="record-label">Voids</div>
      </div>
      <div class="record-stat">
        <div class="record-num" style="color:${wr && parseFloat(wr)>=50?'#00ff88':'#ff4444'}">${wr ? wr+'%' : '—'}</div>
        <div class="record-label">Win Rate</div>
      </div>
      <div class="record-stat">
        <div class="record-num" style="color:#444">${pending.length}</div>
        <div class="record-label">Pending</div>
      </div>
      ${streak ? `<div class="streak-chip">
        <div class="streak-val ${streak.r==='W'?'streak-w':'streak-l'}">${streak.n}× ${streak.r==='W'?'WIN':'LOSS'}</div>
        <div class="record-label">Current streak</div>
      </div>` : ''}
    </div>`;
  }

  // ── Model Accuracy panel (auto-graded picks only) ─────────────────────────
  const autoGraded   = settled.filter(p => p.autoGraded);
  const autoWins     = autoGraded.filter(p => p.result === 'W').length;
  const autoLosses   = autoGraded.filter(p => p.result === 'L').length;
  const autoVoids    = autoGraded.filter(p => p.result === 'V').length;
  const autoWL       = autoWins + autoLosses;
  const autoWR       = autoWL ? (autoWins / autoWL * 100).toFixed(1) : null;

  // Break down auto-graded accuracy by confidence tier
  const tierStats = ['HIGH','MED','LOW'].map(tier => {
    const t = autoGraded.filter(p => p.conf === tier);
    const tw = t.filter(p => p.result === 'W').length;
    const tl = t.filter(p => p.result === 'L').length;
    const twl = tw + tl;
    return { tier, tw, tl, twl, twr: twl ? (tw/twl*100).toFixed(1) : null };
  });

  if (autoGraded.length > 0) {
    // Hit rate breakdown per sport
    const sportKeys = [...new Set(autoGraded.map(p => p.sport.replace(/\p{Emoji}/gu,'').trim()))];
    const sportStats = sportKeys.map(sp => {
      const s = autoGraded.filter(p => p.sport.replace(/\p{Emoji}/gu,'').trim() === sp);
      const sw = s.filter(p => p.result === 'W').length;
      const sl = s.filter(p => p.result === 'L').length;
      const swl = sw + sl;
      return { sp, sw, sl, swl, swr: swl ? (sw/swl*100).toFixed(0) : null };
    }).filter(s => s.swl > 0).sort((a,b) => parseFloat(b.swr||0) - parseFloat(a.swr||0));

    html += `<div class="value-box" style="margin-top:12px">
      <h3 style="margin-bottom:10px">🤖 MODEL ACCURACY — Auto-Graded Picks Only</h3>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px">
        <div class="record-stat">
          <div class="record-num" style="color:#00ff88">${autoWins}</div>
          <div class="record-label">Correct</div>
        </div>
        <div class="record-stat">
          <div class="record-num" style="color:#ff4444">${autoLosses}</div>
          <div class="record-label">Wrong</div>
        </div>
        <div class="record-stat">
          <div class="record-num" style="color:#333">${autoVoids}</div>
          <div class="record-label">Void</div>
        </div>
        <div class="record-stat">
          <div class="record-num" style="color:${autoWR && parseFloat(autoWR)>=50?'#00ff88':'#ff4444'}">${autoWR ? autoWR+'%' : '—'}</div>
          <div class="record-label">Accuracy</div>
        </div>
        <div class="record-stat">
          <div class="record-num" style="color:#555">${autoGraded.length}</div>
          <div class="record-label">Total</div>
        </div>
      </div>

      <div class="section-hdr" style="margin-top:4px">By Confidence Tier</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">
        ${tierStats.map(t => `<div style="font-size:0.8em;background:#0a0f0a;padding:8px 12px;border-radius:6px;border:1px solid #161c16">
          ${badge(t.tier)}&nbsp;
          <span style="color:#00ff88">${t.tw}W</span> /
          <span style="color:#ff4444">${t.tl}L</span>
          ${t.twr ? `· <strong style="color:${parseFloat(t.twr)>=50?'#00ff88':'#ff4444'}">${t.twr}%</strong>` : ''}
          ${!t.twl ? '<span style="color:#333">no data</span>' : ''}
        </div>`).join('')}
      </div>

      ${sportStats.length ? `<div class="section-hdr">Hit Rate by Sport</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">
        ${sportStats.map(s => `<div style="font-size:0.8em;background:#0a0f0a;padding:8px 12px;border-radius:6px;border:1px solid ${parseFloat(s.swr||0)>=50?'#00ff8830':'#1a1a1a'}">
          <span style="color:#888">${s.sp}</span>&nbsp;
          <span style="color:#00ff88">${s.sw}W</span>/<span style="color:#ff4444">${s.sl}L</span>
          ${s.swr ? `&nbsp;<strong style="color:${parseFloat(s.swr)>=50?'#00ff88':'#ff4444'}">${s.swr}%</strong>` : ''}
        </div>`).join('')}
      </div>` : ''}

      <p style="color:#555;font-size:0.72em;margin-top:8px">Auto-graded via ESPN API. Use hit rate by sport to focus on your strongest markets.</p>
    </div>`;

    // ── Backtest: score tier analysis ──────────────────────────────────────────
    // Bucket settled picks by composite score into 5 ranges and show win rate per bucket.
    // This proves (or disproves) whether higher scores actually predict wins.
    const scoreBuckets = [
      { label: '0.50+',  min: 0.50, max: 99,   picks: [] },
      { label: '0.35–0.50', min: 0.35, max: 0.50, picks: [] },
      { label: '0.20–0.35', min: 0.20, max: 0.35, picks: [] },
      { label: '0.10–0.20', min: 0.10, max: 0.20, picks: [] },
      { label: '< 0.10', min: -99, max: 0.10,  picks: [] },
    ];
    const settledWithScore = settled.filter(p => p.score != null && (p.result === 'W' || p.result === 'L'));
    settledWithScore.forEach(p => {
      const b = scoreBuckets.find(b => p.score >= b.min && p.score < b.max);
      if (b) b.picks.push(p);
    });

    // Direction analysis — do OVERs or UNDERs win more overall?
    const overSettled  = settled.filter(p => p.pick === 'OVER'  && (p.result === 'W' || p.result === 'L'));
    const underSettled = settled.filter(p => p.pick === 'UNDER' && (p.result === 'W' || p.result === 'L'));
    const overWR2  = overSettled.length  ? (overSettled.filter(p=>p.result==='W').length  / overSettled.length  * 100).toFixed(1) : null;
    const underWR2 = underSettled.length ? (underSettled.filter(p=>p.result==='W').length / underSettled.length * 100).toFixed(1) : null;

    // Signal agreement analysis — picks where market + stats agree vs disagree
    // (proxy: if score > 0.35 AND conf=HIGH we treat as "signals aligned")
    const aligned    = settled.filter(p => (p.score||0) >= 0.35 && p.conf === 'HIGH' && (p.result==='W'||p.result==='L'));
    const misaligned = settled.filter(p => (p.score||0) <  0.35 && p.conf === 'HIGH' && (p.result==='W'||p.result==='L'));
    const alignedWR    = aligned.length    ? (aligned.filter(p=>p.result==='W').length    / aligned.length    * 100).toFixed(1) : null;
    const misalignedWR = misaligned.length ? (misaligned.filter(p=>p.result==='W').length / misaligned.length * 100).toFixed(1) : null;

    const RELIABLE_THRESHOLD = 30; // picks needed for statistically meaningful backtest
    const reliabilityPct = Math.min(100, Math.round(settledWithScore.length / RELIABLE_THRESHOLD * 100));
    const isReliable = settledWithScore.length >= RELIABLE_THRESHOLD;

    if (settledWithScore.length >= 5) {
      html += `<div class="value-box" style="margin-top:12px">
        <h3 style="margin-bottom:4px">🔬 BACKTEST — Does Score Actually Predict Wins?</h3>
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:0.72em;color:#555">Model reliability: ${settledWithScore.length} / ${RELIABLE_THRESHOLD} picks</span>
            <span style="font-size:0.72em;color:${isReliable?'#00ff88':'#ffcc00'}">${isReliable ? '✅ Reliable' : `${reliabilityPct}% there`}</span>
          </div>
          <div style="background:#111;border-radius:4px;height:5px">
            <div style="width:${reliabilityPct}%;height:5px;border-radius:4px;background:${isReliable?'#00ff88':'#ffcc00'};transition:width .5s"></div>
          </div>
          ${!isReliable ? `<p style="color:#555;font-size:0.7em;margin-top:5px">Need ${RELIABLE_THRESHOLD - settledWithScore.length} more settled picks for reliable stats. Early data shown below — treat with caution.</p>` : ''}
        </div>
        <p style="color:#555;font-size:0.72em;margin-bottom:14px">Win rate per score bucket. If the model works, higher scores should show higher win rates.</p>

        <div class="section-hdr">Win Rate by Composite Score</div>
        <div style="margin-bottom:14px">
          ${scoreBuckets.map(b => {
            const w   = b.picks.filter(p=>p.result==='W').length;
            const l   = b.picks.filter(p=>p.result==='L').length;
            const wl  = w + l;
            if (!wl) return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.8em">
              <span style="min-width:80px;color:#333">${b.label}</span>
              <span style="color:#282828">no data</span></div>`;
            const wr  = (w / wl * 100);
            const bar = Math.min(wr, 100);
            return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.8em">
              <span style="min-width:80px;color:#666">${b.label}</span>
              <div style="flex:1;background:#111;border-radius:4px;height:8px;max-width:180px">
                <div style="width:${bar.toFixed(0)}%;height:8px;border-radius:4px;background:${wr>=55?'#00ff88':wr>=45?'#ffcc00':'#ff4444'};transition:width .5s"></div>
              </div>
              <span style="min-width:42px;color:${wr>=55?'#00ff88':wr>=45?'#ffcc00':'#ff4444'};font-weight:700">${wr.toFixed(1)}%</span>
              <span style="color:#333;font-size:0.85em">${w}W/${l}L</span>
            </div>`;
          }).join('')}
        </div>

        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">
          <div>
            <div class="section-hdr" style="margin-top:0">Direction Bias</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <div style="background:#0a0f0a;padding:8px 14px;border-radius:6px;border:1px solid #161c16;font-size:0.8em">
                <span class="pick-over">OVER</span> &nbsp;
                ${overWR2 ? `<strong style="color:${parseFloat(overWR2)>=50?'#00ff88':'#ff4444'}">${overWR2}%</strong> <span style="color:#333">(${overSettled.length})</span>` : '<span style="color:#333">no data</span>'}
              </div>
              <div style="background:#0a0f0a;padding:8px 14px;border-radius:6px;border:1px solid #161c16;font-size:0.8em">
                <span class="pick-under">UNDER</span> &nbsp;
                ${underWR2 ? `<strong style="color:${parseFloat(underWR2)>=50?'#00ff88':'#ff4444'}">${underWR2}%</strong> <span style="color:#333">(${underSettled.length})</span>` : '<span style="color:#333">no data</span>'}
              </div>
            </div>
          </div>
          ${(alignedWR || misalignedWR) ? `<div>
            <div class="section-hdr" style="margin-top:0">Signal Alignment</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              ${alignedWR ? `<div style="background:#0a0f0a;padding:8px 14px;border-radius:6px;border:1px solid #161c16;font-size:0.8em">
                <span style="color:#00ff88">HIGH score + HIGH conf</span><br>
                <strong style="color:${parseFloat(alignedWR)>=50?'#00ff88':'#ff4444'}">${alignedWR}%</strong> <span style="color:#333">(${aligned.length} picks)</span>
              </div>` : ''}
              ${misalignedWR ? `<div style="background:#0a0f0a;padding:8px 14px;border-radius:6px;border:1px solid #161c16;font-size:0.8em">
                <span style="color:#555">LOW score + HIGH conf</span><br>
                <strong style="color:${parseFloat(misalignedWR)>=50?'#00ff88':'#ff4444'}">${misalignedWR}%</strong> <span style="color:#333">(${misaligned.length} picks)</span>
              </div>` : ''}
            </div>
          </div>` : ''}
        </div>

        <div style="background:#080808;border:1px solid #111;border-radius:8px;padding:12px;font-size:0.75em;color:#444;line-height:1.7">
          ${(() => {
            const hasData = scoreBuckets.filter(b=>b.picks.length>=3);
            if (hasData.length < 2) return '⚠ Need more settled picks for reliable backtest. Keep using the model daily — results populate automatically.';
            const topBucket  = [...scoreBuckets].filter(b=>b.picks.length>0).sort((a,b)=>{
              const wa = a.picks.filter(p=>p.result==='W').length/a.picks.length;
              const wb = b.picks.filter(p=>p.result==='W').length/b.picks.length;
              return wb - wa;
            })[0];
            const topWR = topBucket ? (topBucket.picks.filter(p=>p.result==='W').length/topBucket.picks.length*100).toFixed(1) : null;
            const scoreCorrelates = scoreBuckets[0].picks.length > 0 && scoreBuckets[4].picks.length > 0
              && (scoreBuckets[0].picks.filter(p=>p.result==='W').length/scoreBuckets[0].picks.length)
               > (scoreBuckets[4].picks.filter(p=>p.result==='W').length/Math.max(scoreBuckets[4].picks.length,1));
            return [
              scoreCorrelates ? '✅ Score is positively correlated with wins — higher scoring picks are winning more often.' : '⚠ Score not yet correlating with wins — model may need more data or threshold tuning.',
              topBucket && topWR ? `📊 Best performing bucket: score ${topBucket.label} at ${topWR}% win rate.` : '',
              overWR2 && underWR2 ? (parseFloat(overWR2) > parseFloat(underWR2) ? `📈 OVERs outperforming UNDERs (${overWR2}% vs ${underWR2}%) — calibration will auto-adjust.` : `📉 UNDERs outperforming OVERs (${underWR2}% vs ${overWR2}%) — calibration will auto-adjust.`) : '',
            ].filter(Boolean).join('<br>');
          })()}
        </div>
      </div>`;
    } else {
      html += `<div class="value-box" style="margin-top:12px;border-color:#111">
        <h3>🔬 BACKTEST</h3>
        <p style="color:#383838;font-size:0.8em;margin-top:8px">Need at least 5 settled picks to run backtest analysis. Keep loading picks daily — results auto-populate.</p>
      </div>`;
    }
  }

  // ── Pending picks ──────────────────────────────────────────────────────────
  if (pending.length) {
    html += `<div style="margin-top:16px">
      <div class="section-hdr" style="display:flex;justify-content:space-between;align-items:center">
        <span>⏳ Pending (${pending.length}) — auto-grades next morning</span>
        <button class="btn" onclick="autoGrade().then(n=>{if(n>0){buildHistoryTab();}else{showToast('No completed games found yet','#ffcc00');}})">🤖 Auto-Grade Now</button>
      </div>
      <table class="ptable">
        <tr><th>Date</th><th>Sport</th><th>Pick Info</th><th>Pick</th><th>Conf</th><th>Mark</th></tr>`;
    pending.slice(0, 40).forEach(p => {
      const isMatch  = p.type === 'match_winner';
      const stat     = p.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
      const d        = new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      const infoCell = isMatch
        ? `<span style="color:#bbb">${p.match}</span> <span style="color:#333;font-size:0.8em">Winner</span>`
        : `${p.player} <span style="color:#333;font-size:0.8em">${stat} ${p.line}</span>`;
      const pickCell = isMatch
        ? `<span style="color:#00ccff;font-weight:700">${p.pick}</span>`
        : pickHtml(p.pick);
      html += `<tr>
        <td style="color:#333;font-size:0.8em">${d}</td>
        <td style="color:#444;font-size:0.8em">${p.sport.replace(/\p{Emoji}/gu,'').trim()}</td>
        <td style="color:#bbb">${infoCell}</td>
        <td>${pickCell}</td>
        <td>${badge(p.conf)}</td>
        <td style="white-space:nowrap;display:flex;gap:4px">
          <button class="mark-btn mark-w" onclick="markResult('${p.id}','W')">✓ W</button>
          <button class="mark-btn mark-l" onclick="markResult('${p.id}','L')">✗ L</button>
          <button class="mark-btn mark-v" onclick="markResult('${p.id}','V')">— V</button>
        </td>
      </tr>`;
    });
    html += '</table></div>';
  }

  // ── Settled picks ──────────────────────────────────────────────────────────
  if (settled.length) {
    // Sort settled newest-first and rank by score to identify best bets
    const rankedSettled = [...settled].sort((a,b) => (b.score||0) - (a.score||0));
    const bestBetIds = new Set(rankedSettled.slice(0, Math.ceil(settled.length * 0.2)).map(p => p.id));

    const sportList = [...new Set(settled.map(p => p.sport.replace(/\p{Emoji}/gu,'').trim()))].sort();
    html += `<div style="margin-top:20px">
      <div class="section-hdr" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span>📋 Settled — ${wins}W / ${losses}L / ${voids}V</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="hist-filters">
          <button class="btn active" style="font-size:0.7em;padding:3px 10px" onclick="histFilter('all',this)">All</button>
          <button class="btn" style="font-size:0.7em;padding:3px 10px;border-color:#00ff8830;color:#555" onclick="histFilter('best',this)">⭐ Best Bets</button>
          ${['HIGH','MED','LOW'].map(c=>`<button class="btn" style="font-size:0.7em;padding:3px 10px;border-color:#33333380;color:#555" onclick="histFilter('${c}',this)">${c}</button>`).join('')}
          ${sportList.map(s=>`<button class="btn" style="font-size:0.7em;padding:3px 10px;border-color:#33333380;color:#555" onclick="histFilter('${s}',this)">${s}</button>`).join('')}
        </div>
      </div>
      <table class="ptable" id="hist-table">
        <tr><th>Date</th><th>Sport</th><th>Pick Info</th><th>Pick</th><th>Result</th><th>CLV</th><th>Graded By</th></tr>`;
    settled.slice(0, 100).forEach(p => {
      const isMatch  = p.type === 'match_winner';
      const stat     = p.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
      const d        = new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      const isBest   = bestBetIds.has(p.id);
      const infoCell = isMatch
        ? `<span style="color:#bbb">${p.match}</span> <span style="color:#333;font-size:0.8em">Winner</span>`
        : `${isBest ? '⭐ ' : ''}${p.player} <span style="color:#333;font-size:0.8em">${stat} ${p.line}</span>`;
      const pickCell = isMatch
        ? `<span style="color:#00ccff;font-weight:700">${p.pick}</span>`
        : pickHtml(p.pick);
      const autoTag  = p.autoGraded ? ' <span style="color:#333;font-size:0.72em;font-weight:400">auto</span>' : '';
      const resHtml  = p.result==='W'
        ? `<span style="color:#00ff88;font-weight:700">WIN${autoTag}</span>`
        : p.result==='L'
        ? `<span style="color:#ff4444;font-weight:700">LOSS${autoTag}</span>`
        : `<span style="color:#333">VOID${autoTag}</span>`;
      const sportClean = p.sport.replace(/\p{Emoji}/gu,'').trim();
      html += `<tr data-conf="${p.conf}" data-sport="${sportClean}" data-best="${isBest}">
        <td style="color:#333;font-size:0.8em">${d}</td>
        <td style="color:#444;font-size:0.8em">${sportClean}</td>
        <td style="color:#bbb">${infoCell}</td>
        <td>${pickCell}</td>
        <td>${resHtml}</td>
        <td style="font-size:0.72em;color:${(() => { const clv = getCLV(p.id, null, null); return clv ? (clv.clv > 0 ? '#00ff88' : '#ff4444') : '#333'; })()}">${(() => { const clv = getCLV(p.id, null, null); return clv ? clv.label.split('(')[0].trim() : '—'; })()}</td>
        <td style="font-size:0.75em;color:${p.autoGraded?'#00ccff':'#444'}">${p.autoGraded?'🤖 Auto':'✋ Manual'}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  if (!pending.length && !settled.length) {
    html += `<div class="no-games" style="margin-top:20px">No picks saved yet — load a sport tab to generate picks.</div>`;
  }

  container.innerHTML = html;
}

// ── ALL VALUE BETS ────────────────────────────────────────────────────────────
function buildAllTab() {
  const container = document.getElementById('tab-all');
  let html = '';

  // ── Soccer value bets (edge-based, Poisson model) ──────────────────────────
  if (allValueBets.length) {
    allValueBets.sort((a,b)=>b.e-a.e);
    const tier = v => v.e >= 8
      ? '<span class="tier-a">A</span>'
      : '<span class="tier-b">B</span>';
    html += `<div class="value-box"><h3>✅ SOCCER VALUE BETS — Edge > +3% (${allValueBets.length} found)</h3>`;
    allValueBets.forEach(v=>{
      html += `<div class="value-item">${tier(v)} +${v.e}% &nbsp;|&nbsp; <strong>${v.bet}</strong> &nbsp;|&nbsp; <span class="match-ref">${v.match} (${v.sport})</span></div>`;
    });
    html += `<p style="color:#555;font-size:0.75em;margin-top:8px">Edge = Poisson model probability minus bookmaker implied probability. Load individual sport tabs to populate player prop picks below.</p></div>`;
  }

  // ── Slate-wide top 10 player props (best bet per game, all sports) ─────────
  if (allPropBets.length) {
    allPropBets.sort((a, b) => b.score - a.score);
    // Balance OVER vs UNDER in the top 10 — max 6 per direction so both sides appear
    const dirCap = {}; const top10 = [];
    for (const v of allPropBets) {
      if (top10.length >= 10) break;
      const cnt = dirCap[v.pick] || 0;
      if (cnt < 6) { top10.push(v); dirCap[v.pick] = cnt + 1; }
    }
    // Fill remaining slots if one direction had fewer than 6
    if (top10.length < 10) {
      for (const v of allPropBets) {
        if (top10.length >= 10) break;
        if (!top10.includes(v)) top10.push(v);
      }
    }
    html += `<div class="hero-section" style="margin-top:${allValueBets.length?'16px':'0'}">
      <div class="hero-title">🎯 Today's Best Prop Picks &nbsp;<span style="color:#1a3a1a;font-size:0.85em">${top10.length} games loaded</span></div>`;
    top10.forEach((v, i) => {
      const tierHtml = i < 2 ? '<span class="tier-a">A★</span>' : '<span class="tier-b">B</span>';
      const stat = v.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
      html += `<div class="hero-pick rank-${i+1}">
        <div class="hero-rank">${i+1}</div>
        ${tierHtml}
        <div style="flex:1;min-width:0">
          <div class="hero-player">${v.player} &nbsp;${pickHtml(v.pick)} <span style="color:#ffcc00">${v.line}</span> <span style="color:#444;font-weight:400">${stat}</span></div>
          <div class="hero-detail">${v.match} &nbsp;·&nbsp; ${v.sport} &nbsp;·&nbsp; ${v.bookCount} books &nbsp;·&nbsp; ${v.pct}% implied</div>
        </div>
        <div style="flex-shrink:0">${badge(v.conf)}</div>
      </div>`;
    });
    html += `<p style="color:#1e2e1e;font-size:0.7em;margin-top:14px">Ranked by: edge × consensus × vig fairness. No stats API — market signals only.</p></div>`;
  }

  if (!html) {
    html = `<div class="no-games">No data yet. Soccer loads automatically — click NBA, NFL, NHL, or MLB tabs to populate player prop picks here.</div>`;
  }
  container.innerHTML = html;
}

// ── Master refresh ────────────────────────────────────────────────────────────
async function refreshAll(force=false) {
  // Reset state
  loadedTabs.clear();
  allValueBets.length = 0;
  allPropBets.length  = 0;

  if (force) clearAllCache();

  // Sport tabs are lazy — show "Click to load" placeholder, only fetch on click
  Object.keys(SPORT_TABS).forEach(k=>{
    const sportName = SPORT_TABS[k]?.label || k.toUpperCase();
    document.getElementById('tab-'+k).innerHTML =
      `<div class="loading" style="color:#888;cursor:pointer" onclick="showTab('${k}')">Click ${sportName} tab to load picks</div>`;
  });

  // Soccer loads on startup (feeds the All Value Bets tab)
  document.getElementById('tab-soccer').innerHTML='<div class="loading">Loading soccer...</div>';
  document.getElementById('all-loading') && (document.getElementById('all-loading').style.display='block');
  loadedTabs.add('soccer');
  await buildSoccer(force);
  buildAllTab();

  // History tab loads on startup (no API calls, just localStorage)
  buildHistoryTab();
  loadedTabs.add('history');

  updateCacheStatus();
  document.getElementById('all-loading') && (document.getElementById('all-loading').style.display='none');
}

// ── History filter ────────────────────────────────────────────────────────────
function histFilter(val, btn) {
  document.querySelectorAll('#hist-filters .btn').forEach(b => {
    b.classList.remove('active');
    b.style.color = '#555';
  });
  btn.classList.add('active');
  btn.style.color = '#00ff88';
  document.querySelectorAll('#hist-table tr[data-conf]').forEach(row => {
    if (val === 'all') { row.style.display = ''; return; }
    if (val === 'best') { row.style.display = row.dataset.best === 'true' ? '' : 'none'; return; }
    if (['HIGH','MED','LOW'].includes(val)) { row.style.display = row.dataset.conf === val ? '' : 'none'; return; }
    row.style.display = row.dataset.sport === val ? '' : 'none';
  });
}

// ── My Picks Slip ─────────────────────────────────────────────────────────────
const SLIP_KEY = 'bm_myslip_v1';

function getSlip() {
  try { return JSON.parse(localStorage.getItem(SLIP_KEY)) || []; } catch { return []; }
}
function saveSlip(slip) {
  try { localStorage.setItem(SLIP_KEY, JSON.stringify(slip)); } catch {}
}

function slipAdd(pick) {
  const slip = getSlip();
  if (!slip.find(p => p.id === pick.id)) {
    slip.unshift(pick);
    saveSlip(slip);
  }
  renderSlip();
}

function slipSetDirection(id, direction) {
  const slip = getSlip();
  const p = slip.find(x => x.id === id);
  if (p) { p.myPick = direction; saveSlip(slip); }
  renderSlip();
  // Update button states on the card
  document.querySelectorAll(`[data-slip-id="${id}"]`).forEach(btn => {
    btn.classList.toggle('sel', btn.dataset.dir === direction);
  });
}

function slipRemove(id) {
  const slip = getSlip().filter(p => p.id !== id);
  saveSlip(slip);
  renderSlip();
  document.querySelectorAll(`[data-slip-id="${id}"]`).forEach(btn => btn.classList.remove('sel'));
}

function slipClear() {
  saveSlip([]);
  renderSlip();
  document.querySelectorAll('.pick-select-btn').forEach(b => b.classList.remove('sel'));
}

function renderSlip() {
  const slip    = getSlip();
  const panel   = document.getElementById('slip-panel');
  const countEl = document.getElementById('slip-count');
  const bodyEl  = document.getElementById('slip-body');

  const active  = slip.filter(p => p.myPick);
  if (countEl) countEl.textContent = active.length || '';
  countEl && (countEl.style.display = active.length ? 'inline-flex' : 'none');

  if (!panel) return;
  if (!slip.length) {
    bodyEl.innerHTML = '<div class="slip-empty">No picks added yet.<br>Tap OVER / UNDER on any pick card.</div>';
    document.getElementById('slip-footer').innerHTML = '';
    return;
  }

  bodyEl.innerHTML = slip.map(p => {
    const stat = p.market.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ').toUpperCase();
    return `<div class="slip-item">
      <button class="slip-remove" onclick="slipRemove('${p.id}')">✕</button>
      <div class="slip-item-player">${p.player}</div>
      <div class="slip-item-detail">${stat} ${p.line} &nbsp;·&nbsp; ${p.sport} &nbsp;·&nbsp; ${p.pct}% implied</div>
      <div class="slip-item-pick">
        <button class="slip-pick-btn over ${p.myPick==='OVER'?'active':''}" onclick="slipSetDirection('${p.id}','OVER')">OVER</button>
        <button class="slip-pick-btn under ${p.myPick==='UNDER'?'active':''}" onclick="slipSetDirection('${p.id}','UNDER')">UNDER</button>
      </div>
    </div>`;
  }).join('');

  const wins   = active.filter(p => p.myPick === 'OVER').length;
  const unders = active.filter(p => p.myPick === 'UNDER').length;
  document.getElementById('slip-footer').innerHTML = active.length
    ? `<div style="font-size:0.75em;color:#555;margin-bottom:8px">${active.length} pick${active.length>1?'s':''} selected &nbsp;·&nbsp; ${wins} OVER / ${unders} UNDER</div>
       <button class="btn" style="width:100%;justify-content:center;font-size:0.78em" onclick="slipClear()">🗑 Clear All</button>`
    : '';
}

function toggleSlip() {
  const panel = document.getElementById('slip-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderSlip();
}

// Called from each pick card OVER/UNDER button
function pickSelect(btn, pickJson, direction) {
  const pick = JSON.parse(decodeURIComponent(pickJson));
  pick.myPick = direction;
  slipAdd(pick);
  slipSetDirection(pick.id, direction);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  refreshAll(false);
  autoGrade().catch(() => {});
  renderSlip();
});
</script>
