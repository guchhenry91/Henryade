<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px;
    height: 800px;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: #000;
  }
  .container {
    position: relative;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    overflow: hidden;
  }
  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a12 60%, #000 100%);
  }
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(212,168,85,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .icon {
    font-size: 120px;
    margin-bottom: 20px;
    opacity: 0.9;
    filter: drop-shadow(0 0 30px rgba(212,168,85,0.4));
  }
  .cross {
    width: 4px;
    height: 80px;
    background: linear-gradient(to bottom, rgba(212,168,85,0.8), rgba(212,168,85,0.3));
    position: relative;
    margin-bottom: 25px;
    box-shadow: 0 0 20px rgba(212,168,85,0.3);
  }
  .cross::after {
    content: '';
    position: absolute;
    top: 20px;
    left: -20px;
    width: 44px;
    height: 4px;
    background: linear-gradient(to right, rgba(212,168,85,0.3), rgba(212,168,85,0.8), rgba(212,168,85,0.3));
    box-shadow: 0 0 20px rgba(212,168,85,0.3);
  }
  .letter {
    font-size: 140px;
    font-weight: 700;
    color: #d4a855;
    font-family: 'Georgia', serif;
    line-height: 1;
    text-shadow: 0 0 40px rgba(212,168,85,0.4), 0 4px 12px rgba(0,0,0,0.8);
    letter-spacing: 15px;
    margin-bottom: 10px;
  }
  .divider {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4a855, transparent);
    margin: 12px auto;
    opacity: 0.6;
  }
  .name {
    color: #e8dcc8;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 12px;
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    opacity: 0.85;
  }
  .sub {
    color: #8a7d6b;
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 8px;
    opacity: 0.6;
  }
  .ring {
    position: absolute;
    top: 10px; left: 10px;
    right: 10px; bottom: 10px;
    border: 1px solid rgba(212,168,85,0.15);
    border-radius: 50%;
  }
  .ring2 {
    position: absolute;
    top: 25px; left: 25px;
    right: 25px; bottom: 25px;
    border: 1px solid rgba(212,168,85,0.08);
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="container">
  <div class="bg"></div>
  <div class="glow"></div>
  <div class="ring"></div>
  <div class="ring2"></div>
  <div class="content">
    <div class="cross"></div>
    <div class="letter">QR</div>
    <div class="divider"></div>
    <div class="name">Quiet</div>
    <div class="sub">Revelations</div>
  </div>
</div>
</body>
</html>
